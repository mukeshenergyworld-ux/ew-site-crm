  .stat-grid{grid-template-columns:1fr 1fr!important}

  .contact-grid{grid-template-columns:1fr!important}

  .quote-row{flex-wrap:wrap!important}

  .grid-3{grid-template-columns:1fr!important}

  body,#root{overflow-x:hidden}

  h2{font-size:16px!important}

// ─── CSV PARSER ───────────────────────────────────────────────────────────────
// New sheet columns: S.No. | Product Code | Product Family | Size & Description | Product Catagory | Unit | List Price (Rs) | Brand | HSN Code | Pic
function parseCSV(text){
  const lines = text.split(/\r?\n/);
  let headerIdx = -1;
  for(let i = 0; i < Math.min(15, lines.length); i++){
    const l = lines[i].toLowerCase();
    if(l.includes("product code") || (l.includes("s.no") && l.includes("brand"))){
      headerIdx = i; break;
    }
  }
  if(headerIdx < 0) return [];

  function splitRow(line){
    const result=[]; let cur=""; let inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){result.push(cur.trim().replace(/^"|"$/g,""));cur="";}
      else{cur+=c;}
    }
    result.push(cur.trim().replace(/^"|"$/g,""));
    return result;
  }

  const headers = splitRow(lines[headerIdx]).map(h=>h.toLowerCase().replace(/[^a-z0-9\s&%]/g,"").trim());
  function findCol(...keys){ for(const k of keys){ const idx=headers.findIndex(h=>h.includes(k)); if(idx>=0) return idx; } return -1; }

  const COL={
    code:   findCol("product code","code","item code","sku"),
    family: findCol("product family","family"),
    specs:  findCol("size & description","size","description","specifications","product spec","product name"),
    cat:    findCol("product catagory","product category","category","catagory"),
    unit:   findCol("unit"),
    price:  findCol("list price","price","rate","lp","mrp"),
    brand:  findCol("brand"),
    hsn:    findCol("hsn"),
    photo:  findCol("pic","photo","image","url"),
  };

  const products=[];
  for(let i=headerIdx+1;i<lines.length;i++){
    const line=lines[i].trim();
    if(!line) continue;
    const row=splitRow(line);
    if(row.length<4) continue;
    const get=(col)=>col>=0&&col<row.length?(row[col]||"").trim():"";
    const code=get(COL.code);
    const family=get(COL.family);
    const specs=get(COL.specs);
    const cat=get(COL.cat);
    const unit=get(COL.unit)||"Per Pc.";
    const brand=get(COL.brand);
    const photoUrl=get(COL.photo);
    const priceRaw=get(COL.price).replace(/[^0-9.]/g,"");
    const listPrice=parseFloat(priceRaw)||0;
    if(!specs&&!code) continue;
    if(!brand&&!specs) continue;
    if(specs.toLowerCase()==="size & description"||brand.toLowerCase()==="brand") continue;
    products.push({
      id:code||("p"+i),
      specs:specs||code,
      brand:brand||"Other",
      code,family,
      category:cat,
      unit,listPrice,
      gst:18,
      photoUrl:(()=>{
        if(!photoUrl||!photoUrl.startsWith("http")) return "";
        const dm=photoUrl.match(/\/d\/([a-zA-Z0-9_-]{20,})/);
        if(dm) return "https://lh3.googleusercontent.com/d/"+dm[1]+"=w200";
        const om=photoUrl.match(/[?&]id=([a-zA-Z0-9_-]{20,})/);
        if(om) return "https://lh3.googleusercontent.com/d/"+om[1]+"=w200";
        if(photoUrl.includes("lh3.googleusercontent.com")) return photoUrl.replace(/=w\d+$/,"")+"=w200";
        return photoUrl.replace(/\/view(\?.*)?$/,"").replace(/\?usp=[^&]*/g,"");
      })(),
      hsn:get(COL.hsn),
    });
  }
  return products;
}

// ─── IMAGE PRE-LOADER ─────────────────────────────────────────────────────────
// Fetches all unique product image URLs and converts to base64
// Returns a map: { url -> "data:image/jpeg;base64,..." }
async function preloadImages(items, onProgress){
  const cache = {};
  const uniqueUrls = [...new Set(items.map(i=>i.photoUrl).filter(u=>u&&u.startsWith("http")))];
  if(!uniqueUrls.length) return cache;

  // PROXY FIRST — Apps Script fetches images server-side, no CORS issues
  // Canvas approach fails for Google Drive images due to CORS taint
  async function loadViaProxy(url){
    try{
      const cleanUrl = url.replace(/\/view(\?.*)?$/,"").replace(/\?usp=[^&]*/g,"").replace(/=w\d+$/,""); const proxyUrl = WEBAPP_URL+"?action=image&url="+encodeURIComponent(cleanUrl);
      const res = await fetch(proxyUrl, {signal: AbortSignal.timeout(20000)});
      if(!res.ok) return null;
      const data = await res.json();
      if(data.ok && data.b64 && data.b64.length > 100){
        return "data:"+(data.mime||"image/jpeg")+";base64,"+data.b64;
      }
      console.warn("Proxy returned no b64 for:", url, data.error||"");
    }catch(e){ console.warn("Proxy failed for:", url, e.message); }
    return null;
  }

  // CANVAS FALLBACK — works only for truly public/CORS-open URLs
  function loadViaCanvas(url){
    return new Promise((resolve)=>{
      const img = new Image();
      img.crossOrigin = "anonymous";
      const timer = setTimeout(()=>{ img.src=""; resolve(null); }, 8000);
      img.onload = ()=>{
        clearTimeout(timer);
        try{
          const c = document.createElement("canvas");
          c.width = Math.min(img.naturalWidth||200, 400);
          c.height= Math.min(img.naturalHeight||200, 400);
          c.getContext("2d").drawImage(img,0,0,c.width,c.height);
          const b64 = c.toDataURL("image/jpeg", 0.8);
          resolve(b64.length > 500 ? b64 : null);
        }catch(e){ resolve(null); } // SecurityError on CORS-blocked images
      };
      img.onerror = ()=>{ clearTimeout(timer); resolve(null); };
      img.src = url;
    });
  }

  // Strategy: proxy first (reliable), canvas as fallback
  async function fetchOne(url){
    const proxyResult = await loadViaProxy(url);
    if(proxyResult) return proxyResult;
    return await loadViaCanvas(url); // last resort
  }

  // Run in batches of 4 — parallel but not overwhelming
  const BATCH = 4;
  let done = 0;
  for(let i=0; i<uniqueUrls.length; i+=BATCH){
    const batch = uniqueUrls.slice(i, i+BATCH);
    const results = await Promise.allSettled(batch.map(u=>fetchOne(u)));
    results.forEach((r,idx)=>{
      if(r.status==="fulfilled" && r.value) cache[batch[idx]] = r.value;
    });
    done += batch.length;
    if(onProgress) onProgress(Math.min(done, uniqueUrls.length), uniqueUrls.length);
  }
  return cache;
}

// ─── NUMBER TO WORDS (Indian system) ────────────────────────────────────────
function numToWords(n){
  const a=["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
  const b=["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
  function words(num){
    if(num===0)return"";if(num<20)return a[num]+" ";if(num<100)return b[Math.floor(num/10)]+" "+(num%10?a[num%10]+" ":"");
    if(num<1000)return a[Math.floor(num/100)]+" Hundred "+(num%100?words(num%100):"");
    if(num<100000)return words(Math.floor(num/1000))+"Thousand "+words(num%1000);
    if(num<10000000)return words(Math.floor(num/100000))+"Lakh "+words(num%100000);
    return words(Math.floor(num/10000000))+"Crore "+words(num%10000000);
  }
  const integer=Math.floor(Math.abs(n));
  let result=words(integer).trim()||"Zero";
  return result+" Only";
}

const RUPEE = "\u20B9"; // ₹ — renders in NotoSans

// ── 3D Cardboard box placeholder — pure lines/rects, no triangle() needed ──
function drawBoxPlaceholder(doc,cx,cy,cw,ch,font){
  // Light grey rounded background
  doc.setFillColor(246,247,249); doc.setDrawColor(214,220,228); doc.setLineWidth(0.25);
  doc.roundedRect(cx,cy,cw,ch,1.5,1.5,"FD");

  // Box measurements — centered, ~9x9mm total
  const mx=cx+cw/2, my=cy+ch/2+0.8;
  const bw=8.5, bh=6, lidH=2, sideW=2.8, sideH=1.2;
  const bx=mx-bw/2, by=my-bh/2;

  // ── Right side face (dark, drawn first so front overlaps) ──
  doc.setFillColor(162,128,72);
  // Side is a parallelogram: bx+bw → bx+bw+sideW (shifted up by sideH)
  doc.setDrawColor(140,108,55); doc.setLineWidth(0.3);
  // Draw as filled polygon using lines approach
  doc.setFillColor(162,128,72);
  // Top-right → top-right-side → bottom-right-side → bottom-right
  const sx1=bx+bw, sy1=by;
  const sx2=bx+bw+sideW, sy2=by-sideH;
  const sx3=bx+bw+sideW, sy3=by+bh-sideH;
  const sx4=bx+bw, sy4=by+bh;
  // Fill right face with lines
  for(let i=0;i<=bh;i+=0.4){
    const t=i/bh;
    doc.line(sx1, sy1+i, sx2+0, sy2+(sy3-sy2)*t);
  }
  doc.line(sx1,sy1,sx2,sy2); doc.line(sx2,sy2,sx3,sy3);
  doc.line(sx3,sy3,sx4,sy4); doc.line(sx1,sy1,sx4,sy4);

  // ── Front face (main body) ──
  doc.setFillColor(205,168,105); doc.setDrawColor(155,122,65); doc.setLineWidth(0.35);
  doc.rect(bx, by, bw, bh, "FD");

  // ── Lid open — two flaps ──
  doc.setFillColor(220,185,130); doc.setDrawColor(155,122,65); doc.setLineWidth(0.3);
  // Left flap (slightly angled look)
  doc.rect(bx+0.5, by-lidH*1.3, bw/2-1, lidH, "FD");
  // Right flap
  doc.rect(bx+bw/2+0.5, by-lidH*1.3, bw/2-1, lidH, "FD");
  // Lid base line
  doc.line(bx, by-lidH*0.15, bx+bw, by-lidH*0.15);

  // ── Tape lines on front face ──
  doc.setDrawColor(165,128,60); doc.setLineWidth(0.5);
  doc.line(mx, by-lidH*0.15, mx, by+bh);          // vertical centre
  doc.line(bx, by+bh*0.42, bx+bw, by+bh*0.42);   // horizontal flap

  // ── Top face hint (thin strip for 3D) ──
  doc.setFillColor(228,195,148); doc.setDrawColor(155,122,65); doc.setLineWidth(0.25);
  doc.rect(bx, by-lidH*0.15, bw, lidH*0.25, "FD");
}

// ─── SEND PDF TO TELEGRAM ────────────────────────────────────────────────────
async function sendTelegramPDF(doc, filename, caption){
  if(!TG_TOKEN || TG_TOKEN.length < 30){
    const cfg=(()=>{try{return JSON.parse(localStorage.getItem('ew_tg_config')||'{}')}catch(e){return{}}})();
    if(!cfg.token||cfg.token.length<30){
      console.warn("Telegram: No bot token configured. Set via the warning above the Send button.");
      return false;
    }
  }
  try{
    const pdfBlob = doc.output("blob");
    const form = new FormData();
    form.append("chat_id", TG_CHAT);
    form.append("document", pdfBlob, filename);
    form.append("caption", caption);
    form.append("parse_mode", "HTML");
    const res = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendDocument`, {
      method:"POST", body:form
    });
    const data = await res.json();
    if(!data.ok) throw new Error(data.description||"Unknown error");
    return true;
  }catch(e){
    console.warn("Telegram PDF send failed:", e.message);
    return false;
  }
}

// ─── MONTHLY REPORT GENERATOR ────────────────────────────────────────────────
function getMonthLabel(offset=0){
  const d=new Date(); d.setMonth(d.getMonth()+offset);
  return d.toLocaleString("en-IN",{month:"long",year:"numeric"});
}
function getMonthRange(offset=0){
  const d=new Date(); d.setMonth(d.getMonth()+offset);
  const y=d.getFullYear(), m=d.getMonth();
  const start=`${y}-${String(m+1).padStart(2,"0")}-01`;
  const end=`${y}-${String(m+1).padStart(2,"0")}-${String(new Date(y,m+1,0).getDate()).padStart(2,"0")}`;
  return {start,end,label:getMonthLabel(offset)};
}

// 3. Brand Win/Loss Report
async function sendBrandWinLossReport(sites, monthOffset=0){
  const {start,end,label}=getMonthRange(monthOffset);
  const allProducts=Object.values(STAGE_PRODUCTS).flat();

  // Count wins/losses across all sites updated this month
  const brandStats={};
  allProducts.forEach(p=>{
    brandStats[p.brand]=brandStats[p.brand]||{won:0,lost:0,pitched:0};
  });

  sites.forEach(s=>{
    Object.entries(s.pitches||{}).forEach(([pid,pitch])=>{
      if(!pitch.updatedAt||pitch.updatedAt<start||pitch.updatedAt>end) return;
      const product=allProducts.find(p=>p.id===pid);
      if(!product) return;
      const bs=brandStats[product.brand];
      if(!bs) return;
      if(pitch.status==="won") bs.won++;
      else if(pitch.status==="lost") bs.lost++;
      else if(pitch.status==="pitched") bs.pitched++;
    });
  });

  let msg=`🏆 <b>Brand Win/Loss Report</b>\n`;
  msg+=`🗓 <b>${label}</b>\n`;
  msg+=`━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;

  const brands=Object.entries(brandStats).filter(([,v])=>v.won+v.lost+v.pitched>0);
  brands.sort((a,b)=>b[1].won-a[1].won);

  if(!brands.length){
    msg+=`No pitch activity recorded in ${label}\n`;
  } else {
    brands.forEach(([brand,stat])=>{
      const total=stat.won+stat.lost+stat.pitched;
      const winRate=total>0?Math.round(stat.won/total*100):0;
      msg+=`<b>${brand}</b>\n`;
      msg+=`  ✅ Won: ${stat.won}  ❌ Lost: ${stat.lost}  🔄 In progress: ${stat.pitched}\n`;
      msg+=`  📈 Win rate: ${winRate}%\n\n`;
    });
  }

  msg+=`━━━━━━━━━━━━━━━━━━━━━━━━\n`;
  msg+=`📅 Report sent: ${today()} by Energy World CRM`;

  await sendTelegram(msg);
  return msg;
}

// ─── GPS DISTANCE ─────────────────────────────────────────────────────────────
function haversineKm(la1,lo1,la2,lo2){
  const R=6371,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function calcMonthlyKm(visits){
  const pts=visits.filter(v=>v.gpsLat&&v.gpsLng).sort((a,b)=>a.date.localeCompare(b.date));
  let km=0;
  for(let i=1;i<pts.length;i++) km+=haversineKm(+pts[i-1].gpsLat,+pts[i-1].gpsLng,+pts[i].gpsLat,+pts[i].gpsLng);
  return Math.round(km);
}

async function sendMonthlyExecutivePDFs(sites,monthOffset=0){
  const {label}=getMonthRange(monthOffset);
  await sendTelegram(`📊 <b>Monthly Executive PDFs — ${label}</b>\nGenerating reports for all executives...`);
  for(const user of USERS){
    try{
      const doc=await generateMonthlyExecutivePDF(user,sites,monthOffset);
      const blob=doc.output("blob");
      const fd=new FormData();
      fd.append("chat_id",TG_CHAT);
      fd.append("document",blob,`${user.name.replace(/ /g,"_")}_${label.replace(/ /g,"_")}.pdf`);
      fd.append("caption",`📋 <b>${user.name}</b> — ${label}\nVisits: ${sites.reduce((a,s)=>a+(s.visits||[]).filter(v=>v.visitedBy===user.id).length,0)} · Generated by EW CRM`);
      fd.append("parse_mode","HTML");
      await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendDocument`,{method:"POST",body:fd});
      await new Promise(r=>setTimeout(r,1200));
    }catch(e){ await sendTelegram(`❌ ${user.name}: ${e.message}`); }
  }
  await sendTelegram(`✅ <b>All PDFs sent for ${label}</b>`);
}

  const [step, setStep]   = useState(1); // 1=select, 2=qty review, 3=discount
  const [discounts, setDiscounts] = useState({}); // {familyKey: pct}
  const [expandedBrands, setExpandedBrands] = useState({});

  const brands  = useMemo(()=>[...new Set(products.map(p=>p.brand))].filter(Boolean).sort(),[products]);
  const families= useMemo(()=>{
    if(!selBrand) return [];
    return [...new Set(products.filter(p=>p.brand===selBrand).map(p=>p.family))].filter(Boolean).sort();
  },[products,selBrand]);
  const familyProducts = useMemo(()=>{
    if(!selBrand||!selFamily) return [];
    return products.filter(p=>p.brand===selBrand && p.family===selFamily);
  },[products,selBrand,selFamily]);

  // Direct code search
  useEffect(()=>{
    if(!codeQ.trim()){ setCodeResult(null); return; }
    const q=codeQ.trim().toLowerCase();
    const found=products.find(p=>p.code&&p.code.toLowerCase()===q);
    setCodeResult(found||null);
  },[codeQ,products]);

  function addToBasket(product){
    setBasket(prev=>{
      if(prev.find(b=>b.product.id===product.id)) return prev;
      return [...prev,{product,qty:1}];
    });
  }
  function removeFromBasket(id){ setBasket(prev=>prev.filter(b=>b.product.id!==id)); }
  function setQty(id,qty){ setBasket(prev=>prev.map(b=>b.product.id===id?{...b,qty:Math.max(1,Number(qty)||1)}:b)); }
  const isInBasket=(id)=>!!basket.find(b=>b.product.id===id);

  // Discount categories = unique brand+family combos in basket
  const discountBrands = useMemo(()=>{
    const byBrand={};
    basket.forEach(b=>{
      const brand=b.product.brand||"Other";
      if(!byBrand[brand]) byBrand[brand]={brand, products:[], count:0, subtotal:0};
      byBrand[brand].products.push(b);
      byBrand[brand].count++;
      byBrand[brand].subtotal+=b.product.listPrice*b.qty;
    });
    return Object.values(byBrand);
  },[basket]);

  function finalItems(){
    return basket.map(b=>{
      const brandKey="brand:"+(b.product.brand||"Other");
      const itemKey="item:"+b.product.id;
      const ov=discounts[itemKey];
      const disc=Number((ov!==undefined&&ov!=="")?ov:(discounts[brandKey]||0));
      const netPrice = disc>0 ? b.product.listPrice*(1-disc/100) : b.product.listPrice;
      return { id:makeId(), specs:b.product.specs, brand:b.product.brand,
        code:b.product.code, family:b.product.family, unit:b.product.unit,
        listPrice:b.product.listPrice, gst:b.product.gst, photoUrl:b.product.photoUrl||"",
        qty:b.qty, discount:disc, netPrice:disc>0?netPrice:null, note:"" };
    });
  }

  const overlay={position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:300,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"12px",overflowY:"auto"};
  const card={background:"#fff",borderRadius:16,width:"100%",maxWidth:820,display:"flex",flexDirection:"column",minHeight:"90vh"};

  // ── STEP 3: DISCOUNT PER CATEGORY ──
  if(step===3){
    return(
      <div style={overlay}>
        <div style={card}>
          <div style={{background:"#0f172a",borderRadius:"16px 16px 0 0",padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{color:"#fff",fontWeight:700,fontSize:16}}>Step 3 — Set discount per brand / family</div>
              <div style={{color:"#94a3b8",fontSize:12,marginTop:2}}>Discount applies to all products in that category</div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span style={{fontSize:12,color:"#64748b",background:"#1e293b",padding:"4px 10px",borderRadius:8}}>{basket.length} products selected</span>
              <button onClick={onClose} style={{background:"transparent",border:"1px solid #334155",color:"#94a3b8",borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:13}}>✕</button>
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"24px 24px 0"}}>
            {discountBrands.map(bg=>{
              const brandKey="brand:"+bg.brand;
              const brandDisc=discounts[brandKey]||"";
              const brandDiscNum=Number(brandDisc||0);
              const brandSaving=bg.subtotal*brandDiscNum/100;
              const expanded=!!expandedBrands[bg.brand];
              const anyOverride=bg.products.some(p=>{const ov=discounts["item:"+p.product.id]; return ov!==undefined&&ov!=="";});
              return(
                <div key={bg.brand} style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:12,padding:"16px 18px",marginBottom:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
                    <button onClick={()=>setExpandedBrands(prev=>({...prev,[bg.brand]:!expanded}))}
                      style={{border:"none",background:"none",cursor:"pointer",fontSize:16,color:"#475569",padding:0,width:20}}>
                      {expanded?"▾":"▸"}
                    </button>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:14,color:"#0f172a"}}>{bg.brand}</div>
                      <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{bg.count} product{bg.count>1?"s":""} · List subtotal: {fmtINR(bg.subtotal)}</div>
                      {brandDiscNum>0&&<div style={{fontSize:12,color:"#059669",marginTop:2,fontWeight:600}}>Saving: {fmtINR(brandSaving)} ({brandDiscNum}%)</div>}
                      {anyOverride&&<div style={{fontSize:11,color:"#b45309",marginTop:2}}>Some products have a custom discount — expand to view</div>}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:13,color:"#475569"}}>Discount</span>
                      <input type="number" min="0" max="100" value={brandDisc} placeholder="0"
                        onChange={e=>setDiscounts(prev=>({...prev,[brandKey]:e.target.value}))}
                        style={{...inp,width:72,textAlign:"center",fontSize:14,fontWeight:700}}/>
                      <span style={{fontSize:13,color:"#475569"}}>%</span>
                    </div>
                  </div>
                  {expanded&&(
                    <div style={{marginTop:12,paddingTop:12,borderTop:"1px dashed #cbd5e1",display:"flex",flexDirection:"column",gap:8}}>
                      {bg.products.map(p=>{
                        const itemKey="item:"+p.product.id;
                        const ov=discounts[itemKey];
                        const hasOv=ov!==undefined&&ov!=="";
                        const effDisc=Number(hasOv?ov:(brandDisc||0));
                        const lineSubtotal=p.product.listPrice*p.qty;
                        const saving=lineSubtotal*effDisc/100;
                        return(
                          <div key={p.product.id} style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap",paddingLeft:28}}>
                            <div style={{flex:1}}>
                              <div style={{fontWeight:600,fontSize:13,color:"#334155"}}>{p.product.specs||p.product.code}</div>
                              <div style={{fontSize:11,color:"#94a3b8",marginTop:1}}>Qty {p.qty} · {fmtINR(lineSubtotal)}{!hasOv?" · using brand rate":""}</div>
                              {effDisc>0&&<div style={{fontSize:11,color:"#059669",marginTop:1,fontWeight:600}}>Saving: {fmtINR(saving)} ({effDisc}%)</div>}
                            </div>
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <input type="number" min="0" max="100" value={ov===undefined?"":ov} placeholder={brandDisc||"0"}
                                onChange={e=>setDiscounts(prev=>({...prev,[itemKey]:e.target.value}))}
                                style={{...inp,width:64,textAlign:"center",fontSize:13,fontWeight:600}}/>
                              <span style={{fontSize:12,color:"#475569"}}>%</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
            <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:12,padding:"14px 18px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:14,fontWeight:600,color:"#166534"}}>Total after discounts (excl. GST)</span>
              <span style={{fontSize:18,fontWeight:800,color:"#059669"}}>
                {fmtINR(basket.reduce((sum,b)=>{
                  const k=b.product.brand+(b.product.family?"/"+b.product.family:"");
                  return sum+b.product.listPrice*b.qty*(1-Number(discounts[k]||0)/100);
                },0))}
              </span>
            </div>
          </div>
          <div style={{padding:"16px 24px",borderTop:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",gap:8}}>
            <button onClick={()=>setStep(2)} style={sBtn}>← Back</button>
            <button onClick={()=>onFinish(finalItems())}
              style={{...greenBtn,fontSize:14,padding:"10px 24px",display:"flex",alignItems:"center",gap:8}}>
              ✅ Confirm &amp; Generate Quotation
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── STEP 2: BASKET / QTY REVIEW ──
  if(step===2){
    return(
      <div style={overlay}>
        <div style={card}>
          <div style={{background:"#0f172a",borderRadius:"16px 16px 0 0",padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{color:"#fff",fontWeight:700,fontSize:16}}>Step 2 — Review & set quantities</div>
              <div style={{color:"#94a3b8",fontSize:12,marginTop:2}}>{basket.length} product{basket.length!==1?"s":""} selected</div>
            </div>
            <button onClick={onClose} style={{background:"transparent",border:"1px solid #334155",color:"#94a3b8",borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:13}}>✕</button>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
            {basket.length===0&&(
              <div style={{textAlign:"center",padding:"40px 0",color:"#94a3b8"}}>
                <div style={{fontSize:32}}>🛒</div>
                <div style={{marginTop:8}}>No products selected yet</div>
                <button onClick={()=>setStep(1)} style={{...pBtn,marginTop:12}}>← Go back and select</button>
              </div>
            )}
            {basket.map((b,idx)=>{
              const lineTotal=b.product.listPrice*b.qty;
              return(
                <div key={b.product.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid #f1f5f9"}}>
                  {b.product.photoUrl?(
                    <img src={b.product.photoUrl} alt="" style={{width:48,height:48,objectFit:"contain",borderRadius:8,background:"#f8fafc",border:"1px solid #e2e8f0",flexShrink:0}}
                      onError={e=>e.target.style.display="none"}/>
                  ):(
                    <div style={{width:48,height:48,background:"#f1f5f9",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>📦</div>
                  )}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                      <span style={{fontSize:10,fontWeight:700,color:"#fff",background:BRAND_COLORS[b.product.brand]||"#64748b",padding:"2px 7px",borderRadius:6}}>{b.product.brand}</span>
                      <span style={{fontSize:13,fontWeight:600}}>{b.product.specs}</span>
                    </div>
                    <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{b.product.code} · {b.product.family} · {b.product.unit}</div>
                    <div style={{fontSize:12,color:"#475569",marginTop:2}}>{fmtINR(b.product.listPrice)} × {b.qty} = <strong>{fmtINR(lineTotal)}</strong></div>
                  </div>
                  <div style={{display:"flex",align:"center",gap:8,flexShrink:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <button onClick={()=>setQty(b.product.id,b.qty-1)} style={{width:28,height:28,border:"1px solid #e2e8f0",borderRadius:6,background:"#fff",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                      <input type="number" min="1" value={b.qty} onChange={e=>setQty(b.product.id,e.target.value)}
                        style={{...inp,width:52,textAlign:"center",padding:"4px",fontSize:14,fontWeight:700}}/>
                      <button onClick={()=>setQty(b.product.id,b.qty+1)} style={{width:28,height:28,border:"1px solid #e2e8f0",borderRadius:6,background:"#fff",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                    </div>
                    <button onClick={()=>removeFromBasket(b.product.id)} style={{width:28,height:28,border:"none",background:"none",color:"#ef4444",cursor:"pointer",fontSize:18}}>×</button>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{padding:"12px 20px",background:"#f8fafc",borderTop:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
            <div style={{fontSize:13,color:"#475569"}}>
              {basket.length} items · List total: <strong>{fmtINR(basket.reduce((s,b)=>s+b.product.listPrice*b.qty,0))}</strong>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setStep(1)} style={sBtn}>← Add more</button>
              <button onClick={()=>setStep(3)} disabled={basket.length===0}
                style={{...pBtn,opacity:basket.length===0?0.5:1}}>Set discounts →</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── STEP 1: PRODUCT SELECTION ──
  return(
    <div style={overlay}>
      <div style={card}>
        {/* Header */}
        <div style={{background:"#0f172a",borderRadius:"16px 16px 0 0",padding:"16px 20px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{color:"#fff",fontWeight:700,fontSize:16}}>Step 1 — Select Products</div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {basket.length>0&&(
                <button onClick={()=>setStep(2)}
                  style={{background:"#059669",border:"none",color:"#fff",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:6}}>
                  🛒 {basket.length} selected → Review
                </button>
              )}
              <button onClick={onClose} style={{background:"transparent",border:"1px solid #334155",color:"#94a3b8",borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:13}}>✕</button>
            </div>
          </div>
          {/* Mode tabs */}
          <div style={{display:"flex",gap:4}}>
            {[["browse","🔍 Browse by Brand"],["code","# Direct Code Search"]].map(([m,label])=>(
              <button key={m} onClick={()=>setMode(m)}
                style={{padding:"6px 14px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,
                  background:mode===m?"#fff":  "transparent",color:mode===m?"#0f172a":"#94a3b8"}}>
                {label}
              </button>
            ))}
          </div>
        </div>

        {loading&&<div style={{textAlign:"center",padding:40,color:"#64748b"}}>⏳ Loading catalog…<br/><span style={{fontSize:12,color:"#94a3b8"}}>Use ⬆ CSV button in nav if this takes too long</span></div>}
        {!loading&&products.length===0&&(
          <div style={{textAlign:"center",padding:40}}>
            <div style={{fontSize:28}}>📂</div>
            <div style={{fontWeight:600,marginTop:8}}>No products loaded</div>
            <div style={{fontSize:13,color:"#64748b",marginTop:4}}>Click <strong>↻ Sync Sheet</strong> or <strong>⬆ CSV</strong> in the top bar to load your catalog first.</div>
          </div>
        )}

        {/* ── CODE SEARCH MODE ── */}
        {mode==="code"&&!loading&&products.length>0&&(
          <div style={{flex:1,overflowY:"auto",padding:"20px"}}>
            <div style={{marginBottom:20}}>
              <label style={{fontSize:13,fontWeight:600,color:"#475569",display:"block",marginBottom:8}}>Enter product code exactly</label>
              <input value={codeQ} onChange={e=>setCodeQ(e.target.value)} placeholder="e.g. 40040150"
                style={{...inp,width:"100%",fontSize:15,fontWeight:600,letterSpacing:"0.5px"}} autoFocus/>
            </div>
            {codeQ&&!codeResult&&(
              <div style={{textAlign:"center",padding:24,color:"#94a3b8"}}>
                <div style={{fontSize:24}}>🔍</div>
                <div style={{marginTop:8,fontSize:13}}>No product found with code "{codeQ}"</div>
                <div style={{fontSize:12,marginTop:4}}>Check the code or switch to Browse mode</div>
              </div>
            )}
            {codeResult&&(
              <div style={{border:"2px solid "+(isInBasket(codeResult.id)?"#059669":"#e2e8f0"),borderRadius:14,padding:0,overflow:"hidden"}}>
                <div style={{display:"flex",gap:16,padding:"16px 20px",alignItems:"flex-start"}}>
                  {codeResult.photoUrl?(
                    <img src={codeResult.photoUrl} alt="" style={{width:80,height:80,objectFit:"contain",borderRadius:10,background:"#f8fafc",border:"1px solid #e2e8f0",flexShrink:0}}
                      onError={e=>e.target.style.display="none"}/>
                  ):(
                    <div style={{width:80,height:80,background:"#f1f5f9",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,flexShrink:0}}>📦</div>
                  )}
                  <div style={{flex:1}}>
                    <div style={{fontSize:11,fontWeight:700,color:BRAND_COLORS[codeResult.brand]||"#64748b",fontFamily:"monospace",letterSpacing:"0.5px",marginBottom:4}}>{codeResult.code}</div>
                    <div style={{fontWeight:700,fontSize:15,color:"#0f172a",lineHeight:1.3,marginBottom:4}}>{codeResult.specs}</div>
                    <div style={{fontSize:12,color:"#64748b"}}>{codeResult.brand} · {codeResult.family} · {codeResult.unit}</div>
                    <div style={{fontSize:14,fontWeight:700,color:"#0f172a",marginTop:6}}>{fmtINR(codeResult.listPrice)} <span style={{fontSize:11,color:"#64748b",fontWeight:400}}>+ GST {codeResult.gst}%</span></div>
                  </div>
                </div>
                <div style={{padding:"0 20px 16px",display:"flex",justifyContent:"flex-end"}}>
                  {isInBasket(codeResult.id)?(
                    <button onClick={()=>removeFromBasket(codeResult.id)} style={{...sBtn,color:"#ef4444",borderColor:"#fecaca"}}>✕ Remove from selection</button>
                  ):(
                    <button onClick={()=>{ addToBasket(codeResult); setCodeQ(""); setCodeResult(null); }}
                      style={greenBtn}>+ Add to selection</button>
                  )}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── BROWSE MODE ── */}
        {mode==="browse"&&!loading&&products.length>0&&(
          <div style={{flex:1,display:"flex",overflow:"hidden"}}>
            {/* Brand column */}
            <div style={{width:160,borderRight:"1px solid #e2e8f0",overflowY:"auto",flexShrink:0,background:"#f8fafc"}}>
              <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",padding:"10px 12px 6px",textTransform:"uppercase",letterSpacing:"0.5px"}}>Brand</div>
              {brands.map(b=>(
                <div key={b} onClick={()=>{ setSelBrand(b); setSelFamily(null); }}
                  style={{padding:"9px 12px",cursor:"pointer",fontSize:13,fontWeight:selBrand===b?700:400,
                    background:selBrand===b?"#fff":"transparent",color:selBrand===b?"#0f172a":"#475569",
                    borderRight:selBrand===b?"3px solid #0ea5e9":"3px solid transparent",
                    display:"flex",alignItems:"center",gap:6}}>
                  <span style={{width:8,height:8,borderRadius:"50%",background:BRAND_COLORS[b]||"#94a3b8",flexShrink:0,display:"inline-block"}}></span>
                  {b}
                </div>
              ))}
            </div>

            {/* Family column */}
            {selBrand&&(
              <div style={{width:180,borderRight:"1px solid #e2e8f0",overflowY:"auto",flexShrink:0}}>
                <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",padding:"10px 12px 6px",textTransform:"uppercase",letterSpacing:"0.5px"}}>Product Family</div>
                {families.length===0&&<div style={{padding:"12px",fontSize:12,color:"#94a3b8"}}>No families found</div>}
                {families.map(f=>(
                  <div key={f} onClick={()=>setSelFamily(f)}
                    style={{padding:"9px 12px",cursor:"pointer",fontSize:12,fontWeight:selFamily===f?700:400,
                      background:selFamily===f?"#eff6ff":"transparent",color:selFamily===f?"#1d4ed8":"#475569",
                      borderRight:selFamily===f?"3px solid #3b82f6":"3px solid transparent"}}>
                    {f}
                  </div>
                ))}
              </div>
            )}

            {/* Products column */}
            {selBrand&&selFamily&&(
              <div style={{flex:1,overflowY:"auto",padding:"10px 12px"}}>
                <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.5px"}}>
                  {selBrand} · {selFamily} — {familyProducts.length} products
                </div>
                {familyProducts.map(p=>{
                  const inB=isInBasket(p.id);
                  return(
                    <div key={p.id}
                      style={{display:"flex",alignItems:"center",gap:10,padding:"10px 8px",borderRadius:10,marginBottom:6,border:"1px solid "+(inB?"#bbf7d0":"#e2e8f0"),background:inB?"#f0fdf4":"#fff",cursor:"pointer",transition:"all 0.1s"}}
                      onClick={()=>inB?removeFromBasket(p.id):addToBasket(p)}>
                      {p.photoUrl?(
                        <img src={p.photoUrl} alt="" style={{width:44,height:44,objectFit:"contain",borderRadius:8,background:"#f8fafc",border:"1px solid #e2e8f0",flexShrink:0}}
                          onError={e=>e.target.style.display="none"}/>
                      ):(
                        <div style={{width:44,height:44,background:"#f1f5f9",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>📦</div>
                      )}
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:10,color:Q_TEAL,fontFamily:"monospace",fontWeight:700}}>{p.code}</div>
                        <div style={{fontSize:12,fontWeight:600,lineHeight:1.3,color:"#0f172a"}}>{p.specs}</div>
                        <div style={{fontSize:11,color:"#64748b",marginTop:1}}>{p.unit} · {fmtINR(p.listPrice)}</div>
                      </div>
                      <div style={{flexShrink:0}}>
                        {inB?(
                          <div style={{width:26,height:26,borderRadius:"50%",background:"#059669",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:14}}>✓</div>
                        ):(
                          <div style={{width:26,height:26,borderRadius:"50%",border:"2px solid #e2e8f0",display:"flex",alignItems:"center",justifyContent:"center",color:"#94a3b8",fontSize:16}}>+</div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
            {selBrand&&!selFamily&&(
              <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"#94a3b8",fontSize:14}}>
                ← Select a product family
              </div>
            )}
            {!selBrand&&(
              <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"#94a3b8",fontSize:14}}>
                ← Select a brand to start
              </div>
            )}
          </div>
        )}

        {/* Footer */}
        <div style={{padding:"12px 20px",borderTop:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,background:"#f8fafc"}}>
          <div style={{fontSize:13,color:"#475569"}}>
            {basket.length>0?`${basket.length} product${basket.length!==1?"s":""} in selection`:"Select products above"}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onClose} style={sBtn}>Cancel</button>
            <button onClick={()=>setStep(2)} disabled={basket.length===0}
              style={{...pBtn,opacity:basket.length===0?0.5:1}}>
              Review {basket.length>0?basket.length:""} selected →
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function QuotationBuilder({site,products,loadingProducts,onSave,onClose,createdBy}){

By placing an order, the client confirms acceptance of these terms.`);
  const [notes,setNotes]=useState("");

  const [sending,setSending]=useState(false);
  const [sent,setSent]=useState(false);
  const [sendStatus,setSendStatus]=useState("");

  function removeItem(id){ setItems(prev=>prev.filter(i=>i.id!==id)); }
  function updateItem(id,field,value){ setItems(prev=>prev.map(i=>i.id===id?{...i,[field]:value}:i)); }

  const totals=useMemo(()=>{
    let subTotal=0,totalGST=0,totalAmt=0;
    items.forEach(item=>{
      const hasDisc=(item.discount||0)>0;
      const netPrice=item.netPrice||(hasDisc?item.listPrice*(1-(item.discount||0)/100):item.listPrice);
      const base=netPrice*item.qty;
      const gstAmt=base*(item.gst/100);
      subTotal+=base; totalGST+=gstAmt; totalAmt+=base+gstAmt;
    });
    return {subTotal,totalGST,totalAmt};
  },[items]);

  async function handleSaveAndSend(){
    setSending(true);
    const q={id:makeId(),quoteNum,quoteDate,validDays,items,terms,notes,...totals,createdBy:createdBy||"",createdAt:today()};
    onSave(q);
    try{
      // Pre-load all product images as base64 before generating PDF
      const imgUrls = [...new Set(items.map(i=>i.photoUrl).filter(u=>u&&u.startsWith("http")))];
      setSendStatus(imgUrls.length > 0 ? `Loading images (0/${imgUrls.length})…` : "Generating PDF…");
      const imgCache = await preloadImages(items, (done,total)=>{
        setSendStatus(`Loading images (${done}/${total})…`);
      });
      const loaded = Object.keys(imgCache).length;
      setSendStatus(`Generating PDF… (${loaded}/${imgUrls.length} images loaded)`);
      // Generate PDF with image cache
      const doc = generateQuotePDF(site, items, quoteNum, quoteDate, validDays, terms, createdBy||COMPANY.name, imgCache);
      const filename = `${quoteNum}_${site.ownerName.replace(/\s+/g,"-")}.pdf`;
      const caption  = buildTelegramCaption(site, quoteNum, items, totals, createdBy||"Team");
      setSendStatus("Sending to Telegram…");
      await sendTelegramPDF(doc, filename, caption);
      setSendStatus("Downloading PDF…");
      doc.save(filename);
      setSent(true);
      setSendStatus("");
    }catch(e){
      console.error("Send error:", e);
      setSent(true);
      setSendStatus("");
    }
    setSending(false);
  }

  if(showPrint) return <QuotationPrint site={site} items={items} quoteNum={quoteNum} quoteDate={quoteDate} validDays={validDays} terms={terms} notes={notes} totals={totals} createdBy={createdBy} onBack={()=>setShowPrint(false)} onSaveAndClose={async()=>{ await handleSaveAndSend(); onClose(); }}/>;

  return(

        <div style={{padding:"16px 20px",borderBottom:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,background:"#0f172a",borderRadius:"16px 16px 0 0"}}>
          <div>

                    const lineAmt=netPrice*item.qty;
                    const gstAmt=lineAmt*(item.gst/100);
                    return(
                      <tr key={item.id} style={{borderBottom:"1px solid #e2e8f0",background:idx%2===0?"#fff":"#f8fffe"}}>

                          ):(

                        {/* Sr No */}

                        {/* Product name + brand + note */}

                          <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",marginBottom:2}}>

          <div style={{display:"flex",gap:8}}>
            <button onClick={onClose} style={sBtn}>Discard</button>

            <button onClick={handleSaveAndSend} disabled={items.length===0||sending}
              style={{...greenBtn,opacity:(items.length===0||sending)?0.6:1,display:"flex",alignItems:"center",gap:6}}>
              {sending?(sendStatus||"⏳ Processing…"):"✅ Save & Send"}
            </button>
          </div>
        </div>
      </div>
      {showSelector&&<SmartProductSelector products={products} loading={loadingProducts} currentBasket={items.map(i=>({product:i,qty:i.qty}))} onFinish={newItems=>{ setItems(newItems); setShowSelector(false); }} onClose={()=>setShowSelector(false)}/>}
    </div>
  );
}

                      <div style={{fontSize:10,fontWeight:700,color:Q_TEAL,fontFamily:"monospace",letterSpacing:"0.5px",marginBottom:2}}>{item.code||item.brand.toUpperCase().replace(/\s/g,"-")}</div>

          <div style={{marginTop:32,borderTop:"2px solid "+Q_TEAL,paddingTop:20,display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>

              <div style={{fontSize:10,color:"#9ca3af",marginTop:8}}>This is a computer-generated quotation.</div>

            <div style={{textAlign:"right"}}>
              <div style={{height:44,borderBottom:"1.5px solid "+Q_DARK,width:160,marginBottom:5}}/>
              <div style={{fontSize:11,color:Q_GRAY}}>Authorised Signatory</div>
              <div style={{fontSize:12,fontWeight:700,color:Q_DARK,marginTop:2}}>{COMPANY.name}</div>

  );
}

// ─── QUOTATION LIST ──────────────────────────────────────────────────────────
function QuotationsList({site,products,loadingProducts,onUpdateSite}){
  const [showBuilder,setShowBuilder]=useState(false);
  const [viewingQuote,setViewingQuote]=useState(null);
  const quotations=site.quotations||[];

  function saveQuote(q){
    const updated=[...quotations,q];
    onUpdateSite({quotations:updated});
  }
  function deleteQuote(id){
    if(window.confirm("Delete this quotation?")) onUpdateSite({quotations:quotations.filter(q=>q.id!==id)});
  }

  if(viewingQuote){
    const q=viewingQuote;
    return <QuotationPrint site={site} items={q.items} quoteNum={q.quoteNum} quoteDate={q.quoteDate} validDays={q.validDays} terms={q.terms} notes={q.notes} totals={q.totals||{subTotal:0,totalGST:0,totalAmt:0}} onBack={()=>setViewingQuote(null)} onSaveAndClose={()=>setViewingQuote(null)}/>;
  }

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:14}}>Quotations <span style={{color:"#94a3b8",fontWeight:400}}>({quotations.length})</span></div>
        <button onClick={()=>setShowBuilder(true)} style={greenBtn}>+ New quotation</button>
      </div>
      {quotations.length===0&&(
        <div style={{textAlign:"center",padding:"40px 0",color:"#94a3b8",border:"2px dashed #e2e8f0",borderRadius:12}}>
          <div style={{fontSize:28,marginBottom:8}}>📄</div>
          <div style={{fontSize:14}}>No quotations yet</div>
          <div style={{fontSize:12,marginTop:4}}>Create one from the product catalog</div>
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {quotations.map(q=>(
          <div key={q.id} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <div>
              <div style={{fontWeight:700,fontSize:14,color:"#0f172a"}}>{q.quoteNum}</div>
              <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{q.quoteDate} · {q.items?.length||0} items · {fmtINR(q.totalAmt||q.totals?.totalAmt)}</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setViewingQuote(q)} style={sBtn}>👁 View / Print</button>
              <button onClick={()=>deleteQuote(q.id)} style={{...sBtn,color:"#ef4444",borderColor:"#fecaca"}}>Delete</button>
            </div>
          </div>
        ))}
      </div>
      {showBuilder&&<QuotationBuilder site={site} products={products} loadingProducts={loadingProducts} onSave={saveQuote} onClose={()=>setShowBuilder(false)} createdBy={site.assignedTo}/>}
    </div>
  );
}

// ─── PITCH EDIT ──────────────────────────────────────────────────────────────
function PitchEditInline({currentStatus,currentNote,onSave,onCancel}){
  const [status,setStatus]=useState(currentStatus);
  const [note,setNote]=useState(currentNote);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:6,minWidth:200}}>
      <div style={{display:"flex",gap:4}}>
        {["pending","pitched","won","lost"].map(s=>(
          <button key={s} onClick={()=>setStatus(s)}
            style={{flex:1,padding:"5px 0",borderRadius:6,border:"1px solid "+(status===s?statusColors[s]:"#e2e8f0"),background:status===s?statusBg[s]:"#fff",color:status===s?statusColors[s]:"#94a3b8",cursor:"pointer",fontSize:11,fontWeight:600,textTransform:"capitalize"}}>{s}</button>
        ))}
      </div>
      <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Add note…" style={{...inp,fontSize:12,padding:"5px 8px"}}/>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>onSave(status,note)} style={{...pBtn,fontSize:11,padding:"5px 10px"}}>Save</button>
        <button onClick={onCancel} style={{...sBtn,fontSize:11,padding:"5px 10px"}}>Cancel</button>
      </div>
    </div>
  );
}

// ─── PITCH GRID ──────────────────────────────────────────────────────────────
function PitchGrid({site,canEdit,onUpdatePitch}){
  const si=STAGE_IDX[site.stage];
  const [expandedStage,setExpandedStage]=useState(site.stage);
  const [editPitch,setEditPitch]=useState(null);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {STAGES.map((st,i)=>{
        const products=STAGE_PRODUCTS[st.id]||[];
        if(products.length===0) return null;
        const isCurrent=st.id===site.stage,isPast=i<si,isFuture=i>si;
        const isExpanded=expandedStage===st.id;
        const pitchesHere=products.map(p=>({...p,pitch:site.pitches?.[p.id]}));
        const wonHere=pitchesHere.filter(p=>p.pitch?.status==="won").length;
        const pendHere=pitchesHere.filter(p=>!p.pitch||p.pitch.status==="pending").length;
        return(
          <div key={st.id} style={{background:"#fff",border:"1px solid "+(isCurrent?"#bfdbfe":"#e2e8f0"),borderRadius:12,overflow:"hidden",opacity:isFuture?0.6:1}}>
            <div onClick={()=>setExpandedStage(isExpanded?null:st.id)}
              style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",cursor:"pointer",background:isCurrent?"#eff6ff":isPast?"#f8fafc":"#fff"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:13,fontWeight:700}}>{st.label}</span>
                {isCurrent&&<span style={{fontSize:10,background:"#3b82f6",color:"#fff",padding:"2px 7px",borderRadius:8,fontWeight:700}}>CURRENT</span>}
                {isFuture&&<span style={{fontSize:10,color:"#94a3b8"}}>upcoming</span>}
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {wonHere>0&&<span style={{fontSize:11,color:"#065f46",background:"#d1fae5",padding:"2px 7px",borderRadius:8,fontWeight:600}}>✓ {wonHere}</span>}
                {pendHere>0&&!isFuture&&<span style={{fontSize:11,color:"#92400e",background:"#fef3c7",padding:"2px 7px",borderRadius:8,fontWeight:600}}>⚠ {pendHere}</span>}
                <span style={{color:"#94a3b8",fontSize:14}}>{isExpanded?"▲":"▼"}</span>
              </div>
            </div>
            {isExpanded&&(
              <div style={{padding:"8px 16px 14px"}}>
                {products.map(p=>{
                  const pitch=site.pitches?.[p.id];
                  const status=pitch?.status||"pending";
                  const isEditing=editPitch?.productId===p.id;
                  return(
                    <div key={p.id} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"10px 0",borderBottom:"1px solid #f1f5f9"}}>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                          <span style={{fontSize:11,fontWeight:700,color:"#fff",background:BRAND_COLORS[p.brand]||"#64748b",padding:"2px 7px",borderRadius:8}}>{p.brand}</span>
                          <span style={{fontSize:13,fontWeight:500}}>{p.name}</span>
                        </div>
                        {pitch?.note&&<div style={{fontSize:12,color:"#64748b",marginTop:2}}>📝 {pitch.note}</div>}
                        {pitch?.updatedAt&&<div style={{fontSize:11,color:"#94a3b8"}}>Updated {pitch.updatedAt}</div>}
                      </div>
                      {isEditing?(
                        <PitchEditInline currentStatus={status} currentNote={pitch?.note||""} onSave={(s,n)=>{onUpdatePitch(p.id,s,n);setEditPitch(null);}} onCancel={()=>setEditPitch(null)}/>
                      ):(
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <StatusBadge status={status}/>
                          {canEdit&&!isFuture&&<button onClick={()=>setEditPitch({productId:p.id})} style={{...sBtn,fontSize:11,padding:"4px 8px"}}>Update</button>}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── SITE DETAIL ─────────────────────────────────────────────────────────────
// ─── VISIT LOG COMPONENT ──────────────────────────────────────────────────────
const VISIT_TYPES = ["Site Visit","Plumber Meeting","Architect Meeting","PMC Meeting","Builder Meeting","Follow-up Call","WhatsApp","Meeting at Office","Demo / Presentation","Quotation Discussion","Order Follow-up","Other"];
const STAGE_OUTCOMES = ["No change","Stage advanced","Stage regressed","Order received","Lost to competitor","On hold","Client not available"];

function VisitLog({site,canEdit,currentUser,onUpdateSite}){
  const visits=(site.visits||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const blank={date:today(),type:VISIT_TYPES[0],visitedBy:currentUser.id,stage:site.stage,outcome:STAGE_OUTCOMES[0],notes:"",nextFollowUp:"",
    personMet:"",personRole:"",personPhone:"",
    gpsLat:"",gpsLng:"",gpsAddress:"",gpsLoading:false};
  const [form,setForm]=useState(blank);
  function setF(k,v){setForm(f=>({...f,[k]:v}));}

  // GPS capture
  function captureGPS(){
    if(!navigator.geolocation){ alert("GPS not available on this device"); return; }
    setF("gpsLoading",true);
    navigator.geolocation.getCurrentPosition(
      async (pos)=>{
        const lat=pos.coords.latitude.toFixed(6);
        const lng=pos.coords.longitude.toFixed(6);
        // Reverse geocode using free API
        let address=`${lat}, ${lng}`;
        try{
          const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
          const d=await r.json();
          if(d.display_name) address=d.display_name.split(",").slice(0,4).join(", ");
        }catch(e){}
        setForm(f=>({...f,gpsLat:lat,gpsLng:lng,gpsAddress:address,gpsLoading:false}));
      },
      (err)=>{ setF("gpsLoading",false); alert("GPS error: "+err.message); },
      {enableHighAccuracy:true,timeout:15000}
    );
  }

  function openAdd(){ setForm(blank); setEditId(null); setShowForm(true); }
  function openEdit(v){ setForm({...v}); setEditId(v.id); setShowForm(true); }

  function saveVisit(){
    if(!form.notes.trim()) return alert("Please add visit notes");
    const newVisits=[...(site.visits||[])];
    if(editId){
      const idx=newVisits.findIndex(v=>v.id===editId);
      if(idx>-1) newVisits[idx]={...form,id:editId};
    } else {
      newVisits.push({...form,id:makeId(),createdBy:currentUser.id,createdAt:today()});
    }
    // If stage changed in visit, update site stage too
    if(form.outcome==="Stage advanced"||form.outcome==="Stage regressed"){
      const i=STAGE_IDX[site.stage];
      const newStage=form.outcome==="Stage advanced"?STAGES[Math.min(i+1,STAGES.length-1)].id:STAGES[Math.max(i-1,0)].id;
      onUpdateSite({visits:newVisits,stage:newStage});
    } else {
      onUpdateSite({visits:newVisits});
    }
    setShowForm(false);
  }

  function deleteVisit(id){
    if(!window.confirm("Delete this visit record?")) return;
    onUpdateSite({visits:(site.visits||[]).filter(v=>v.id!==id)});
  }

  const typeColors={"Site Visit":"#0d9488","Follow-up Call":"#6366f1","WhatsApp":"#16a34a","Meeting at Office":"#0891b2","Demo / Presentation":"#f59e0b","Quotation Discussion":"#8b5cf6","Order Follow-up":"#f97316","Other":"#64748b"};
  const outcomeColors={"No change":"#64748b","Stage advanced":"#16a34a","Stage regressed":"#dc2626","Order received":"#0d9488","Lost to competitor":"#dc2626","On hold":"#f59e0b","Client not available":"#94a3b8"};

  const inpS={border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 10px",fontSize:13,width:"100%",boxSizing:"border-box"};

  return(
    <div>
      {/* Summary strip */}
      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"8px 14px",fontSize:12,fontWeight:700,color:"#166534"}}>
          📋 {visits.length} Visit{visits.length!==1?"s":""}
        </div>
        {visits[0]&&<div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:10,padding:"8px 14px",fontSize:12,color:"#475569"}}>
          🕐 Last visit: <b>{visits[0].date}</b> · {visits[0].type}
        </div>}
        {site.nextFollowUp&&<div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,padding:"8px 14px",fontSize:12,color:"#92400e",fontWeight:700}}>
          📅 Follow-up: {site.nextFollowUp}
        </div>}
        {canEdit&&<button onClick={openAdd} style={{marginLeft:"auto",background:"#0d9488",color:"#fff",border:"none",borderRadius:10,padding:"8px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
          + Add Visit
        </button>}
      </div>

      {/* Add/Edit form */}
      {showForm&&(
        <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:12,color:"#1e293b"}}>{editId?"✏️ Edit Visit":"📝 Log New Visit"}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><label style={{fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>DATE</label>
              <input type="date" value={form.date} onChange={e=>setF("date",e.target.value)} style={inpS}/></div>
            <div><label style={{fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>VISIT TYPE</label>
              <select value={form.type} onChange={e=>setF("type",e.target.value)} style={inpS}>
                {VISIT_TYPES.map(t=><option key={t}>{t}</option>)}
              </select></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><label style={{fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>VISITED BY</label>
              <select value={form.visitedBy} onChange={e=>setF("visitedBy",e.target.value)} style={inpS}>
                {USERS.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
              </select></div>
            <div><label style={{fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>SITE STAGE AT VISIT</label>
              <select value={form.stage} onChange={e=>setF("stage",e.target.value)} style={inpS}>
                {STAGES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
              </select></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><label style={{fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>OUTCOME</label>

              <div style={{fontSize:12,color:"#1e40af",background:"#dbeafe",borderRadius:6,padding:"6px 10px"}}>

          </div>

          const stageLabel=STAGES.find(s=>s.id===v.stage)?.label||v.stage;
          const typeColor=typeColors[v.type]||"#64748b";

                {/* Stage + Outcome pills */}
                <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>

                  <span style={{background:outcomeColor+"15",color:outcomeColor,fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20,border:`1px solid ${outcomeColor}40`}}>

                <div style={{fontSize:13,color:"#374151",lineHeight:1.5,background:"#f8fafc",borderRadius:8,padding:"8px 10px"}}>

                {v.personMet&&(
                  <div style={{marginTop:6,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                    <span style={{fontSize:11,background:"#f0fdf4",border:"1px solid #bbf7d0",color:"#166534",padding:"2px 8px",borderRadius:20,fontWeight:600}}>
                      🤝 {v.personMet}{v.personRole?" · "+v.personRole:""}{v.personPhone?" · "+v.personPhone:""}
                    </span>
                  </div>
                )}
                {/* GPS */}
                {v.gpsAddress&&(
                  <div style={{marginTop:6,fontSize:11,color:"#2563eb",background:"#eff6ff",borderRadius:6,padding:"4px 8px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span>📍 {v.gpsAddress.slice(0,60)}{v.gpsAddress.length>60?"…":""}</span>

                      style={{color:"#2563eb",fontWeight:700,marginLeft:8,whiteSpace:"nowrap"}}>Maps ↗</a>}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function SiteDetail({site,isAdmin,currentUser,getPendingProducts,onBack,onUpdateSite,onUpdatePitch,onDelete,onEdit,products,loadingProducts}){
  const [activeTab,setActiveTab]=useState("pitches");
  const pending=getPendingProducts(site);
  const assignee=USERS.find(u=>u.id===site.assignedTo);
  const canEdit=isAdmin||site.assignedTo===currentUser.id;
  const qCount=(site.quotations||[]).length;
  function advanceStage(){ const i=STAGE_IDX[site.stage]; if(i<STAGES.length-1) onUpdateSite({stage:STAGES[i+1].id}); }
  function regressStage(){ const i=STAGE_IDX[site.stage]; if(i>0) onUpdateSite({stage:STAGES[i-1].id}); }
  return(
    <div>
      <button onClick={onBack} style={lBtn}>← Back to sites</button>
      <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:14,padding:"20px 20px 16px",marginTop:12,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
          <div>
            <h2 style={{margin:0,fontSize:22,fontWeight:800}}>{site.ownerName}</h2>
            <div style={{fontSize:13,color:"#64748b",marginTop:4}}>{site.address} · {site.city}</div>
            <div style={{fontSize:13,color:"#64748b",marginTop:2}}>📞 {site.phone} · {site.projectType} · via {site.source}</div>
            {assignee&&<div style={{fontSize:12,color:"#94a3b8",marginTop:4}}>Assigned to: {assignee.name}</div>}
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
            <StagePill stage={site.stage}/>
            {canEdit&&(
              <div style={{display:"flex",gap:6}}>
                <button onClick={regressStage} disabled={STAGE_IDX[site.stage]===0} style={sBtn}>← Stage</button>
                <button onClick={advanceStage} disabled={STAGE_IDX[site.stage]===STAGES.length-1} style={pBtn}>Stage →</button>
              </div>
            )}
          </div>
        </div>
        {site.notes&&<div style={{marginTop:12,padding:"10px 12px",background:"#f8fafc",borderRadius:8,fontSize:13,color:"#475569"}}>{site.notes}</div>}
        {canEdit&&(
          <div style={{marginTop:12,display:"flex",gap:8}}>
            <button onClick={onEdit} style={sBtn}>✏ Edit</button>
            {isAdmin&&<button onClick={onDelete} style={{...sBtn,color:"#ef4444",borderColor:"#fecaca"}}>Delete</button>}
          </div>
        )}
      </div>
      <StageTimeline currentStage={site.stage}/>
      {pending.length>0&&(
        <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:12,padding:"14px 16px",marginBottom:16}}>
          <div style={{fontWeight:700,color:"#92400e",marginBottom:8}}>⚠ {pending.length} product{pending.length>1?"s":""} not yet pitched</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {pending.map(p=><span key={p.id} style={{fontSize:12,background:"#fef3c7",color:"#92400e",padding:"4px 10px",borderRadius:20,fontWeight:600,border:"1px solid #fcd34d"}}>{p.brand}: {p.name}</span>)}
          </div>
        </div>
      )}
      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:16,background:"#fff",borderRadius:10,padding:4,border:"1px solid #e2e8f0"}}>
        {[["pitches","Product Pitches"],["quotations",`Quotations${qCount?" ("+qCount+")":""}`],["history",`Visits${(site.visits||[]).length?" ("+(site.visits||[]).length+")":""}`]].map(([t,label])=>(
          <button key={t} onClick={()=>setActiveTab(t)}
            style={{flex:1,padding:"8px 0",borderRadius:8,border:"none",cursor:"pointer",background:activeTab===t?"#0f172a":"transparent",color:activeTab===t?"#fff":"#64748b",fontSize:13,fontWeight:600}}>
            {label}
          </button>
        ))}
      </div>
      {activeTab==="pitches"&&<PitchGrid site={site} canEdit={canEdit} onUpdatePitch={onUpdatePitch}/>}
      {activeTab==="quotations"&&<QuotationsList site={site} products={products} loadingProducts={loadingProducts} onUpdateSite={onUpdateSite}/>}
      {activeTab==="history"&&(
        <VisitLog site={site} canEdit={canEdit} currentUser={currentUser} onUpdateSite={onUpdateSite}/>
      )}
    </div>
  );
}

const DAILY_ACTIVITIES = [
  "Site Visit","Plumber Meeting","Architect Meeting","PMC Meeting","Builder Meeting",
  "Follow-up Call","WhatsApp Follow-up","Quotation Shared","Order Received",
  "Payment Follow-up","Product Demo","Office Meeting","Other"
];
const DAILY_AREAS = ["Panipat","Sonipat","Karnal","Kurukshetra","Ambala","Rohtak",

function DailyReportModal({currentUser,sites,date,existing,onSave,onClose}){
  const [entries,setEntries]=useState(existing?.entries||[{activity:"",site:"",area:"",person:"",personRole:"",notes:""}]);
  const [summary,setSummary]=useState(existing?.summary||"");

  function addEntry(){ setEntries(e=>[...e,{activity:"",site:"",area:"",person:"",personRole:"",notes:""}]); }
  function removeEntry(i){ setEntries(e=>e.filter((_,idx)=>idx!==i)); }
  function setEntry(i,k,v){ setEntries(e=>e.map((r,idx)=>idx===i?{...r,[k]:v}:r)); }

  const inpS={border:"1px solid #e2e8f0",borderRadius:7,padding:"6px 9px",fontSize:13,width:"100%",boxSizing:"border-box",background:"#fff"};
  const selS={...inpS,appearance:"none"};

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#fff",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:540,maxHeight:"92vh",overflowY:"auto",padding:20}}>

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <div style={{fontWeight:800,fontSize:16,color:"#1e293b"}}>📝 Daily Report</div>
            <div style={{fontSize:12,color:"#64748b"}}>{currentUser.name} · {date}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94a3b8"}}>×</button>
        </div>

        {/* Entries */}
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:14}}>
          {entries.map((entry,i)=>(
            <div key={i} style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:10,padding:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:12,fontWeight:700,color:"#475569"}}>Activity {i+1}</div>
                {entries.length>1&&<button onClick={()=>removeEntry(i)} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:16,padding:0}}>✕</button>}
              </div>

              {/* Row 1: Activity type */}
              <div style={{marginBottom:7}}>
                <label style={{fontSize:10,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>ACTIVITY TYPE</label>
                <select value={entry.activity} onChange={e=>setEntry(i,"activity",e.target.value)} style={selS}>
                  <option value="">Select activity…</option>
                  {DAILY_ACTIVITIES.map(a=><option key={a}>{a}</option>)}
                </select>
              </div>

              {/* Row 2: Site + Area */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:7}}>
                <div>
                  <label style={{fontSize:10,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>SITE (if applicable)</label>
                  <select value={entry.site} onChange={e=>setEntry(i,"site",e.target.value)} style={selS}>
                    <option value="">No specific site</option>
                    <option value="__new__">+ New site (add separately)</option>
                    {sites.map(s=><option key={s.id} value={s.id}>{s.ownerName}, {s.city}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{fontSize:10,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>AREA / CITY</label>
                  <select value={entry.area} onChange={e=>setEntry(i,"area",e.target.value)} style={selS}>
                    <option value="">Select area…</option>
                    {DAILY_AREAS.map(a=><option key={a}>{a}</option>)}
                  </select>
                </div>
              </div>

              {/* Row 3: Person met */}
              <div style={{display:"grid",gridTemplateColumns:"1.5fr 1fr",gap:7,marginBottom:7}}>
                <div>
                  <label style={{fontSize:10,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>PERSON MET</label>
                  <input value={entry.person} onChange={e=>setEntry(i,"person",e.target.value)} placeholder="Name" style={inpS}/>
                </div>
                <div>
                  <label style={{fontSize:10,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>ROLE</label>
                  <select value={entry.personRole} onChange={e=>setEntry(i,"personRole",e.target.value)} style={selS}>
                    <option value="">Select…</option>
                    {["Plumber","Architect","Builder","PMC","Site Owner","Other"].map(r=><option key={r}>{r}</option>)}
                  </select>
                </div>
              </div>

              {/* Notes */}
              <div>
                <label style={{fontSize:10,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>NOTES / OUTCOME</label>
                <textarea value={entry.notes} onChange={e=>setEntry(i,"notes",e.target.value)}
                  rows={2} placeholder="What happened? Any follow-up needed?"
                  style={{...inpS,resize:"vertical"}}/>
              </div>

              {entry.site==="__new__"&&(
                <div style={{marginTop:8,background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"8px 10px",fontSize:12,color:"#1d4ed8"}}>
                  ℹ️ Please close this modal and add the new site first using <b>"Add New Site"</b>, then come back to log this activity.
                </div>
              )}
            </div>
          ))}
        </div>

        <button onClick={addEntry}
          style={{width:"100%",background:"#f1f5f9",border:"1px dashed #94a3b8",borderRadius:8,padding:"8px",fontSize:13,color:"#475569",cursor:"pointer",marginBottom:12,fontWeight:600}}>
          + Add Another Activity
        </button>

        {/* Day Summary */}
        <div style={{marginBottom:14}}>
          <label style={{fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:4}}>DAY SUMMARY (optional)</label>
          <textarea value={summary} onChange={e=>setSummary(e.target.value)} rows={2}
            placeholder="Overall summary of today's work, key insights, blockers…"
            style={{...inpS,resize:"vertical"}}/>
        </div>

        {/* Footer buttons */}
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:"10px",borderRadius:8,border:"1px solid #e2e8f0",background:"#f8fafc",cursor:"pointer",fontSize:13,fontWeight:600}}>Cancel</button>
          <button onClick={()=>{
            const valid=entries.filter(e=>e.activity||e.notes);
            if(!valid.length) return alert("Please add at least one activity");
            onSave({entries:valid,summary,submittedAt:new Date().toISOString(),submittedBy:currentUser.id});
          }} style={{flex:2,padding:"10px",borderRadius:8,border:"none",background:"#0d9488",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}>
            ✅ Submit Daily Report
          </button>
        </div>
      </div>
    </div>
  );
}

function Dashboard({sites,contacts,currentUser,isAdmin,onGoSites,onOpenSite,getPendingProducts,products,loadingProducts,onSaveQuote}){
  const alertSites=sites.filter(s=>getPendingProducts(s).length>0);
  const stageCount=Object.fromEntries(STAGES.map(s=>[s.id,0]));
  sites.forEach(s=>{ if(stageCount[s.stage]!==undefined) stageCount[s.stage]++; });
  const won=sites.reduce((a,s)=>a+Object.values(s.pitches||{}).filter(p=>p.status==="won").length,0);
  const lost=sites.reduce((a,s)=>a+Object.values(s.pitches||{}).filter(p=>p.status==="lost").length,0);
  const pitched=sites.reduce((a,s)=>a+Object.values(s.pitches||{}).filter(p=>p.status==="pitched").length,0);
  const totalQuotes=(sites.reduce((a,s)=>a+(s.quotations||[]).length,0));
  const totalQuoteVal=sites.reduce((a,s)=>a+(s.quotations||[]).reduce((b,q)=>b+(q.totalAmt||q.totals?.totalAmt||0),0),0);

  // Daily reports storage per user
  const [dailyReports,setDailyReports]=useState(()=>{
    try{ const s=localStorage.getItem("ew_daily_reports_"+currentUser.id); return s?JSON.parse(s):{}; }catch(e){ return {}; }
  });
  useEffect(()=>{ try{ localStorage.setItem("ew_daily_reports_"+currentUser.id,JSON.stringify(dailyReports)); }catch(e){} },[dailyReports]);

  const [showDailyReport,setShowDailyReport]=useState(false);
  const [showSitePicker,setShowSitePicker]=useState(false);
  const [pickedSite,setPickedSite]=useState(null);
  const [siteSearch,setSiteSearch]=useState("");
  const [showReports,setShowReports]=useState(false);
  const [reportStatus,setReportStatus]=useState("");
  const [reportMonthOffset,setReportMonthOffset]=useState(0);

  const filteredSites=useMemo(()=>{
    if(!siteSearch.trim()) return sites.slice(0,20);
    const q=siteSearch.toLowerCase();
    return sites.filter(s=>s.ownerName.toLowerCase().includes(q)||s.city.toLowerCase().includes(q)).slice(0,20);
  },[sites,siteSearch]);

  function openPicker(){ setSiteSearch(""); setPickedSite(null); setShowSitePicker(true); }

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div>
          <h2 style={{margin:0,fontSize:20,fontWeight:700}}>Good morning, {currentUser.name.split(" ")[0]} 👋</h2>
          <p style={{margin:"4px 0 0",color:"#64748b",fontSize:14}}>{isAdmin?`All ${sites.length} sites`:`Your sites: ${sites.length}`}</p>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {/* Daily Report Button */}

            style={{display:"flex",alignItems:"center",gap:6,background:dailyReports[today()]?"linear-gradient(135deg,#16a34a,#15803d)":"linear-gradient(135deg,#2563eb,#1d4ed8)",color:"#fff",border:"none",borderRadius:10,padding:"10px 16px",cursor:"pointer",fontSize:13,fontWeight:700,boxShadow:"0 2px 8px rgba(37,99,235,0.35)"}}>
            <span style={{fontSize:16}}>{dailyReports[today()]?"✅":"📝"}</span>
            {dailyReports[today()]?"Report Done":"Daily Report"}
          </button>
          {/* New Quotation Button */}
          <button onClick={openPicker}
            style={{display:"flex",alignItems:"center",gap:8,background:"linear-gradient(135deg,#059669,#0d9488)",color:"#fff",border:"none",borderRadius:10,padding:"10px 18px",cursor:"pointer",fontSize:14,fontWeight:700,boxShadow:"0 2px 8px rgba(5,150,105,0.35)"}}>
            <span style={{fontSize:18}}>📄</span> New Quotation
          </button>
        </div>

      {/* SITE PICKER MODAL */}
      {showSitePicker&&!pickedSite&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:480,maxHeight:"80vh",display:"flex",flexDirection:"column"}}>
            <div style={{padding:"18px 20px 12px",borderBottom:"1px solid #e2e8f0"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <h3 style={{margin:0,fontSize:16,fontWeight:700}}>Select site for quotation</h3>

              </div>
              <input value={siteSearch} onChange={e=>setSiteSearch(e.target.value)}
                placeholder="Search by owner name or city…" autoFocus
                style={{...inp,width:"100%",boxSizing:"border-box",fontSize:13}}/>
            </div>
            <div style={{overflowY:"auto",flex:1,padding:"8px 12px 12px"}}>
              {filteredSites.length===0&&<div style={{textAlign:"center",padding:24,color:"#94a3b8",fontSize:13}}>No sites found</div>}
              {filteredSites.map(site=>{
                const qCount=(site.quotations||[]).length;
                return(
                  <div key={site.id} onClick={()=>setPickedSite(site)}

                    onMouseEnter={e=>e.currentTarget.style.background="#f0fdf4"}
                    onMouseLeave={e=>e.currentTarget.style.background="#fafafa"}>
                    <div>
                      <div style={{fontWeight:600,fontSize:14}}>{site.ownerName}</div>
                      <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{site.city} · {site.projectType} · {STAGES.find(s=>s.id===site.stage)?.label}</div>

                    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                      <StagePill stage={site.stage}/>

            </div>
            <div style={{padding:"10px 20px",borderTop:"1px solid #e2e8f0",fontSize:12,color:"#94a3b8",textAlign:"center"}}>
              {sites.length} sites available
