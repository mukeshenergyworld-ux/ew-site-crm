function CRMApp(){
  const [currentUser,setCurrentUser]=useState(null);
  const [sites,setSites]=useState(loadSites);
  const [sitesSynced,setSitesSynced]=useState(null);
  const [sitesSyncStatus,setSitesSyncStatus]=useState("idle");
  useEffect(()=>{ pullSitesFromServer(true); },[]);
  const [contacts,setContacts]=useState(()=>{
    try{ const s=localStorage.getItem("ew_contacts"); return s?JSON.parse(s):[]; }catch(e){ return []; }
  });
  const [appUsers,setAppUsers]=useState(()=>loadUsers());
  useEffect(()=>{ pullUsersFromServer(setAppUsers); },[]);
  const [permissions,setPermissions]=useState(()=>loadPermissions());
  const [view,setView]=useState("dashboard");
  const [activeSiteId,setActiveSiteId]=useState(null);
  const [filterStage,setFilterStage]=useState("all");
  const [filterAssigned,setFilterAssigned]=useState("all");
  const [filterAlert,setFilterAlert]=useState(false);
  const [searchQ,setSearchQ]=useState("");
  const [showAddSite,setShowAddSite]=useState(false);
  const [editingSite,setEditingSite]=useState(null);

  // ── Product catalog state ──
  const [products,setProducts]=useState([]);
  const [syncStatus,setSyncStatus]=useState("idle"); // idle | loading | success | error
  const [syncMsg,setSyncMsg]=useState("");
  const [lastSynced,setLastSynced]=useState(null);
  const [showUploadModal,setShowUploadModal]=useState(false);

  const isAdmin=currentUser?.role==="admin";
  const userCan=(perm)=>can(perm, currentUser, permissions);

  useEffect(()=>{ saveSites(sites); },[sites]);
  useEffect(()=>{ saveUsers(appUsers); appUsers.forEach(u=>pushUserToServer(u)); },[appUsers]);
  useEffect(()=>{ savePermissions(permissions); },[permissions]);

  function updateUserPassword(userId, newPwd){
    setAppUsers(prev=>prev.map(u=>u.id===userId?{...u,password:newPwd}:u));
  }
  function toggleUserActive(userId){
    setAppUsers(prev=>prev.map(u=>u.id===userId?{...u,active:!u.active}:u));
  }
  function updateUserProfile(userId, patch){
    setAppUsers(prev=>prev.map(u=>u.id===userId?{...u,...patch}:u));
  }
  function addNewUser(name, phone, role){
    const id = "u"+Date.now();
    const newUser = {id, name, phone, role, password: role==="admin"?"admin123":"ew2024", active:false};
    setAppUsers(prev=>[...prev, newUser]);
  }
  function updatePermission(perm, roles){
    setPermissions(prev=>({...prev,[perm]:roles}));
  }

  // Auto-sync on login — Web App is always fresh, no CORS issues
  useEffect(()=>{
    if(!currentUser) return;
    const cached=localStorage.getItem("ew_products_v2");
    const cachedTime=localStorage.getItem("ew_products_time_v2");
    const CACHE_TTL = 30*60*1000; // 30 min cache
    if(cached&&cachedTime&&(Date.now()-Number(cachedTime)<CACHE_TTL)){
      try{
        const parsed=JSON.parse(cached);
        if(parsed.length>0){
          setProducts(parsed);
          setLastSynced(new Date(Number(cachedTime)));
          setSyncStatus("success");
          setSyncMsg(parsed.length+" products loaded from cache");
          setTimeout(()=>setSyncMsg(""),3000);
          return;
        }
      }catch{}
    }
    // No fresh cache — auto-fetch from Web App
    fetchProducts(true);
  },[currentUser]);

  // Fetch from Web App (primary) or CSV publish URL (fallback)
  async function fetchProducts(silent=false){
    setSyncStatus("loading");
    setSyncMsg("Syncing from Google Sheet…");

    // PRIMARY: Google Apps Script Web App — always fresh, no CORS
    try{
      const controller = new AbortController();
      setTimeout(()=>controller.abort(), 15000);
      const res = await fetch(WEBAPP_URL+"?action=catalog&t="+Date.now(), {signal: controller.signal});
      if(!res.ok) throw new Error("Web App HTTP "+res.status);
      const rows = await res.json();
      if(!Array.isArray(rows)) throw new Error("Invalid response from Web App");
      // Parse rows — format: [sno, code, family, specs, cat, unit, price, brand, hsn, pic]
      const products = rows.map((row,i)=>{
        const get = (j) => (row[j]||"").toString().trim();
        const code=get(1), family=get(2), specs=get(3), cat=get(4);
        const unit=get(5)||"Per Pc.", brand=get(7), photoUrl=get(9);
        const priceRaw=get(6).replace(/[^0-9.]/g,"");
        const listPrice=parseFloat(priceRaw)||0;
        if(!specs&&!code) return null;
        if(!brand&&!specs) return null;
        if(specs.toLowerCase()==="size & description") return null;
        return {id:code||("p"+i),specs:specs||code,brand:brand||"Other",code,family,category:cat,unit,listPrice,gst:18,photoUrl:(photoUrl&&photoUrl.startsWith("http"))?photoUrl:"",hsn:get(8)};
      }).filter(Boolean);
      if(products.length<1) throw new Error("No products in Web App response");
      setProducts(products);
      const now=Date.now();
      localStorage.setItem("ew_products_v2",JSON.stringify(products));
      localStorage.setItem("ew_products_time_v2",String(now));
      setLastSynced(new Date(now));
      setSyncStatus("success");
      setSyncMsg(products.length+" products synced from Google Sheet ✓ (auto-updates when you edit the sheet)");
      setTimeout(()=>setSyncMsg(""),6000);
      return;
    }catch(e){
      setSyncMsg("Web App failed ("+e.message+"), trying CSV…");
    }

    // FALLBACK: CSV publish URL
    const PROXIES = [
      `https://corsproxy.io/?${encodeURIComponent(SHEET_CSV_URL)}`,
      SHEET_CSV_URL+"&t="+Date.now(),
    ];
    for(const url of PROXIES){
      try{
        const controller=new AbortController();
        setTimeout(()=>controller.abort(),8000);
        const res=await fetch(url,{signal:controller.signal});
        if(!res.ok) throw new Error("HTTP "+res.status);
        const text=await res.text();
        if(text.trim().startsWith("<")) throw new Error("Got HTML");
        const parsed=parseCSV(text);
        if(parsed.length<1) throw new Error("No products");
        setProducts(parsed);
        const now=Date.now();
        localStorage.setItem("ew_products_v2",JSON.stringify(parsed));
        localStorage.setItem("ew_products_time_v2",String(now));
        setLastSynced(new Date(now));
        setSyncStatus("success");
        setSyncMsg(parsed.length+" products loaded from CSV ✓");
        setTimeout(()=>setSyncMsg(""),5000);
        return;
      }catch(e){ /* try next */ }
    }
    setSyncStatus("error");
    setSyncMsg("Sync failed. Upload CSV manually.");
  }

  function handleCSVUpload(csvText){
    try{
      const parsed = parseCSV(csvText);
      if(parsed.length < 1) throw new Error("No products found — check file format");
      setProducts(parsed);
      const now = Date.now();
      localStorage.setItem("ew_products_v2", JSON.stringify(parsed));
      localStorage.setItem("ew_products_time_v2", String(now));
      setLastSynced(new Date(now));
      setSyncStatus("success");
      setSyncMsg(parsed.length+" products loaded from CSV ✓");
      setTimeout(()=>setSyncMsg(""),5000);
      setShowUploadModal(false);
    }catch(e){
      alert("Error reading CSV: "+e.message);
    }
  }

  async function pullSitesFromServer(silent){
    try{
      if(!silent) setSitesSyncStatus("loading");
      const res=await fetch(WEBAPP_URL+"?action=sitesList&_="+Date.now());
      const data=await res.json();
      if(data&&Array.isArray(data.sites)){
        setSites(prev=>{
          const byId={};
          prev.forEach(s=>{byId[s.id]=s;});
          data.sites.forEach(s=>{byId[s.id]=s;});
          const merged=Object.values(byId);
          saveSites(merged);
          return merged;
        });
        setSitesSynced(new Date());
      }
      setSitesSyncStatus("idle");
    }catch(e){ setSitesSyncStatus("idle"); }
  }
  function pushSiteToServer(site){
    try{
      fetch(WEBAPP_URL,{method:"POST",body:JSON.stringify({action:"siteSave",id:site.id,data:site,updatedBy:(typeof currentUser!=="undefined"&&currentUser&&currentUser.id)||""})});
    }catch(e){}
  }
  function pushSiteDeleteToServer(id){
    try{
      fetch(WEBAPP_URL,{method:"POST",body:JSON.stringify({action:"siteDelete",id:id})});
    }catch(e){}
  }
  function updateSite(id,patch){ setSites(prev=>{ const next=prev.map(s=>s.id===id?{...s,...patch}:s); const upd=next.find(s=>s.id===id); if(upd) pushSiteToServer(upd); return next; }); }
  function addSite(site){
    const newSite={...site,id:makeId(),createdAt:today(),createdBy:currentUser.id,pitches:{},quotations:[],visits:[]};
    setSites(prev=>[newSite,...prev]);
    pushSiteToServer(newSite);
  }
  function deleteSite(id){ if(window.confirm("Delete site?")){ setSites(prev=>prev.filter(s=>s.id!==id)); pushSiteDeleteToServer(id); setView("sites"); } }
  function updatePitch(siteId,productId,status,note){ setSites(prev=>prev.map(s=>{ if(s.id!==siteId)return s; return{...s,pitches:{...s.pitches,[productId]:{status,note,updatedAt:today()}}}; })); }

  // ── Contacts (Plumber / Architect / Builder / PMC registry) ──
  React.useEffect(()=>{ try{localStorage.setItem("ew_contacts",JSON.stringify(contacts));}catch(e){} },[contacts]);
  function saveContact(c){
    // Duplicate check by phone
    const exists=contacts.find(x=>x.phone===c.phone);
    if(exists){ setContacts(prev=>prev.map(x=>x.phone===c.phone?{...x,...c}:x)); return exists.id; }
    const id=makeId();
    setContacts(prev=>[{...c,id,createdAt:today()},...prev]);
    return id;
  }
  function getContactRunningSites(contactId){
    return sites.filter(s=>
      s.plumberRef===contactId||s.architectRef===contactId||
      s.builderRef===contactId||s.pmcRef===contactId
    ).length;
  }

  function getPendingProducts(site){
    const si=STAGE_IDX[site.stage]??0,result=[];
    STAGES.forEach((st,i)=>{ if(i>si)return; (STAGE_PRODUCTS[st.id]||[]).forEach(p=>{ const pitch=site.pitches?.[p.id]; if(!pitch||pitch.status==="pending") result.push({...p,stage:st}); }); });
    return result;
  }

  const visibleSites=useMemo(()=>{
    let list=isAdmin?sites:sites.filter(s=>s.assignedTo===currentUser?.id);
    if(filterStage!=="all") list=list.filter(s=>s.stage===filterStage);
    if(filterAssigned!=="all") list=list.filter(s=>s.assignedTo===filterAssigned);
    if(filterAlert) list=list.filter(s=>getPendingProducts(s).length>0);
    if(searchQ.trim()){ const q=searchQ.toLowerCase(); list=list.filter(s=>s.ownerName.toLowerCase().includes(q)||s.city.toLowerCase().includes(q)); }
    return list;
  },[sites,filterStage,filterAssigned,filterAlert,searchQ,currentUser,isAdmin]);

  if(!currentUser) return <LoginScreen onLogin={setCurrentUser}/>;
  const activeSite=sites.find(s=>s.id===activeSiteId);

  return(
    <div style={{minHeight:"100vh",background:"#f8f7f5",fontFamily:"system-ui,sans-serif",color:"#1a1a1a"}}>
      {/* TOP NAV */}
      <nav className="no-print" style={{background:"#0f172a",color:"#fff",display:"flex",alignItems:"center",padding:"0 16px",height:52,gap:4,flexWrap:"wrap"}}>
        <span style={{fontWeight:700,fontSize:15,marginRight:12,color:"#38bdf8",letterSpacing:"-0.3px"}}>⚡ EW Site CRM</span>
        {["dashboard","sites"].concat(isAdmin?["admin"]:[]).map(v=>(
          <button key={v} onClick={()=>setView(v)} style={{background:view===v?"#1e293b":"transparent",color:view===v?"#38bdf8":"#94a3b8",border:"none",padding:"6px 10px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:500,textTransform:"capitalize"}}>
            {v==="admin"?"Admin":v}
          </button>
        ))}
        <div style={{flex:1}}/>

        {/* ── PRICE LIST SYNC ── */}
        <div style={{display:"flex",alignItems:"center",gap:6,marginRight:6}}>
          {products.length>0&&syncStatus!=="loading"&&(
            <span style={{fontSize:11,color:"#10b981",fontWeight:500,whiteSpace:"nowrap"}}>
              ✓ {products.length} products
              {lastSynced&&<span style={{color:"#64748b",marginLeft:4}}>· Synced {lastSynced.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})}</span>}
            </span>
          )}
          {syncStatus==="loading"&&<span style={{fontSize:11,color:"#f59e0b",fontWeight:500}}>⏳ Syncing…</span>}
          {(syncStatus==="error"||syncStatus==="idle")&&products.length===0&&(
            <span style={{fontSize:11,color:"#ef4444",fontWeight:500}}>No catalog</span>
          )}
          <button onClick={()=>fetchProducts(false)} disabled={syncStatus==="loading"}
            title="Fetch latest prices from Google Sheet"
            style={{display:"flex",alignItems:"center",gap:4,background:syncStatus==="loading"?"#1e293b":"#0ea5e9",color:"#fff",border:"none",borderRadius:7,padding:"5px 10px",cursor:syncStatus==="loading"?"not-allowed":"pointer",fontSize:12,fontWeight:600,opacity:syncStatus==="loading"?0.6:1}}>
            <span style={{display:"inline-block",animation:syncStatus==="loading"?"spin 1s linear infinite":"none"}}>↻</span>
            {syncStatus==="loading"?"Syncing…":"Sync Sheet"}
          </button>
          <button onClick={()=>pullSitesFromServer(false)} disabled={sitesSyncStatus==="loading"}
            title={sitesSynced?("Sites last synced "+sitesSynced.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})):"Sync sites across all devices"}
            style={{display:"flex",alignItems:"center",gap:6,background:sitesSyncStatus==="loading"?"#9e9e9b":"#2563eb",color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",cursor:sitesSyncStatus==="loading"?"not-allowed":"pointer",fontSize:13,fontWeight:600,marginLeft:8}}>
            <span style={{display:"inline-block",animation:sitesSyncStatus==="loading"?"spin 1s linear infinite":"none"}}>↻</span>
            {sitesSyncStatus==="loading"?"Syncing sites…":"Sync Sites"}
          </button>
          <button onClick={()=>setShowUploadModal(true)}
            title="Upload CSV manually if auto-sync fails"
            style={{display:"flex",alignItems:"center",gap:4,background:"#334155",color:"#94a3b8",border:"1px solid #475569",borderRadius:7,padding:"5px 10px",cursor:"pointer",fontSize:12,fontWeight:500}}>
            ⬆ CSV
          </button>
        </div>

        <span style={{fontSize:12,color:"#64748b",marginRight:6}}>{currentUser.name.split(" ")[0]}</span>
        {isAdmin&&<span style={{fontSize:10,background:"#0ea5e9",color:"#fff",padding:"2px 6px",borderRadius:10,fontWeight:600}}>ADMIN</span>}
        <button onClick={()=>setCurrentUser(null)} style={{marginLeft:6,background:"transparent",border:"1px solid #334155",color:"#94a3b8",padding:"4px 8px",borderRadius:6,cursor:"pointer",fontSize:12}}>Switch</button>
      </nav>

      {/* SYNC TOAST */}
      {syncMsg&&(
        <div style={{background:syncStatus==="error"?"#fee2e2":syncStatus==="loading"?"#fef3c7":"#d1fae5",borderBottom:"1px solid "+(syncStatus==="error"?"#fca5a5":syncStatus==="loading"?"#fcd34d":"#6ee7b7"),padding:"8px 20px",fontSize:12,color:syncStatus==="error"?"#991b1b":syncStatus==="loading"?"#92400e":"#065f46",fontWeight:500,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <span style={{flex:1}}>{syncMsg}</span>
          {syncStatus==="error"&&(
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>fetchProducts(false)} style={{background:"none",border:"1px solid #991b1b",color:"#991b1b",borderRadius:5,padding:"3px 10px",cursor:"pointer",fontSize:11,fontWeight:600}}>↻ Retry auto-sync</button>
              <button onClick={()=>{setSyncMsg("");setShowUploadModal(true);}} style={{background:"#991b1b",border:"none",color:"#fff",borderRadius:5,padding:"3px 10px",cursor:"pointer",fontSize:11,fontWeight:600}}>⬆ Upload CSV instead</button>
            </div>
          )}
          <button onClick={()=>setSyncMsg("")} style={{background:"none",border:"none",color:"inherit",cursor:"pointer",fontSize:18,lineHeight:1,opacity:0.6}}>×</button>
        </div>
      )}

      {/* CSV UPLOAD MODAL */}
      {showUploadModal&&<CSVUploadModal onLoad={handleCSVUpload} onClose={()=>setShowUploadModal(false)}/>}

      {/* MAIN CONTENT */}
      <div style={{maxWidth:960,margin:"0 auto",padding:"20px 16px"}}>
        {view==="dashboard"&&<Dashboard sites={isAdmin?sites:sites.filter(s=>s.assignedTo===currentUser.id)} contacts={contacts} currentUser={currentUser} isAdmin={isAdmin} onGoSites={()=>setView("sites")} onOpenSite={id=>{setActiveSiteId(id);setView("site");}} getPendingProducts={getPendingProducts} products={products} loadingProducts={syncStatus==="loading"} onSaveQuote={(siteId,q)=>{ const updated=(sites.find(s=>s.id===siteId)?.quotations||[]); updateSite(siteId,{quotations:[...updated,q]}); }}/>}
        {view==="sites"&&<SitesList sites={visibleSites} isAdmin={isAdmin} filterStage={filterStage} setFilterStage={setFilterStage} filterAssigned={filterAssigned} setFilterAssigned={setFilterAssigned} filterAlert={filterAlert} setFilterAlert={setFilterAlert} searchQ={searchQ} setSearchQ={setSearchQ} getPendingProducts={getPendingProducts} onOpen={id=>{setActiveSiteId(id);setView("site");}} onAdd={()=>setShowAddSite(true)}/>}
        {view==="site"&&activeSite&&<SiteDetail site={activeSite} isAdmin={isAdmin} currentUser={currentUser} getPendingProducts={getPendingProducts} onBack={()=>setView("sites")} onUpdateSite={patch=>updateSite(activeSite.id,patch)} onUpdatePitch={(pid,status,note)=>updatePitch(activeSite.id,pid,status,note)} onDelete={()=>deleteSite(activeSite.id)} onEdit={()=>{setEditingSite(activeSite);setShowAddSite(true);}} products={products} loadingProducts={syncStatus==="loading"}/>}
        {view==="admin"&&isAdmin&&<AdminPanel appUsers={appUsers} permissions={permissions} sites={sites} currentUser={currentUser} onUpdateUser={updateUserProfile} onAddUser={addNewUser} onUpdatePassword={updateUserPassword} onToggleActive={toggleUserActive} onUpdatePermission={updatePermission} getPendingProducts={getPendingProducts} onOpenSite={id=>{setActiveSiteId(id);setView("site");}} onUpdateSite={updateSite}/>}
      </div>
      {showAddSite&&<SiteFormModal site={editingSite} isAdmin={isAdmin} currentUser={currentUser} contacts={contacts} saveContact={saveContact} allSites={sites} onSave={site=>{ if(editingSite)updateSite(editingSite.id,site); else addSite(site); setShowAddSite(false);setEditingSite(null);setView("sites"); }} onClose={()=>{setShowAddSite(false);setEditingSite(null);}}/>}

      <style>{`@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<CRMApp/>);
</script>

<!-- ═══ PWA INSTALL + SERVICE WORKER ══════════════════════════════════ -->
<script>
// ── Install prompt (Android Chrome / Edge) ──────────────────────────────
let _deferredInstall = null;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  _deferredInstall = e;
  showInstallBanner();
});

function showInstallBanner(){
  if(document.getElementById("ew-install-banner")) return;
  const banner = document.createElement("div");
  banner.id = "ew-install-banner";
  banner.style.cssText = "position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:9999;background:#0d9488;color:#fff;border-radius:14px;padding:12px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 24px rgba(0,0,0,0.25);font-family:system-ui,sans-serif;font-size:14px;max-width:340px;width:calc(100%-32px)";
  banner.innerHTML = `
    <div style="font-size:28px;line-height:1">📲</div>
    <div style="flex:1">
      <div style="font-weight:700;font-size:14px">Install Energy World CRM</div>
      <div style="font-size:12px;opacity:0.85;margin-top:2px">Add to home screen for app experience</div>
    </div>
    <button id="ew-install-btn" style="background:#fff;color:#0d9488;border:none;border-radius:8px;padding:7px 14px;font-weight:700;font-size:13px;cursor:pointer">Install</button>
    <button id="ew-install-close" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer;opacity:0.7;padding:0 4px">×</button>
  `;
  document.body.appendChild(banner);
  document.getElementById("ew-install-btn").onclick = async () => {
    if(!_deferredInstall) return;
    _deferredInstall.prompt();
    const r = await _deferredInstall.userChoice;
    _deferredInstall = null;
    banner.remove();
  };
  document.getElementById("ew-install-close").onclick = () => banner.remove();
  // Auto-hide after 12 seconds
  setTimeout(() => { if(banner.parentNode) banner.remove(); }, 12000);
}

// ── iOS "Add to Home Screen" hint ──────────────────────────────────────
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isInStandaloneMode = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
if(isIOS && !isInStandaloneMode && !sessionStorage.getItem("ew-ios-hint-shown")){
  sessionStorage.setItem("ew-ios-hint-shown", "1");
  setTimeout(() => {
    const hint = document.createElement("div");
    hint.style.cssText = "position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#1e293b;color:#fff;padding:16px 20px 28px;font-family:system-ui,sans-serif;border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,0.3)";
    hint.innerHTML = `
      <div style="text-align:center;margin-bottom:12px">
        <div style="font-size:22px;margin-bottom:6px">📲 Install EW CRM as App</div>
        <div style="font-size:13px;opacity:0.8;line-height:1.5">Tap <span style="background:#334155;padding:2px 8px;border-radius:6px;font-weight:700">Share</span> → then <span style="background:#334155;padding:2px 8px;border-radius:6px;font-weight:700">Add to Home Screen</span></div>
      </div>
      <div style="text-align:center;font-size:28px;margin-bottom:8px">⬆️</div>
      <button onclick="this.parentNode.remove()" style="display:block;width:100%;background:#0d9488;color:#fff;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:700;cursor:pointer">Got it</button>
    `;
    document.body.appendChild(hint);
  }, 3000);
}

// ── Service Worker — only registers when served over http/https (not file://) ─
if("serviceWorker" in navigator && location.protocol !== "blob:" && location.protocol !== "about:"){
  try{
    // SW works only on http/https, not file:// or blob://
    // When hosted on a server, this caches the app for offline use
    const swCode = `
const CACHE="ew-crm-v2";
self.addEventListener("install",e=>{ e.waitUntil(self.skipWaiting()); });
self.addEventListener("activate",e=>{ e.waitUntil(self.clients.claim()); });
self.addEventListener("fetch",e=>{
  if(e.request.method!=="GET") return;
  const u=new URL(e.request.url);
  if(u.hostname.includes("google")||u.hostname.includes("telegram")||u.hostname.includes("cdnjs")) return;
  e.respondWith(
    caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
      if(res.ok){ const c=res.clone(); caches.open(CACHE).then(cache=>cache.put(e.request,c)); }
      return res;
    }).catch(()=>caches.match(e.request)))
  );
});`;
    const blob=new Blob([swCode],{type:"text/javascript"});
    const url=URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).then(()=>{
      console.log("EW CRM: SW registered ✅");
    }).catch(e=>{
      // SW registration failure is non-fatal — app still works
      console.info("EW CRM: SW not available ("+e.message+") — app works without it");
    });
  }catch(e){
    console.info("EW CRM: SW setup skipped");
  }
}
</script>
