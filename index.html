      {/* QUOTATION BUILDER launched from dashboard */}
      {pickedSite&&(
        <QuotationBuilder
          site={pickedSite}
          products={products}
          loadingProducts={loadingProducts}
          createdBy={currentUser.name}
          onSave={q=>{ onSaveQuote(pickedSite.id,q); setPickedSite(null); setShowSitePicker(false); }}
          onClose={()=>{ setPickedSite(null); setShowSitePicker(false); }}
        />
      )}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:24}}>
        {[{label:"Total sites",value:sites.length,color:"#0ea5e9"},{label:"Pitch alerts",value:alertSites.length,color:"#f59e0b"},{label:"Products won",value:won,color:"#10b981"},{label:"Follow-ups",value:pitched,color:"#6366f1"},{label:"Quotations",value:totalQuotes,color:"#8b5cf6"},{label:"Quote value",value:fmtINR(totalQuoteVal),color:"#059669",small:true}].map(k=>(
          <div key={k.label} style={{background:"#fff",borderRadius:12,padding:"14px",border:"1px solid #e2e8f0"}}>
            <div style={{fontSize:k.small?16:26,fontWeight:700,color:k.color,lineHeight:1}}>{k.value}</div>
            <div style={{fontSize:12,color:"#64748b",marginTop:4}}>{k.label}</div>
          </div>
        ))}
      </div>
      {/* ── Birthday & Anniversary Reminders ── */}
      {(()=>{
        const now=new Date(); const m=now.getMonth()+1; const d=now.getDate();
        const upcoming=[];
        contacts.forEach(c=>{
          [["birthday","🎂","Birthday"],["anniversary","💍","Anniversary"]].forEach(([field,emoji,label])=>{
            if(!c[field]) return;
            const parts=c[field].split("-");
            if(parts.length<3) return;
            const evtM=parseInt(parts[1]),evtD=parseInt(parts[2]);
            // Show if within this month or next 7 days
            const daysAway=((evtM-m)*30+(evtD-d));
            const isThisMonth=evtM===m;
            const isNextWeek=daysAway>=0&&daysAway<=7;
            if(isThisMonth||isNextWeek){
              const isToday=evtM===m&&evtD===d;
              const isTomorrow=evtM===m&&evtD===d+1;
              upcoming.push({contact:c,emoji,label,day:evtD,month:evtM,isToday,isTomorrow,daysAway:daysAway<0?daysAway+30:daysAway});
            }
          });
        });
        upcoming.sort((a,b)=>a.daysAway-b.daysAway);
        if(!upcoming.length) return null;
        return(
          <div style={{marginBottom:20,background:"#fff8f0",border:"1px solid #fed7aa",borderRadius:14,padding:14}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:10,color:"#c2410c"}}>🎊 Occasions this month ({upcoming.length})</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {upcoming.map((u,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:u.isToday?"#fff7ed":"#fff",border:"1px solid "+(u.isToday?"#fb923c":"#fed7aa"),borderRadius:10,padding:"8px 12px"}}>
                  <div style={{display:"flex",gap:10,alignItems:"center"}}>
                    <span style={{fontSize:22}}>{u.emoji}</span>
                    <div>
                      <div style={{fontWeight:700,fontSize:13}}>{u.contact.name}</div>
                      <div style={{fontSize:11,color:"#64748b"}}>{u.contact.role||""}{u.contact.city?" · "+u.contact.city:""} · {u.label}</div>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    {u.isToday?<span style={{background:"#ef4444",color:"#fff",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20}}>TODAY! 🎉</span>
                    :u.isTomorrow?<span style={{background:"#f97316",color:"#fff",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20}}>Tomorrow</span>
                    :<span style={{fontSize:12,color:"#92400e",fontWeight:600}}>{u.day}/{u.month}</span>}
                    {u.contact.phone&&<div style={{fontSize:11,color:"#0891b2",marginTop:3}}>📞 {u.contact.phone}</div>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {alertSites.length>0&&(
        <div style={{marginBottom:24}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <h3 style={{margin:0,fontSize:15,fontWeight:700}}><span style={{color:"#f59e0b"}}>⚠</span> Pitch alerts</h3>
            <button onClick={onGoSites} style={lBtn}>View all →</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {alertSites.slice(0,5).map(site=>{
              const pending=getPendingProducts(site);
              return(
                <div key={site.id} onClick={()=>onOpenSite(site.id)} style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,padding:"12px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:14}}>{site.ownerName}</div>
                    <div style={{fontSize:12,color:"#92400e",marginTop:2}}>{site.city} · {STAGES.find(s=>s.id===site.stage)?.label} · {pending.length} to pitch</div>
                  </div>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"flex-end",maxWidth:200}}>
                    {pending.slice(0,3).map(p=><span key={p.id} style={{fontSize:10,background:"#fef3c7",color:"#92400e",padding:"2px 7px",borderRadius:10,fontWeight:600}}>{p.brand}</span>)}
                    {pending.length>3&&<span style={{fontSize:10,color:"#92400e"}}>+{pending.length-3}</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      <h3 style={{margin:"0 0 10px",fontSize:15,fontWeight:700}}>Pipeline by stage</h3>
      {STAGES.map(st=>{
        const count=stageCount[st.id];
        const pct=sites.length?(count/sites.length)*100:0;
        return(
          <div key={st.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
            <div style={{width:120,fontSize:12,color:"#475569",textAlign:"right"}}>{st.label}</div>
            <div style={{flex:1,background:"#e2e8f0",borderRadius:4,height:18,overflow:"hidden"}}>
              <div style={{width:pct+"%",background:"#0ea5e9",height:"100%",borderRadius:4,minWidth:count?30:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                {count>0&&<span style={{fontSize:11,color:"#fff",fontWeight:600}}>{count}</span>}
              </div>
            </div>
          </div>
        );
      })}

      {/* ── Monthly Report Calendar ── */}
      {(()=>{
        const now=new Date();
        const yr=now.getFullYear(), mo=now.getMonth();
        const daysInMonth=new Date(yr,mo+1,0).getDate();
        const firstDay=new Date(yr,mo,1).getDay();
        const todayD=now.getDate();
        const monthName=now.toLocaleString("en-IN",{month:"long",year:"numeric"});
        const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
        const cells=[]; for(let i=0;i<firstDay;i++) cells.push(null); for(let d=1;d<=daysInMonth;d++) cells.push(d);
        const submitted=Object.keys(dailyReports).filter(k=>k.startsWith(`${yr}-${String(mo+1).padStart(2,"0")}`)).length;
        const workingDays=Array.from({length:todayD},(_,i)=>new Date(yr,mo,i+1).getDay()!==0).filter(Boolean).length;
        return(
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:14,padding:14,marginBottom:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:6}}>
              <div style={{fontWeight:700,fontSize:14,color:"#1e293b"}}>📅 {monthName} — Daily Reports</div>
              <div style={{display:"flex",gap:8,fontSize:11}}>
                <span><span style={{display:"inline-block",width:9,height:9,borderRadius:2,background:"#16a34a",marginRight:3}}/>Done</span>
                <span><span style={{display:"inline-block",width:9,height:9,borderRadius:2,background:"#ef4444",marginRight:3}}/>Pending</span>
                <span><span style={{display:"inline-block",width:9,height:9,borderRadius:2,background:"#f1f5f9",border:"1px solid #e2e8f0",marginRight:3}}/>Sunday</span>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:3}}>
              {dayNames.map(d=><div key={d} style={{textAlign:"center",fontSize:10,color:d==="Sun"?"#ef4444":"#94a3b8",fontWeight:600}}>{d}</div>)}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
              {cells.map((d,i)=>{
                if(!d) return <div key={"e"+i}/>;
                const ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
                const isSun=new Date(yr,mo,d).getDay()===0;
                const isFuture=d>todayD; const isToday=d===todayD;
                const hasDR=!!dailyReports[ds];
                let bg,col,brd;
                if(isSun){bg="#f8fafc";col="#94a3b8";brd="1px solid #f1f5f9";}
                else if(isFuture){bg="#f8fafc";col="#cbd5e1";brd="1px dashed #e2e8f0";}
                else if(hasDR){bg="#dcfce7";col="#15803d";brd="1px solid #86efac";}
                else{bg="#fee2e2";col="#dc2626";brd="1px solid #fca5a5";}
                if(isToday) brd="2px solid #0d9488";
                return(
                  <div key={d} onClick={()=>{if(!isSun&&!isFuture) setShowDailyReport(true);}}
                    style={{aspectRatio:"1",display:"flex",alignItems:"center",justifyContent:"center",borderRadius:6,background:bg,border:brd,color:col,fontWeight:isToday?900:600,fontSize:11,cursor:(!isSun&&!isFuture)?"pointer":"default",position:"relative"}}>
                    {d}{hasDR&&!isSun&&<span style={{position:"absolute",bottom:0,right:1,fontSize:7}}>✓</span>}
                  </div>
                );
              })}
            </div>
            <div style={{marginTop:6,fontSize:11,color:"#64748b",textAlign:"center"}}>✅ {submitted}/{workingDays} working days submitted this month</div>
          </div>
        );
      })()}

      {showDailyReport&&<DailyReportModal currentUser={currentUser} sites={sites} date={today()}
        existing={dailyReports[today()]}
        onSave={data=>{ setDailyReports(prev=>({...prev,[today()]:data})); setShowDailyReport(false); }}
        onClose={()=>setShowDailyReport(false)}/>}

      {/* ── Monthly Reports Panel ── */}
      {isAdmin&&(
        <div style={{marginTop:24}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <h3 style={{margin:0,fontSize:15,fontWeight:700}}>📊 Monthly Reports → Telegram</h3>
            <button onClick={()=>setShowReports(v=>!v)} style={{background:showReports?"#f1f5f9":"#0d9488",color:showReports?"#475569":"#fff",border:"none",borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
              {showReports?"Hide":"Send Reports"}
            </button>
          </div>
          {showReports&&(
            <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:12,padding:16}}>
              {/* Month selector */}
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                <button onClick={()=>setReportMonthOffset(v=>v-1)} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:16}}>‹</button>
                <div style={{flex:1,textAlign:"center",fontWeight:700,fontSize:14,color:"#1e293b"}}>{getMonthLabel(reportMonthOffset)}</div>
                <button onClick={()=>setReportMonthOffset(v=>Math.min(v+1,0))} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:16}}>›</button>
              </div>

              {/* Report buttons */}
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {[
                  {label:"📅 Today's Daily Report",desc:"All executive visits & activity logged today",fn:()=>sendDailyExecutiveReport(sites),primary:true},
                  {label:"🏗️ Site Stage Report",desc:"All sites grouped by current stage",fn:()=>sendMonthlySiteStageReport(sites,reportMonthOffset)},
                  {label:"👷 Executive New Sites",desc:"New sites added by each executive",fn:()=>sendExecutiveNewSitesReport(sites,reportMonthOffset)},
                  {label:"🏆 Brand Win/Loss",desc:"Products won, lost, in-progress by brand",fn:()=>sendBrandWinLossReport(sites,reportMonthOffset)},
                  {label:"📋 Executive Monthly PDFs",desc:"Full PDF report per executive → Telegram (visits, contacts, KM, brands)",fn:()=>sendMonthlyExecutivePDFs(sites,reportMonthOffset),primary:true},
                  {label:"📦 Send All 3 Monthly Reports",desc:"Site stage + Executive sites + Brand win/loss summary",fn:()=>sendMonthlyDigest(sites,reportMonthOffset)},
                ].map(r=>(
                  <div key={r.label} style={{display:"flex",alignItems:"center",gap:10,background:"#fff",border:`1px solid ${r.primary?"#0d9488":"#e2e8f0"}`,borderRadius:10,padding:"10px 14px"}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:13,color:r.primary?"#0d9488":"#1e293b"}}>{r.label}</div>
                      <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{r.desc}</div>
                    </div>
                    <button
                      onClick={async()=>{
                        setReportStatus("Sending…");
                        try{ await r.fn(); setReportStatus("✅ Sent to Telegram!"); }
                        catch(e){ setReportStatus("❌ Failed: "+e.message); }
                        setTimeout(()=>setReportStatus(""),4000);
                      }}
                      style={{background:r.primary?"#0d9488":"#f1f5f9",color:r.primary?"#fff":"#475569",border:"none",borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                      Send →
                    </button>
                  </div>
                ))}
              </div>

              {reportStatus&&(
                <div style={{marginTop:12,padding:"10px 14px",background:reportStatus.startsWith("✅")?"#f0fdf4":"#fef2f2",border:`1px solid ${reportStatus.startsWith("✅")?"#86efac":"#fca5a5"}`,borderRadius:8,fontSize:13,fontWeight:600,color:reportStatus.startsWith("✅")?"#166534":"#dc2626",textAlign:"center"}}>
                  {reportStatus}
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}
function SitesList({sites,isAdmin,filterStage,setFilterStage,filterAssigned,setFilterAssigned,filterAlert,setFilterAlert,searchQ,setSearchQ,getPendingProducts,onOpen,onAdd,contacts}){
  const [filterPartner,setFilterPartner]=React.useState("all");
  const [filterArea,setFilterArea]=React.useState("all");
  const [filterSubArea,setFilterSubArea]=React.useState("all");
  const TEAL="#0d9488";

  // All unique cities/areas from sites
  const areas=[...new Set(sites.map(s=>s.city).filter(Boolean))].sort();
  // Sub areas from address field
  const subAreas=filterArea==="all"?[]:[...new Set(sites.filter(s=>s.city===filterArea).map(s=>(s.address||"").split(",")[0].trim()).filter(Boolean))].sort();
  // Partners (plumber, architect contacts) from sites
  const partnerContacts=contacts?contacts.filter(c=>["Plumber","Architect","Builder","PMC","Contractor"].includes(c.type)):[];

  // Apply partner + area + subarea filter
  const displaySites=sites.filter(s=>{
    if(filterPartner!=="all"){
      const sc=s.contacts||[];
      if(!sc.some(c=>c.id===filterPartner)) return false;
    }
    if(filterArea!=="all"&&s.city!==filterArea) return false;
    if(filterSubArea!=="all"){
      const addr=(s.address||"").toLowerCase();
      if(!addr.includes(filterSubArea.toLowerCase())) return false;
    }
    return true;
  });

  // All STAGE_PRODUCTS brands for pitch bar
  const ALL_PITCH_PRODUCTS=Object.values(STAGE_PRODUCTS).flat();
  const PITCH_STATUS_COLOR={won:"#10b981",pitched:"#f59e0b",pending:"#ef4444",lost:"#94a3b8"};
  const PITCH_LABEL={won:"Won ✓",pitched:"Pitched",pending:"To Pitch",lost:"Lost"};

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h2 style={{margin:0,fontSize:20,fontWeight:700}}>Sites <span style={{color:"#94a3b8",fontWeight:400,fontSize:15}}>{displaySites.length}</span></h2>
        <button onClick={onAdd} style={pBtn}>+ Add site</button>
      </div>

      {/* Filter row 1 */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
        <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="Search name/city…" style={{...inp,width:150,fontSize:13}}/>
        <select value={filterStage} onChange={e=>setFilterStage(e.target.value)} style={{...inp,fontSize:13}}>
          <option value="all">All Stages</option>
          {STAGES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
        </select>
        {isAdmin&&(
          <select value={filterAssigned} onChange={e=>setFilterAssigned(e.target.value)} style={{...inp,fontSize:13}}>
            <option value="all">All Execs</option>
            {USERS.map(u=><option key={u.id} value={u.id}>{u.name.split(" ")[0]}</option>)}
          </select>
        )}
        <button onClick={()=>setFilterAlert(v=>!v)} style={{...inp,background:filterAlert?"#fef3c7":"#fff",cursor:"pointer",fontSize:13,color:filterAlert?"#92400e":"#475569",borderColor:filterAlert?"#fbbf24":"#e2e8f0",fontWeight:filterAlert?600:400}}>
          {filterAlert?"⚠ Alerts only":"Show alerts"}
        </button>
      </div>

      {/* Filter row 2 — Partner + Area */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
        <select value={filterPartner} onChange={e=>setFilterPartner(e.target.value)} style={{...inp,fontSize:13}}>
          <option value="all">All Partners</option>
          {partnerContacts.map(c=><option key={c.id} value={c.id}>{c.name} ({c.type})</option>)}
        </select>
        <select value={filterArea} onChange={e=>{setFilterArea(e.target.value);setFilterSubArea("all");}} style={{...inp,fontSize:13}}>
          <option value="all">All Areas</option>
          {areas.map(a=><option key={a} value={a}>{a}</option>)}
        </select>
        {filterArea!=="all"&&subAreas.length>0&&(
          <select value={filterSubArea} onChange={e=>setFilterSubArea(e.target.value)} style={{...inp,fontSize:13}}>
            <option value="all">All Sub-areas</option>
            {subAreas.map(a=><option key={a} value={a}>{a}</option>)}
          </select>
        )}
        {(filterPartner!=="all"||filterArea!=="all"||filterSubArea!=="all")&&(
          <button onClick={()=>{setFilterPartner("all");setFilterArea("all");setFilterSubArea("all");}} style={{...inp,cursor:"pointer",fontSize:12,color:"#ef4444",borderColor:"#fecaca",background:"#fef2f2"}}>✕ Clear</button>
        )}
      </div>

      {displaySites.length===0&&<div style={{textAlign:"center",padding:"60px 0",color:"#94a3b8"}}><div style={{fontSize:32}}>🏗</div><div style={{marginTop:8,fontSize:14}}>No sites found</div><button onClick={onAdd} style={{...pBtn,marginTop:12}}>Add first site</button></div>}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {displaySites.map(site=>{
          const pending=getPendingProducts(site);
          const wonCount=Object.values(site.pitches||{}).filter(p=>p.status==="won").length;
          const qCount=(site.quotations||[]).length;
          const assignee=USERS.find(u=>u.id===site.assignedTo);
          // Build pitch bar - all brands as color-coded segments
          const pitchBar=ALL_PITCH_PRODUCTS.map(p=>{
            const st=(site.pitches||{})[p.id]?.status||"pending";
            return{...p,status:st};
          });
          return(
            <div key={site.id} onClick={()=>onOpen(site.id)} style={{background:"#fff",border:"1px solid "+(pending.length>0?"#fde68a":"#e2e8f0"),borderRadius:12,padding:"12px 14px",cursor:"pointer"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:"6px 16px",alignItems:"start"}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>

                    {qCount>0&&<span style={{fontSize:10,background:"#ede9fe",color:"#5b21b6",padding:"1px 6px",borderRadius:8,fontWeight:600}}>📄 {qCount}Q</span>}
                  </div>
                  <div style={{fontSize:11,color:"#64748b",marginBottom:6}}>{site.city}{site.address?` · ${site.address.split(",")[0]}`:"" } · {site.projectType} · {site.source}</div>

                      <div key={p.id} title={`${p.brand}: ${p.name} — ${PITCH_LABEL[p.status]||p.status}`}
                        style={{background:PITCH_STATUS_COLOR[p.status]||"#e2e8f0",borderRadius:3,padding:"2px 5px",fontSize:9,fontWeight:700,color:"#fff",whiteSpace:"nowrap",

                    ))}
                  </div>
                  {/* Legend */}
                </div>

                  <StagePill stage={site.stage}/>
                  {isAdmin&&assignee&&<div style={{fontSize:10,color:"#94a3b8",marginTop:3}}>{assignee.name.split(" ")[0]}</div>}
                </div>
              </div>

          );
        })}
      </div>
      {/* Color legend */}
      {displaySites.length>0&&(
        <div style={{display:"flex",gap:12,marginTop:14,flexWrap:"wrap",fontSize:11,color:"#64748b",padding:"8px 0"}}>

      )}
    </div>
  );
}

// ─── CONTACT FIELD (outside SiteFormModal to prevent re-render focus loss) ────
const CITIES_LIST=["Panipat","Sonipat","Karnal","Kurukshetra","Ambala","Rohtak","Hisar","Faridabad","Gurugram","Delhi NCR","Kaithal","Jind","Pehowa","Thanesar"];

function ContactField({roleKey,label,icon,initialData,contacts,allSites,onCommit}){
  // ALL inputs are UNCONTROLLED (refs) — zero re-renders on typing
  const cityRef=React.useRef(null);
  const nameRef=React.useRef(null);
  const phone1Ref=React.useRef(null);
  const phone2Ref=React.useRef(null);
  const bdayRef=React.useRef(null);
  const annivRef=React.useRef(null);

  const [locSugg,setLocSugg]=React.useState([]);
  const [nameSugg,setNameSugg]=React.useState([]);
  const [showExtra,setShowExtra]=React.useState(!!(initialData?.phone2||initialData?.birthday||initialData?.anniversary));
  const locTimer=React.useRef(null);
  const nameTimer=React.useRef(null);

  function roleMatch(c){
    if(!c.role) return true;
    return (roleKey==="plumber"&&c.role==="Plumbing Contractor")||
           (roleKey==="architect"&&c.role==="Architect")||
           (roleKey==="builder"&&c.role==="Builder")||
           (roleKey==="pmc"&&c.role==="PMC");
  }
  function getFiltered(nameQ,city){
    return contacts.filter(c=>{
      const cm=!city||!c.city||c.city===city;
      const nm=!nameQ||c.name.toLowerCase().startsWith(nameQ.toLowerCase());
      return roleMatch(c)&&cm&&nm;
    }).slice(0,6);
  }

  // Commit to parent only on blur — never on keystroke
  function commitToParent(){
    onCommit(roleKey,{
      name:nameRef.current?.value||"",
      phone:phone1Ref.current?.value||"",
      phone2:phone2Ref.current?.value||"",
      city:cityRef.current?.value||"",
      birthday:bdayRef.current?.value||"",
      anniversary:annivRef.current?.value||"",
    });
  }

  function handleCityType(e){
    const val=e.target.value;
    clearTimeout(locTimer.current);
    if(val.length>0){
      locTimer.current=setTimeout(()=>{
        const q=val.toLowerCase();
        const cm=CITIES_LIST.filter(c=>c.toLowerCase().includes(q));
        const cc=[...new Set(contacts.map(c=>c.city).filter(Boolean))].filter(c=>c.toLowerCase().includes(q));
        setLocSugg([...new Set([...cm,...cc])].slice(0,6));
      },250);
    } else { setLocSugg([]); }
  }

  function pickCity(city){
    if(cityRef.current) cityRef.current.value=city;
    setLocSugg([]);
    setNameSugg(getFiltered("",city));
    nameRef.current?.focus();
    commitToParent();
  }

  function handleNameType(e){
    const val=e.target.value;
    clearTimeout(nameTimer.current);
    if(val.length>0){
      nameTimer.current=setTimeout(()=>{
        const city=cityRef.current?.value||"";
        setNameSugg(getFiltered(val,city));
      },300);
    } else { setNameSugg([]); }
  }

  function pickContact(c){
    if(nameRef.current)   nameRef.current.value=c.name||"";
    if(phone1Ref.current) phone1Ref.current.value=c.phone||"";
    if(phone2Ref.current) phone2Ref.current.value=c.phone2||"";
    if(cityRef.current&&c.city) cityRef.current.value=c.city;
    if(bdayRef.current)   bdayRef.current.value=c.birthday||"";
    if(annivRef.current)  annivRef.current.value=c.anniversary||"";
    if(c.phone2||c.birthday||c.anniversary) setShowExtra(true);
    setNameSugg([]);
    commitToParent();
  }

  const matched=contacts.find(c=>c.name===nameRef.current?.value&&nameRef.current?.value);
  const runningSites=matched?allSites.filter(s=>s[roleKey+"Ref"]===matched.id).length:0;

  const inpS={border:"1px solid #e2e8f0",borderRadius:8,padding:"8px 10px",fontSize:13,width:"100%",boxSizing:"border-box",outline:"none"};
  const labelS={fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em"};
  const secS={background:"#f8fafc",borderRadius:10,padding:"12px 14px",border:"1px solid #e8f0fe"};

  return(
    <div style={secS}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontSize:12,fontWeight:700,color:"#475569"}}>{icon} {label} <span style={{color:"#94a3b8",fontWeight:400}}>(optional)</span></div>

// ─── SITE FORM MODAL ─────────────────────────────────────────────────────────
function SiteFormModal({site,isAdmin,currentUser,contacts,saveContact,allSites,onSave,onClose}){
  const [form,setForm]=useState({
    ownerName:site?.ownerName||"",
    phone:site?.phone||"",
    address:site?.address||"",
    city:site?.city||"",
    locality:site?.locality||"",
    source:site?.source||SOURCES[0],
    projectType:site?.projectType||PROJ_TYPES[0],
    stage:site?.stage||"land",
    assignedTo:site?.assignedTo||currentUser.id,
    notes:site?.notes||"",
  });
  // Contact data stored separately — updated on blur, not on keystroke
  const contactData=React.useRef({
    plumber:{...( site?.plumber||{})},
    architect:{...(site?.architect||{})},
    builder:{...(site?.builder||{})},
    pmc:{...(site?.pmc||{})},
  });

  function onCommitContact(roleKey,data){
    contactData.current[roleKey]=data;
  }

  const [dupWarning,setDupWarning]=useState("");

  function set(k,v){ setForm(f=>({...f,[k]:v})); }

  function checkDup(phone){
    if(!phone||site?.phone===phone){ setDupWarning(""); return; }
    const dup=allSites.find(s=>s.phone===phone);
    if(dup) setDupWarning(`⚠️ Phone already exists: ${dup.ownerName}, ${dup.city}`);
    else setDupWarning("");
  }

  function handleSave(){
    if(!form.ownerName.trim()) return alert("Owner name required");
    if(!form.phone.trim()) return alert("Phone number required");
    if(dupWarning&&!site) return alert("Duplicate phone number — site already exists!");
    const contactRefIds={};
    [["plumber","Plumbing Contractor"],["architect","Architect"],["builder","Builder"],["pmc","PMC"]].forEach(([key,role])=>{
      const cd=contactData.current[key];
      if(cd?.name?.trim()){
        const id=saveContact({name:cd.name.trim(),phone:cd.phone||"",phone2:cd.phone2||"",city:cd.city||"",birthday:cd.birthday||"",anniversary:cd.anniversary||"",role});
        contactRefIds[key+"Ref"]=id;
      }
    });
    onSave({...form,...contactData.current,...contactRefIds});
  }

  const inpS={border:"1px solid #e2e8f0",borderRadius:8,padding:"8px 10px",fontSize:13,width:"100%",boxSizing:"border-box",outline:"none"};
  const labelS={fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em"};
  const secS={background:"#f8fafc",borderRadius:10,padding:"12px 14px",border:"1px solid #e8f0fe"};


  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:12}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#fff",borderRadius:16,padding:20,width:"100%",maxWidth:540,maxHeight:"92vh",overflowY:"auto"}}>

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <h3 style={{margin:0,fontSize:17,fontWeight:800,color:"#1e293b"}}>{site?"✏️ Edit Site":"🏗️ Add New Site"}</h3>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94a3b8"}}>×</button>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:14}}>

          {/* Owner Details */}
          <div style={{...secS,borderColor:"#dbeafe"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#1d4ed8",marginBottom:10}}>👤 Site Owner / Client</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div>
                <label style={labelS}>Owner Name *</label>
                <input value={form.ownerName} onChange={e=>set("ownerName",e.target.value)} placeholder="Full name" style={inpS}/>
              </div>
              <div>
                <label style={labelS}>Phone *</label>
                <input value={form.phone} onChange={e=>{ set("phone",e.target.value); checkDup(e.target.value); }} placeholder="9XXXXXXXXX" style={{...inpS,borderColor:dupWarning?"#ef4444":"#e2e8f0"}}/>
                {dupWarning&&<div style={{fontSize:11,color:"#ef4444",marginTop:3}}>{dupWarning}</div>}
              </div>
            </div>
          </div>

          {/* Location */}
          <div style={{...secS,borderColor:"#d1fae5"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#065f46",marginBottom:10}}>📍 Site Location</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <div>
                <label style={labelS}>City *</label>
                <select value={form.city} onChange={e=>set("city",e.target.value)} style={inpS}>
                  <option value="">Select city</option>
                  {["Panipat","Sonipat","Karnal","Kurukshetra","Ambala","Rohtak","Hisar","Faridabad","Gurugram","Delhi NCR","Other"].map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
              <div>
                <label style={labelS}>Locality / Sector</label>
                <input value={form.locality} onChange={e=>set("locality",e.target.value)} placeholder="Sector 14, Model Town…" style={inpS}/>
              </div>
            </div>
            <div>
              <label style={labelS}>Full Address</label>
              <input value={form.address} onChange={e=>set("address",e.target.value)} placeholder="Plot no., street, area" style={inpS}/>
            </div>
          </div>

          {/* Project Info */}
          <div style={{...secS,borderColor:"#fef3c7"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#92400e",marginBottom:10}}>🏠 Project Details</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              <div>
                <label style={labelS}>Type</label>
                <select value={form.projectType} onChange={e=>set("projectType",e.target.value)} style={inpS}>{PROJ_TYPES.map(s=><option key={s}>{s}</option>)}</select>
              </div>
              <div>
                <label style={labelS}>Source</label>
                <select value={form.source} onChange={e=>set("source",e.target.value)} style={inpS}>{SOURCES.map(s=><option key={s}>{s}</option>)}</select>
              </div>
              <div>
                <label style={labelS}>Stage</label>
                <select value={form.stage} onChange={e=>set("stage",e.target.value)} style={inpS}>{STAGES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}</select>
              </div>
            </div>
          </div>

          {/* Associated Contacts */}
          <div style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:-4}}>🔗 Associated Contacts <span style={{fontSize:11,color:"#94a3b8",fontWeight:400}}>— auto-saved to registry</span></div>
          <ContactField roleKey="plumber"  label="Plumbing Contractor" icon="🔧" initialData={site?.plumber} contacts={contacts} allSites={allSites} onCommit={onCommitContact}/>
          <ContactField roleKey="architect" label="Architect"           icon="📐" initialData={site?.architect} contacts={contacts} allSites={allSites} onCommit={onCommitContact}/>
          <ContactField roleKey="builder"   label="Builder"             icon="🏗️" initialData={site?.builder} contacts={contacts} allSites={allSites} onCommit={onCommitContact}/>
          <ContactField roleKey="pmc"       label="PMC"                 icon="📋" initialData={site?.pmc} contacts={contacts} allSites={allSites} onCommit={onCommitContact}/>

          {/* Assign + Notes */}
          <div style={{display:"grid",gridTemplateColumns:isAdmin?"1fr 1fr":"1fr",gap:10}}>
            {isAdmin&&<div>
              <label style={labelS}>Assign To</label>
              <select value={form.assignedTo} onChange={e=>set("assignedTo",e.target.value)} style={inpS}>{USERS.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select>
            </div>}
            <div>
              <label style={labelS}>Notes</label>
              <textarea value={form.notes} onChange={e=>set("notes",e.target.value)} rows={2} placeholder="Any initial notes…" style={{...inpS,resize:"vertical"}}/>
            </div>
          </div>

        </div>

        {/* Footer */}
        <div style={{display:"flex",gap:8,marginTop:18,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{padding:"9px 18px",borderRadius:8,border:"1px solid #e2e8f0",background:"#f8fafc",cursor:"pointer",fontSize:13,fontWeight:600}}>Cancel</button>
          <button onClick={handleSave} style={{padding:"9px 22px",borderRadius:8,border:"none",background:"#0d9488",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}>
            {site?"💾 Save Changes":"✅ Add Site"}
          </button>
        </div>

      </div>
    </div>
  );
}

// ─── CSV UPLOAD MODAL ────────────────────────────────────────────────────────
function CSVUploadModal({onLoad,onClose}){
  const [dragging,setDragging]=useState(false);
  const [fileName,setFileName]=useState("");
  const [preview,setPreview]=useState("");
  const [csvText,setCsvText]=useState("");
  const fileRef=useRef(null);

  function readFile(file){
    if(!file) return;
    setFileName(file.name);
    const reader=new FileReader();
    reader.onload=e=>{
      const text=e.target.result;
      setCsvText(text);
      const lines=text.split("\n").slice(0,4).join("\n");
      setPreview(lines);
    };
    reader.readAsText(file);
  }

  function handleDrop(e){
    e.preventDefault(); setDragging(false);
    const file=e.dataTransfer.files[0];
    if(file&&file.name.endsWith(".csv")) readFile(file);
    else alert("Please drop a .csv file");
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:16,padding:28,width:"100%",maxWidth:500}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div>
            <h3 style={{margin:0,fontSize:17,fontWeight:700}}>Upload Price List CSV</h3>
            <p style={{margin:"4px 0 0",fontSize:12,color:"#64748b"}}>Use when auto-sync fails. Export from Google Sheets and upload here.</p>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94a3b8"}}>×</button>
        </div>

        {/* How to export instructions */}
        <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"12px 14px",marginBottom:18,fontSize:12,color:"#166534",lineHeight:1.7}}>
          <strong>How to export from Google Sheets:</strong><br/>
          1. Open your price list sheet<br/>
          2. File → Download → <strong>Comma Separated Values (.csv)</strong><br/>
          3. Upload the downloaded file below
        </div>

        {/* Drop zone */}
        <div
          onDragOver={e=>{e.preventDefault();setDragging(true);}}
          onDragLeave={()=>setDragging(false)}
          onDrop={handleDrop}
          onClick={()=>fileRef.current.click()}
          style={{border:"2px dashed "+(dragging?"#0ea5e9":"#cbd5e1"),borderRadius:12,padding:"28px 20px",textAlign:"center",cursor:"pointer",background:dragging?"#f0f9ff":"#f8fafc",transition:"all 0.2s",marginBottom:16}}>
          <div style={{fontSize:32,marginBottom:8}}>📂</div>
          <div style={{fontSize:14,fontWeight:600,color:"#374151"}}>{fileName||"Drop CSV file here or click to browse"}</div>
          <div style={{fontSize:12,color:"#94a3b8",marginTop:4}}>Supports .csv files from Google Sheets</div>
          <input ref={fileRef} type="file" accept=".csv" style={{display:"none"}} onChange={e=>readFile(e.target.files[0])}/>
        </div>

        {preview&&(
          <div style={{background:"#f1f5f9",borderRadius:8,padding:"10px 12px",marginBottom:16,fontSize:11,color:"#475569",fontFamily:"monospace",whiteSpace:"pre-wrap",maxHeight:80,overflow:"hidden"}}>
            {preview}
          </div>
        )}

        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={sBtn}>Cancel</button>
          <button onClick={()=>{ if(csvText) onLoad(csvText); else alert("Please select a CSV file first"); }}
            disabled={!csvText}
            style={{...pBtn,opacity:csvText?1:0.5}}>
            ✓ Load {csvText?"price list":""}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [users, setUsers] = useState(()=>loadUsers());
  useEffect(()=>{ pullUsersFromServer(setUsers); },[]);
  const [selUser,setSelUser]=useState(null);
  const [pwd,setPwd]=useState("");
  const [err,setErr]=useState("");
  const [showPwd,setShowPwd]=useState(false);
  const [otpStage,setOtpStage]=useState("idle");
  const [otpCode,setOtpCode]=useState("");
  const [otpLoading,setOtpLoading]=useState(false);
  useEffect(()=>{ setOtpStage("idle"); setOtpCode(""); setErr(""); setPwd(""); },[selUser]);

  function attemptLogin(){
    if(!selUser){ setErr("Please select your name"); return; }
    if(!selUser.active){ setErr("Your account is inactive. Contact admin."); return; }
    /* password check disabled - direct login */
    setErr("");
    onLogin(selUser);
  }

  async function sendOtp(){
    if(!selUser){ setErr("Please select your name"); return; }
    if(!selUser.active){ setErr("Your account is inactive. Contact admin."); return; }
    setErr(""); setOtpLoading(true);
    const r = await requestOtpForUser(selUser.id);
    setOtpLoading(false);
    if(r && r.ok){ setOtpStage("sent"); } else { setErr((r&&r.error)||"Could not send code. Try again."); }
  }
  async function verifyOtp(){
    setErr(""); setOtpLoading(true);
    const r = await verifyOtpForUser(selUser.id, otpCode);
    setOtpLoading(false);
    if(r && r.ok){ setOtpCode(""); setOtpStage("idle"); onLogin(selUser); } else { setErr((r&&r.error)||"Invalid or expired code."); }
  }

  const activeUsers=users.filter(u=>u.active!==false);

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a 0%,#1e293b 100%)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:0,padding:20}}>
      {/* Logo */}
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{width:72,height:72,background:"#0d9488",borderRadius:20,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",boxShadow:"0 8px 32px rgba(13,148,136,0.4)"}}>
          <span style={{fontSize:34}}>⚡</span>
        </div>
        <div style={{color:"#f1f5f9",fontSize:24,fontWeight:800,letterSpacing:"-0.5px"}}>Energy World</div>
        <div style={{color:"#475569",fontSize:13,marginTop:4}}>Site CRM · Panipat</div>
      </div>

      {/* Login card */}
      <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:16,padding:24,width:"100%",maxWidth:320,boxShadow:"0 20px 60px rgba(0,0,0,0.4)"}}>
        <div style={{fontSize:14,fontWeight:700,color:"#94a3b8",marginBottom:12,textTransform:"uppercase",letterSpacing:"0.08em"}}>Select your name</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
          {activeUsers.map(u=>(
            <button key={u.id} onClick={()=>{setSelUser(u);setErr("");setPwd("");}}
              style={{background:selUser?.id===u.id?(u.role==="admin"?"#1e40af":"#0d5656"):"#0f172a",
                color:"#e2e8f0",border:"1px solid "+(selUser?.id===u.id?(u.role==="admin"?"#3b82f6":"#0d9488"):"#334155"),
                borderRadius:10,padding:"11px 14px",cursor:"pointer",textAlign:"left",
                display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:14,transition:"all 0.15s"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:32,height:32,borderRadius:"50%",background:u.role==="admin"?"#1e40af":"#0d9488",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"#fff",flexShrink:0}}>
                  {u.name.charAt(0)}
                </div>
                <div>
                  <div style={{fontWeight:600,fontSize:13}}>{u.name}</div>
                  <div style={{fontSize:11,color:u.role==="admin"?"#93c5fd":"#64748b"}}>{u.role==="admin"?"Admin — Full Access":"Sales Executive"}</div>
                </div>
              </div>
              {selUser?.id===u.id&&<span style={{color:"#0d9488",fontSize:18}}>✓</span>}
            </button>
          ))}
        </div>

        {selUser&&(
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:"#94a3b8",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>Password</div>
            <div style={{position:"relative"}}>
              <input
                type={showPwd?"text":"password"}
                value={pwd}
                onChange={e=>{setPwd(e.target.value);setErr("");}}
                onKeyDown={e=>{ if(e.key==="Enter") attemptLogin(); }}
                placeholder="Enter password"
                autoFocus
                style={{width:"100%",boxSizing:"border-box",background:"#0f172a",border:"1px solid #334155",borderRadius:8,padding:"10px 40px 10px 12px",color:"#f1f5f9",fontSize:14,outline:"none"}}
              />
              <button onClick={()=>setShowPwd(v=>!v)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#475569",cursor:"pointer",fontSize:16}}>
                {showPwd?"🙈":"👁"}
              </button>
            </div>
            {err&&<div style={{fontSize:12,color:"#f87171",marginTop:6}}>{err}</div>}
          </div>
        )}

        {false&&(  /* OTP disabled - use password below */
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:600,color:"#94a3b8",marginBottom:6,letterSpacing:"0.08em"}}>LOGIN CODE</div>
            {otpStage==="idle"?(
              <div>
                <div style={{fontSize:12,color:"#94a3b8",marginBottom:8}}>We'll email a 6-digit code to {selUser.email.replace(/(.{2}).+(@.+)/,"$1***$2")}</div>
                <button onClick={sendOtp} disabled={otpLoading} style={{width:"100%",background:"#0d9488",color:"#fff",border:"none",borderRadius:8,padding:"12px",fontSize:15,fontWeight:700,cursor:"pointer",opacity:otpLoading?0.7:1}}>{otpLoading?"Sending…":"Send Code"}</button>
              </div>
            ):(
              <div>
                <input
                  value={otpCode}
                  onChange={e=>setOtpCode(e.target.value.replace(/\D/g,"").slice(0,6))}
                  placeholder="6-digit code"
                  inputMode="numeric"
                  style={{width:"100%",boxSizing:"border-box",background:"#0f172a",border:"1px solid #334155",borderRadius:8,padding:"10px 12px",color:"#f1f5f9",fontSize:18,letterSpacing:"0.3em",textAlign:"center"}}/>

            )}

        )}

        {selUser&&(

          {selUser?`Login as ${selUser.name.split(" ")[0]}`:"Select a name above"}

        )}

        <div style={{textAlign:"center",marginTop:14,fontSize:11,color:"#334155"}}>
          Default: Admin = <code style={{color:"#475569"}}>admin123</code> · Sales = <code style={{color:"#475569"}}>ew2024</code>
        </div>
      </div>
    </div>
  );
}

  const BOTS2={
    loginCode:{token:"8256970880:AAG0sEOALRKdCEjZ4j6050g8YxFMAInVpZU"},
    challanGen:{token:"8932618814:AAESnDKk7VqDsTUpF0WZWXB-Q_F-ykAykeQ",chatId:"-1003934546338"},
    dispatch:{token:"8891062190:AAH7wOrEeh5moDrrCCcMA78ckRf1Gqvo-nA",chatId:"-5347849815"},
    complaint:{token:"8210772559:AAGUHDoEAidzXtgJvB8Nni2-vAQ9XHQUwKQ"},

  async function tgSend2(key,text,chatId){

  const [activeSiteId,setActiveSiteId]=useState(null);

    setAppUsers(prev=>{
      const next=prev.map(u=>u.id===userId?{...u,password:newPwd}:u);

    pushUserToServer(newUser);
  }
  function updatePermission(perm, roles){
    setPermissions(prev=>({...prev,[perm]:roles}));

  // Auto-sync on login — Web App is always fresh, no CORS issues
  useEffect(()=>{
    if(!currentUser) return;
    const cached=localStorage.getItem("ew_products_v2");
    const cachedTime=localStorage.getItem("ew_products_time_v2");
    const CACHE_TTL = 30*60*1000; // 30 min cache
    if(cached&&cachedTime&&(Date.now()-Number(cachedTime)<CACHE_TTL)){
      try{
        const parsed=JSON.parse(cached);
        if(parsed.length>0){
          setProducts(parsed);
          setLastSynced(new Date(Number(cachedTime)));
          setSyncStatus("success");
          setSyncMsg(parsed.length+" products loaded from cache");
          setTimeout(()=>setSyncMsg(""),3000);
          return;

      }catch{}
    }
    // No fresh cache — auto-fetch from Web App
    fetchProducts(true);
  },[currentUser]);

  // Fetch from Web App (primary) or CSV publish URL (fallback)
  async function fetchProducts(silent=false){
    setSyncStatus("loading");
    setSyncMsg("Syncing from Google Sheet…");

    // PRIMARY: Google Apps Script Web App — always fresh, no CORS
    try{
      const controller = new AbortController();
      setTimeout(()=>controller.abort(), 15000);
      const res = await fetch(WEBAPP_URL+"?action=catalog&t="+Date.now(), {signal: controller.signal});
      if(!res.ok) throw new Error("Web App HTTP "+res.status);
      const rows = await res.json();
      if(!Array.isArray(rows)) throw new Error("Invalid response from Web App");
      // Parse rows — format: [sno, code, family, specs, cat, unit, price, brand, hsn, pic]
      const products = rows.map((row,i)=>{
        const get = (j) => (row[j]||"").toString().trim();
        const code=get(1), family=get(2), specs=get(3), cat=get(4);
        const unit=get(5)||"Per Pc.", brand=get(7), photoUrl=get(9);
        const priceRaw=get(6).replace(/[^0-9.]/g,"");
        const listPrice=parseFloat(priceRaw)||0;
        if(!specs&&!code) return null;
        if(!brand&&!specs) return null;
        if(specs.toLowerCase()==="size & description") return null;
        return {id:code||("p"+i),specs:specs||code,brand:brand||"Other",code,family,category:cat,unit,listPrice,gst:18,photoUrl:(()=>{
        if(!photoUrl||!photoUrl.startsWith("http")) return "";
        const dm=photoUrl.match(/\/d\/([a-zA-Z0-9_-]{20,})/);
        if(dm) return "https://lh3.googleusercontent.com/d/"+dm[1]+"=w200";
        const om=photoUrl.match(/[?&]id=([a-zA-Z0-9_-]{20,})/);
        if(om) return "https://lh3.googleusercontent.com/d/"+om[1]+"=w200";
        if(photoUrl.includes("lh3.googleusercontent.com")) return photoUrl.replace(/=w\d+$/,"")+"=w200";
        return photoUrl.replace(/\/view(\?.*)?$/,"").replace(/\?usp=.*$/,"");
      })(),hsn:get(8)};
      }).filter(Boolean);
      if(products.length<1) throw new Error("No products in Web App response");
      setProducts(products);
      const now=Date.now();
      localStorage.setItem("ew_products_v2",JSON.stringify(products));
      localStorage.setItem("ew_products_time_v2",String(now));
      setLastSynced(new Date(now));
      setSyncStatus("success");
      setSyncMsg(products.length+" products synced from Google Sheet ✓ (auto-updates when you edit the sheet)");
      setTimeout(()=>setSyncMsg(""),6000);
      return;
    }catch(e){
      setSyncMsg("Web App failed ("+e.message+"), trying CSV…");
    }

    // FALLBACK: CSV publish URL
    const PROXIES = [
      `https://corsproxy.io/?${encodeURIComponent(SHEET_CSV_URL)}`,
      SHEET_CSV_URL+"&t="+Date.now(),
    ];
    for(const url of PROXIES){
      try{
        const controller=new AbortController();
        setTimeout(()=>controller.abort(),8000);
        const res=await fetch(url,{signal:controller.signal});
        if(!res.ok) throw new Error("HTTP "+res.status);
        const text=await res.text();
        if(text.trim().startsWith("<")) throw new Error("Got HTML");
        const parsed=parseCSV(text);
        if(parsed.length<1) throw new Error("No products");
        setProducts(parsed);
        const now=Date.now();
        localStorage.setItem("ew_products_v2",JSON.stringify(parsed));
        localStorage.setItem("ew_products_time_v2",String(now));
        setLastSynced(new Date(now));
        setSyncStatus("success");
        setSyncMsg(parsed.length+" products loaded from CSV ✓");
        setTimeout(()=>setSyncMsg(""),5000);
        return;
      }catch(e){ /* try next */ }
    }
    setSyncStatus("error");
    setSyncMsg("Sync failed. Upload CSV manually.");
  }

  function handleCSVUpload(csvText){
    try{

  // ── Contacts (Plumber / Architect / Builder / PMC registry) ──

  function getPendingProducts(site){
    const si=(STAGE_IDX[site.stage]!==undefined?STAGE_IDX[site.stage]:0),result=[];
    STAGES.forEach((st,i)=>{ if(i>si)return; (STAGE_PRODUCTS[st.id]||[]).forEach(p=>{ const pitch=site.pitches?.[p.id]; if(!pitch||pitch.status==="pending") result.push({...p,stage:st}); }); });
    return result;
  }

  const visibleSites=useMemo(()=>{
    let list=isAdmin?sites:sites.filter(s=>s.assignedTo===currentUser?.id);

  },[sites,filterStage,filterAssigned,filterAlert,searchQ,currentUser,isAdmin]);

  const activeSite=sites.find(s=>s.id===activeSiteId);

  return(

        {["dashboard","sites"].concat(isAdmin?["admin"]:[]).map(v=>(

            {{"challan":"📦 Challan","stock":"🗂 Stock","ledger":"💰 Ledger","service":"🔧 Service","commission":"🤝 Commission","partners":"🤝 Partners","dailyreport":"📍 Daily Report"}[v]}
          </button>
        ))}
        <div style={{flex:1}}/>

        {/* ── PRICE LIST SYNC ── */}
        <div style={{display:"flex",alignItems:"center",gap:6,marginRight:6}}>
          {products.length>0&&syncStatus!=="loading"&&(

              ✓ {products.length} products

            </span>
          )}
          {syncStatus==="loading"&&<span style={{fontSize:11,color:"#f59e0b",fontWeight:500}}>⏳ Syncing…</span>}

          <button onClick={()=>fetchProducts(false)} disabled={syncStatus==="loading"}

        {view==="challan"&&<ChallanModule challans={challans} setChallans={setChallans} products={products} contacts={contacts} sites={sites} currentUser={currentUser} isAdmin={isAdmin} tgSend2={tgSend2} genId={genId} fmtINR2={fmtINR2} todayStr={todayStr} fmtDate2={fmtDate2} stockLedger={stockLedger} setStockLedger={setStockLedger} clientLedger={clientLedger} setClientLedger={setClientLedger} commissionRules={commissionRules} commissionLedger={commissionLedger} setCommissionLedger={setCommissionLedger}/>}
