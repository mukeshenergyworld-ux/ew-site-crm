  .stat-grid{grid-template-columns:1fr 1fr!important}

  .contact-grid{grid-template-columns:1fr!important}

  .quote-row{flex-wrap:wrap!important}

  .grid-3{grid-template-columns:1fr!important}

  body,#root{overflow-x:hidden}

  h2{font-size:16px!important}

// ─── CSV PARSER ───────────────────────────────────────────────────────────────
// New sheet columns: S.No. | Product Code | Product Family | Size & Description | Product Catagory | Unit | List Price (Rs) | Brand | HSN Code | Pic
function parseCSV(text){
  const lines = text.split(/\r?\n/);
  let headerIdx = -1;
  for(let i = 0; i < Math.min(15, lines.length); i++){
    const l = lines[i].toLowerCase();
    if(l.includes("product code") || (l.includes("s.no") && l.includes("brand"))){
      headerIdx = i; break;
    }
  }
  if(headerIdx < 0) return [];

  function splitRow(line){
    const result=[]; let cur=""; let inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){result.push(cur.trim().replace(/^"|"$/g,""));cur="";}
      else{cur+=c;}
    }
    result.push(cur.trim().replace(/^"|"$/g,""));
    return result;
  }

  const headers = splitRow(lines[headerIdx]).map(h=>h.toLowerCase().replace(/[^a-z0-9\s&%]/g,"").trim());
  function findCol(...keys){ for(const k of keys){ const idx=headers.findIndex(h=>h.includes(k)); if(idx>=0) return idx; } return -1; }

  const COL={
    code:   findCol("product code","code","item code","sku"),
    family: findCol("product family","family"),
    specs:  findCol("size & description","size","description","specifications","product spec","product name"),
    cat:    findCol("product catagory","product category","category","catagory"),
    unit:   findCol("unit"),
    price:  findCol("list price","price","rate","lp","mrp"),
    brand:  findCol("brand"),
    hsn:    findCol("hsn"),
    photo:  findCol("pic","photo","image","url"),
  };

  const products=[];
  for(let i=headerIdx+1;i<lines.length;i++){
    const line=lines[i].trim();
    if(!line) continue;
    const row=splitRow(line);
    if(row.length<4) continue;
    const get=(col)=>col>=0&&col<row.length?(row[col]||"").trim():"";
    const code=get(COL.code);
    const family=get(COL.family);
    const specs=get(COL.specs);
    const cat=get(COL.cat);
    const unit=get(COL.unit)||"Per Pc.";
    const brand=get(COL.brand);
    const photoUrl=get(COL.photo);
    const priceRaw=get(COL.price).replace(/[^0-9.]/g,"");
    const listPrice=parseFloat(priceRaw)||0;
    if(!specs&&!code) continue;
    if(!brand&&!specs) continue;
    if(specs.toLowerCase()==="size & description"||brand.toLowerCase()==="brand") continue;
    products.push({
      id:code||("p"+i),
      specs:specs||code,
      brand:brand||"Other",
      code,family,
      category:cat,
      unit,listPrice,
      gst:18,
      photoUrl:(photoUrl&&photoUrl.startsWith("http"))?photoUrl:"",
      hsn:get(COL.hsn),
    });
  }
  return products;
}

// ─── PDF GENERATOR (jsPDF) ───────────────────────────────────────────────────
// ─── IMAGE PRE-LOADER ─────────────────────────────────────────────────────────
// Fetches all unique product image URLs and converts to base64
// Returns a map: { url -> "data:image/jpeg;base64,..." }
async function preloadImages(items, onProgress){
  const cache = {};
  const uniqueUrls = [...new Set(items.map(i=>i.photoUrl).filter(u=>u&&u.startsWith("http")))];
  if(!uniqueUrls.length) return cache;

  // PROXY FIRST — Apps Script fetches images server-side, no CORS issues
  // Canvas approach fails for Google Drive images due to CORS taint
  async function loadViaProxy(url){
    try{
      const proxyUrl = WEBAPP_URL+"?action=image&url="+encodeURIComponent(url);
      const res = await fetch(proxyUrl, {signal: AbortSignal.timeout(20000)});
      if(!res.ok) return null;
      const data = await res.json();
      if(data.ok && data.b64 && data.b64.length > 100){
        return "data:"+(data.mime||"image/jpeg")+";base64,"+data.b64;
      }
      console.warn("Proxy returned no b64 for:", url, data.error||"");
    }catch(e){ console.warn("Proxy failed for:", url, e.message); }
    return null;
  }

  // CANVAS FALLBACK — works only for truly public/CORS-open URLs
  function loadViaCanvas(url){
    return new Promise((resolve)=>{
      const img = new Image();
      img.crossOrigin = "anonymous";
      const timer = setTimeout(()=>{ img.src=""; resolve(null); }, 8000);
      img.onload = ()=>{
        clearTimeout(timer);
        try{
          const c = document.createElement("canvas");
          c.width = Math.min(img.naturalWidth||200, 400);
          c.height= Math.min(img.naturalHeight||200, 400);
          c.getContext("2d").drawImage(img,0,0,c.width,c.height);
          const b64 = c.toDataURL("image/jpeg", 0.8);
          resolve(b64.length > 500 ? b64 : null);
        }catch(e){ resolve(null); } // SecurityError on CORS-blocked images
      };
      img.onerror = ()=>{ clearTimeout(timer); resolve(null); };
      img.src = url;
    });
  }

  // Strategy: proxy first (reliable), canvas as fallback
  async function fetchOne(url){
    const proxyResult = await loadViaProxy(url);
    if(proxyResult) return proxyResult;
    return await loadViaCanvas(url); // last resort
  }

  // Run in batches of 4 — parallel but not overwhelming
  const BATCH = 4;
  let done = 0;
  for(let i=0; i<uniqueUrls.length; i+=BATCH){
    const batch = uniqueUrls.slice(i, i+BATCH);
    const results = await Promise.allSettled(batch.map(u=>fetchOne(u)));
    results.forEach((r,idx)=>{
      if(r.status==="fulfilled" && r.value) cache[batch[idx]] = r.value;
    });
    done += batch.length;
    if(onProgress) onProgress(Math.min(done, uniqueUrls.length), uniqueUrls.length);
  }
  return cache;
}

// ─── NUMBER TO WORDS (Indian system) ────────────────────────────────────────
function numToWords(n){
  const a=["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
  const b=["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
  function words(num){
    if(num===0)return"";if(num<20)return a[num]+" ";if(num<100)return b[Math.floor(num/10)]+" "+(num%10?a[num%10]+" ":"");
    if(num<1000)return a[Math.floor(num/100)]+" Hundred "+(num%100?words(num%100):"");
    if(num<100000)return words(Math.floor(num/1000))+"Thousand "+words(num%1000);
    if(num<10000000)return words(Math.floor(num/100000))+"Lakh "+words(num%100000);
    return words(Math.floor(num/10000000))+"Crore "+words(num%10000000);
  }
  const integer=Math.floor(Math.abs(n));
  let result=words(integer).trim()||"Zero";
  return result+" Only";
}

// ─── CURRENCY + FONT HELPERS ─────────────────────────────────────────────────
function setupPDFFont(doc){
  try{
    if(window._notoB64){
      doc.addFileToVFS("NotoSans.ttf", window._notoB64);
      doc.addFont("NotoSans.ttf","NotoSans","normal");
      doc.addFont("NotoSans.ttf","NotoSans","bold");
      return "NotoSans";
    }
  }catch(e){ console.warn("Font setup:", e.message); }
  return "helvetica";
}

const RUPEE = "\u20B9"; // ₹ — renders in NotoSans
const BULLET = ">> "; // ASCII bullet — reliable in all fonts
const INR = (n) => RUPEE + Number(n||0).toLocaleString("en-IN",{minimumFractionDigits:0,maximumFractionDigits:0});

// ── 3D Cardboard box placeholder — pure lines/rects, no triangle() needed ──
function drawBoxPlaceholder(doc,cx,cy,cw,ch,font){
  // Light grey rounded background
  doc.setFillColor(246,247,249); doc.setDrawColor(214,220,228); doc.setLineWidth(0.25);
  doc.roundedRect(cx,cy,cw,ch,1.5,1.5,"FD");

  // Box measurements — centered, ~9x9mm total
  const mx=cx+cw/2, my=cy+ch/2+0.8;
  const bw=8.5, bh=6, lidH=2, sideW=2.8, sideH=1.2;
  const bx=mx-bw/2, by=my-bh/2;

  // ── Right side face (dark, drawn first so front overlaps) ──
  doc.setFillColor(162,128,72);
  // Side is a parallelogram: bx+bw → bx+bw+sideW (shifted up by sideH)
  doc.setDrawColor(140,108,55); doc.setLineWidth(0.3);
  // Draw as filled polygon using lines approach
  doc.setFillColor(162,128,72);
  // Top-right → top-right-side → bottom-right-side → bottom-right
  const sx1=bx+bw, sy1=by;
  const sx2=bx+bw+sideW, sy2=by-sideH;
  const sx3=bx+bw+sideW, sy3=by+bh-sideH;
  const sx4=bx+bw, sy4=by+bh;
  // Fill right face with lines
  for(let i=0;i<=bh;i+=0.4){
    const t=i/bh;
    doc.line(sx1, sy1+i, sx2+0, sy2+(sy3-sy2)*t);
  }
  doc.line(sx1,sy1,sx2,sy2); doc.line(sx2,sy2,sx3,sy3);
  doc.line(sx3,sy3,sx4,sy4); doc.line(sx1,sy1,sx4,sy4);

  // ── Front face (main body) ──
  doc.setFillColor(205,168,105); doc.setDrawColor(155,122,65); doc.setLineWidth(0.35);
  doc.rect(bx, by, bw, bh, "FD");

  // ── Lid open — two flaps ──
  doc.setFillColor(220,185,130); doc.setDrawColor(155,122,65); doc.setLineWidth(0.3);
  // Left flap (slightly angled look)
  doc.rect(bx+0.5, by-lidH*1.3, bw/2-1, lidH, "FD");
  // Right flap
  doc.rect(bx+bw/2+0.5, by-lidH*1.3, bw/2-1, lidH, "FD");
  // Lid base line
  doc.line(bx, by-lidH*0.15, bx+bw, by-lidH*0.15);

  // ── Tape lines on front face ──
  doc.setDrawColor(165,128,60); doc.setLineWidth(0.5);
  doc.line(mx, by-lidH*0.15, mx, by+bh);          // vertical centre
  doc.line(bx, by+bh*0.42, bx+bw, by+bh*0.42);   // horizontal flap

  // ── Top face hint (thin strip for 3D) ──
  doc.setFillColor(228,195,148); doc.setDrawColor(155,122,65); doc.setLineWidth(0.25);
  doc.rect(bx, by-lidH*0.15, bw, lidH*0.25, "FD");
}

  const pH=doc.internal.pageSize.height;
  doc.setFillColor(...DARK); doc.rect(0,pH-18,W,9,"F");

  return doc;
}



// ─── SEND PDF TO TELEGRAM ────────────────────────────────────────────────────
async function sendTelegramPDF(doc, filename, caption){
  try{
    const pdfBlob = doc.output("blob");
    const form = new FormData();
    form.append("chat_id", TG_CHAT);
    form.append("document", pdfBlob, filename);
    form.append("caption", caption);
    form.append("parse_mode", "HTML");
    const res = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendDocument`, {
      method:"POST", body:form
    });
    const data = await res.json();
    if(!data.ok) throw new Error(data.description||"Unknown error");
    return true;
  }catch(e){
    console.warn("Telegram PDF send failed:", e.message);
    return false;
  }
}

async function sendTelegram(text){
  try{
    await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`,{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({chat_id:TG_CHAT, text, parse_mode:"HTML"})
    });
  }catch(e){ console.warn("Telegram send failed:",e.message); }
}

// ─── MONTHLY REPORT GENERATOR ────────────────────────────────────────────────
function getMonthLabel(offset=0){
  const d=new Date(); d.setMonth(d.getMonth()+offset);
  return d.toLocaleString("en-IN",{month:"long",year:"numeric"});
}
function getMonthRange(offset=0){
  const d=new Date(); d.setMonth(d.getMonth()+offset);
  const y=d.getFullYear(), m=d.getMonth();
  const start=`${y}-${String(m+1).padStart(2,"0")}-01`;
  const end=`${y}-${String(m+1).padStart(2,"0")}-${String(new Date(y,m+1,0).getDate()).padStart(2,"0")}`;
  return {start,end,label:getMonthLabel(offset)};
}

// 1. Monthly Site Stage Report — all sites with current stage
async function sendMonthlySiteStageReport(sites, monthOffset=0){
  const {label}=getMonthRange(monthOffset);
  const stageCounts=Object.fromEntries(STAGES.map(s=>[s.id,{label:s.label,sites:[]}]));
  sites.forEach(s=>{ if(stageCounts[s.stage]) stageCounts[s.stage].sites.push(s); });

  let msg=`📊 <b>Monthly Site Stage Report</b>\n`;
  msg+=`🗓 <b>${label}</b> · Total: ${sites.length} sites\n`;
  msg+=`━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;

  STAGES.forEach(st=>{
    const group=stageCounts[st.id];
    if(!group.sites.length) return;
    msg+=`<b>${st.emoji||"🏗"} ${st.label}</b> (${group.sites.length})\n`;

  msg+=`🔥 Active sites: <b>${pendingSites.length}</b>\n`;
  msg+=`📅 Report sent: ${today()} by Energy World CRM`;

  await sendTelegram(msg);
  return msg;
}

  });

  sites.forEach(s=>{
    Object.entries(s.pitches||{}).forEach(([pid,pitch])=>{
      if(!pitch.updatedAt||pitch.updatedAt<start||pitch.updatedAt>end) return;
      const product=allProducts.find(p=>p.id===pid);
      if(!product) return;
      const bs=brandStats[product.brand];
      if(!bs) return;
      if(pitch.status==="won") bs.won++;
      else if(pitch.status==="lost") bs.lost++;
      else if(pitch.status==="pitched") bs.pitched++;
    });
  });

  let msg=`🏆 <b>Brand Win/Loss Report</b>\n`;
  msg+=`🗓 <b>${label}</b>\n`;
  msg+=`━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;

  const brands=Object.entries(brandStats).filter(([,v])=>v.won+v.lost+v.pitched>0);
  brands.sort((a,b)=>b[1].won-a[1].won);

  if(!brands.length){
    msg+=`No pitch activity recorded in ${label}\n`;
  } else {
    brands.forEach(([brand,stat])=>{
      const total=stat.won+stat.lost+stat.pitched;
      const winRate=total>0?Math.round(stat.won/total*100):0;
      msg+=`<b>${brand}</b>\n`;
      msg+=`  ✅ Won: ${stat.won}  ❌ Lost: ${stat.lost}  🔄 In progress: ${stat.pitched}\n`;
      msg+=`  📈 Win rate: ${winRate}%\n\n`;
    });
  }

  msg+=`━━━━━━━━━━━━━━━━━━━━━━━━\n`;
  msg+=`📅 Report sent: ${today()} by Energy World CRM`;

  await sendTelegram(msg);
  return msg;
}

// ─── GPS DISTANCE ─────────────────────────────────────────────────────────────
function haversineKm(la1,lo1,la2,lo2){
  const R=6371,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function calcMonthlyKm(visits){
  const pts=visits.filter(v=>v.gpsLat&&v.gpsLng).sort((a,b)=>a.date.localeCompare(b.date));
  let km=0;
  for(let i=1;i<pts.length;i++) km+=haversineKm(+pts[i-1].gpsLat,+pts[i-1].gpsLng,+pts[i].gpsLat,+pts[i].gpsLng);
  return Math.round(km);
}

// ─── SMART PRODUCT SELECTOR ──────────────────────────────────────────────────
// Step 1: Brand → Family → Product (with image) OR direct code search
// Step 2: Basket review + qty
// Step 3: Discount per brand/family category
function SmartProductSelector({products, loading, currentBasket, onFinish, onClose}){
  const [mode, setMode]   = useState("browse"); // browse | code
  const [codeQ, setCodeQ] = useState("");
  const [codeResult, setCodeResult] = useState(null);
  const [selBrand, setSelBrand]   = useState(null);
  const [selFamily, setSelFamily] = useState(null);
  const [basket, setBasket] = useState(currentBasket||[]); // [{product,qty}]
  const [step, setStep]   = useState(1); // 1=select, 2=qty review, 3=discount
  const [discounts, setDiscounts] = useState({}); // {familyKey: pct}
  const [expandedBrands, setExpandedBrands] = useState({});

  const brands  = useMemo(()=>[...new Set(products.map(p=>p.brand))].filter(Boolean).sort(),[products]);
  const families= useMemo(()=>{
    if(!selBrand) return [];
    return [...new Set(products.filter(p=>p.brand===selBrand).map(p=>p.family))].filter(Boolean).sort();
  },[products,selBrand]);
  const familyProducts = useMemo(()=>{
    if(!selBrand||!selFamily) return [];
    return products.filter(p=>p.brand===selBrand && p.family===selFamily);
  },[products,selBrand,selFamily]);

  // Direct code search
  useEffect(()=>{
    if(!codeQ.trim()){ setCodeResult(null); return; }
    const q=codeQ.trim().toLowerCase();
    const found=products.find(p=>p.code&&p.code.toLowerCase()===q);
    setCodeResult(found||null);
  },[codeQ,products]);

  function addToBasket(product){
    setBasket(prev=>{
      if(prev.find(b=>b.product.id===product.id)) return prev;
      return [...prev,{product,qty:1}];
    });
  }
  function removeFromBasket(id){ setBasket(prev=>prev.filter(b=>b.product.id!==id)); }
  function setQty(id,qty){ setBasket(prev=>prev.map(b=>b.product.id===id?{...b,qty:Math.max(1,Number(qty)||1)}:b)); }
  const isInBasket=(id)=>!!basket.find(b=>b.product.id===id);

  // Discount categories = unique brand+family combos in basket
  const discountCategories = useMemo(()=>{
    const seen={};
    basket.forEach(b=>{
      const k=b.product.brand+(b.product.family?"/"+b.product.family:"");
      if(!seen[k]) seen[k]={key:k, label:b.product.brand+(b.product.family?" — "+b.product.family:""), count:0, subtotal:0};
      seen[k].count++;
      seen[k].subtotal+=b.product.listPrice*b.qty;
    });
    return Object.values(seen);
  },[basket]);

  const discountBrands = useMemo(()=>{
    const byBrand={};
    discountCategories.forEach(cat=>{
      const brand=cat.key.split("/")[0];
      if(!byBrand[brand]) byBrand[brand]={brand, families:[], count:0, subtotal:0};
      byBrand[brand].families.push(cat);
      byBrand[brand].count+=cat.count;
      byBrand[brand].subtotal+=cat.subtotal;
    });
    return Object.values(byBrand);
  },[discountCategories]);

  function finalItems(){
    return basket.map(b=>{
      const k=b.product.brand+(b.product.family?"/"+b.product.family:"");
      const disc=Number(discounts[k]||0);
      const netPrice = disc>0 ? b.product.listPrice*(1-disc/100) : b.product.listPrice;
      return { id:makeId(), specs:b.product.specs, brand:b.product.brand,
        code:b.product.code, family:b.product.family, unit:b.product.unit,
        listPrice:b.product.listPrice, gst:b.product.gst, photoUrl:b.product.photoUrl||"",
        qty:b.qty, discount:disc, netPrice:disc>0?netPrice:null, note:"" };
    });
  }

  const overlay={position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:300,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"12px",overflowY:"auto"};
  const card={background:"#fff",borderRadius:16,width:"100%",maxWidth:820,display:"flex",flexDirection:"column",minHeight:"90vh"};

  // ── STEP 3: DISCOUNT PER CATEGORY ──
  if(step===3){
    return(
      <div style={overlay}>
        <div style={card}>
          <div style={{background:"#0f172a",borderRadius:"16px 16px 0 0",padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{color:"#fff",fontWeight:700,fontSize:16}}>Step 3 — Set discount per brand / family</div>
              <div style={{color:"#94a3b8",fontSize:12,marginTop:2}}>Discount applies to all products in that category</div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span style={{fontSize:12,color:"#64748b",background:"#1e293b",padding:"4px 10px",borderRadius:8}}>{basket.length} products selected</span>
              <button onClick={onClose} style={{background:"transparent",border:"1px solid #334155",color:"#94a3b8",borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:13}}>✕</button>
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"24px 24px 0"}}>
            {discountBrands.map(bg=>{
              const familyKeys=bg.families.map(f=>f.key);
              const firstVal=discounts[familyKeys[0]]||"";
              const allSame=familyKeys.every(k=>(discounts[k]||"")===firstVal);
              const brandDisc=allSame?firstVal:"";
              const brandDiscNum=Number(brandDisc||0);
              const brandSaving=bg.subtotal*brandDiscNum/100;
              const expanded=!!expandedBrands[bg.brand];
              const hasMultiple=bg.families.length>1;
              return(
                <div key={bg.brand} style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:12,padding:"16px 18px",marginBottom:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
                    {hasMultiple?(
                      <button onClick={()=>setExpandedBrands(prev=>({...prev,[bg.brand]:!expanded}))}
                        style={{border:"none",background:"none",cursor:"pointer",fontSize:16,color:"#475569",padding:0,width:20}}>
                        {expanded?"▾":"▸"}
                      </button>
                    ):<span style={{width:20}}/>}
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:14,color:"#0f172a"}}>{bg.brand}</div>
                      <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{bg.count} product{bg.count>1?"s":""}{hasMultiple?(" · "+bg.families.length+" categories"):""} · List subtotal: {fmtINR(bg.subtotal)}</div>
                      {brandDiscNum>0&&allSame&&<div style={{fontSize:12,color:"#059669",marginTop:2,fontWeight:600}}>Saving: {fmtINR(brandSaving)} ({brandDiscNum}%)</div>}
                      {!allSame&&<div style={{fontSize:11,color:"#b45309",marginTop:2}}>Mixed discounts — expand to view</div>}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:13,color:"#475569"}}>Discount</span>
                      <input type="number" min="0" max="100" value={brandDisc} placeholder="0"
                        onChange={e=>{
                          const v=e.target.value;
                          setDiscounts(prev=>{
                            const next={...prev};
                            familyKeys.forEach(k=>{next[k]=v;});
                            return next;
                          });
                        }}
                        style={{...inp,width:72,textAlign:"center",fontSize:14,fontWeight:700}}/>
                      <span style={{fontSize:13,color:"#475569"}}>%</span>
                    </div>
                  </div>
                  {expanded&&hasMultiple&&(
                    <div style={{marginTop:12,paddingTop:12,borderTop:"1px dashed #cbd5e1",display:"flex",flexDirection:"column",gap:8}}>
                      {bg.families.map(cat=>{
                        const disc=Number(discounts[cat.key]||0);
                        const saving=cat.subtotal*disc/100;
                        return(
                          <div key={cat.key} style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap",paddingLeft:28}}>
                            <div style={{flex:1}}>
                              <div style={{fontWeight:600,fontSize:13,color:"#334155"}}>{cat.label}</div>
                              <div style={{fontSize:11,color:"#94a3b8",marginTop:1}}>{cat.count} product{cat.count>1?"s":""} · {fmtINR(cat.subtotal)}</div>
                              {disc>0&&<div style={{fontSize:11,color:"#059669",marginTop:1,fontWeight:600}}>Saving: {fmtINR(saving)} ({disc}%)</div>}
                            </div>
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <input type="number" min="0" max="100" value={discounts[cat.key]||""} placeholder="0"
                                onChange={e=>setDiscounts(prev=>({...prev,[cat.key]:e.target.value}))}
                                style={{...inp,width:64,textAlign:"center",fontSize:13,fontWeight:600}}/>
                              <span style={{fontSize:12,color:"#475569"}}>%</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
            <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:12,padding:"14px 18px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:14,fontWeight:600,color:"#166534"}}>Total after discounts (excl. GST)</span>
              <span style={{fontSize:18,fontWeight:800,color:"#059669"}}>
                {fmtINR(basket.reduce((sum,b)=>{
                  const k=b.product.brand+(b.product.family?"/"+b.product.family:"");
                  return sum+b.product.listPrice*b.qty*(1-Number(discounts[k]||0)/100);
                },0))}
              </span>
            </div>
          </div>
          <div style={{padding:"16px 24px",borderTop:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",gap:8}}>
            <button onClick={()=>setStep(2)} style={sBtn}>← Back</button>
            <button onClick={()=>onFinish(finalItems())}
              style={{...greenBtn,fontSize:14,padding:"10px 24px",display:"flex",alignItems:"center",gap:8}}>
              ✅ Confirm &amp; Generate Quotation
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── STEP 2: BASKET / QTY REVIEW ──
  if(step===2){
    return(
      <div style={overlay}>
        <div style={card}>
          <div style={{background:"#0f172a",borderRadius:"16px 16px 0 0",padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{color:"#fff",fontWeight:700,fontSize:16}}>Step 2 — Review & set quantities</div>
              <div style={{color:"#94a3b8",fontSize:12,marginTop:2}}>{basket.length} product{basket.length!==1?"s":""} selected</div>
            </div>
            <button onClick={onClose} style={{background:"transparent",border:"1px solid #334155",color:"#94a3b8",borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:13}}>✕</button>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
            {basket.length===0&&(
              <div style={{textAlign:"center",padding:"40px 0",color:"#94a3b8"}}>
                <div style={{fontSize:32}}>🛒</div>
                <div style={{marginTop:8}}>No products selected yet</div>
                <button onClick={()=>setStep(1)} style={{...pBtn,marginTop:12}}>← Go back and select</button>
              </div>
            )}
            {basket.map((b,idx)=>{
              const lineTotal=b.product.listPrice*b.qty;
              return(
                <div key={b.product.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid #f1f5f9"}}>
                  {b.product.photoUrl?(
                    <img src={b.product.photoUrl} alt="" style={{width:48,height:48,objectFit:"contain",borderRadius:8,background:"#f8fafc",border:"1px solid #e2e8f0",flexShrink:0}}
                      onError={e=>e.target.style.display="none"}/>
                  ):(
                    <div style={{width:48,height:48,background:"#f1f5f9",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>📦</div>
                  )}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                      <span style={{fontSize:10,fontWeight:700,color:"#fff",background:BRAND_COLORS[b.product.brand]||"#64748b",padding:"2px 7px",borderRadius:6}}>{b.product.brand}</span>
                      <span style={{fontSize:13,fontWeight:600}}>{b.product.specs}</span>
                    </div>
                    <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{b.product.code} · {b.product.family} · {b.product.unit}</div>
                    <div style={{fontSize:12,color:"#475569",marginTop:2}}>{fmtINR(b.product.listPrice)} × {b.qty} = <strong>{fmtINR(lineTotal)}</strong></div>
                  </div>
                  <div style={{display:"flex",align:"center",gap:8,flexShrink:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <button onClick={()=>setQty(b.product.id,b.qty-1)} style={{width:28,height:28,border:"1px solid #e2e8f0",borderRadius:6,background:"#fff",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                      <input type="number" min="1" value={b.qty} onChange={e=>setQty(b.product.id,e.target.value)}
                        style={{...inp,width:52,textAlign:"center",padding:"4px",fontSize:14,fontWeight:700}}/>
                      <button onClick={()=>setQty(b.product.id,b.qty+1)} style={{width:28,height:28,border:"1px solid #e2e8f0",borderRadius:6,background:"#fff",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                    </div>
                    <button onClick={()=>removeFromBasket(b.product.id)} style={{width:28,height:28,border:"none",background:"none",color:"#ef4444",cursor:"pointer",fontSize:18}}>×</button>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{padding:"12px 20px",background:"#f8fafc",borderTop:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
            <div style={{fontSize:13,color:"#475569"}}>
              {basket.length} items · List total: <strong>{fmtINR(basket.reduce((s,b)=>s+b.product.listPrice*b.qty,0))}</strong>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setStep(1)} style={sBtn}>← Add more</button>
              <button onClick={()=>setStep(3)} disabled={basket.length===0}
                style={{...pBtn,opacity:basket.length===0?0.5:1}}>Set discounts →</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── STEP 1: PRODUCT SELECTION ──
  return(
    <div style={overlay}>
      <div style={card}>
        {/* Header */}
        <div style={{background:"#0f172a",borderRadius:"16px 16px 0 0",padding:"16px 20px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{color:"#fff",fontWeight:700,fontSize:16}}>Step 1 — Select Products</div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {basket.length>0&&(
                <button onClick={()=>setStep(2)}
                  style={{background:"#059669",border:"none",color:"#fff",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:6}}>
                  🛒 {basket.length} selected → Review
                </button>
              )}
              <button onClick={onClose} style={{background:"transparent",border:"1px solid #334155",color:"#94a3b8",borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:13}}>✕</button>
            </div>
          </div>
          {/* Mode tabs */}
          <div style={{display:"flex",gap:4}}>
            {[["browse","🔍 Browse by Brand"],["code","# Direct Code Search"]].map(([m,label])=>(
              <button key={m} onClick={()=>setMode(m)}
                style={{padding:"6px 14px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,
                  background:mode===m?"#fff":  "transparent",color:mode===m?"#0f172a":"#94a3b8"}}>
                {label}
              </button>
            ))}
          </div>
        </div>

        {loading&&<div style={{textAlign:"center",padding:40,color:"#64748b"}}>⏳ Loading catalog…<br/><span style={{fontSize:12,color:"#94a3b8"}}>Use ⬆ CSV button in nav if this takes too long</span></div>}
        {!loading&&products.length===0&&(
          <div style={{textAlign:"center",padding:40}}>
            <div style={{fontSize:28}}>📂</div>
            <div style={{fontWeight:600,marginTop:8}}>No products loaded</div>
            <div style={{fontSize:13,color:"#64748b",marginTop:4}}>Click <strong>↻ Sync Sheet</strong> or <strong>⬆ CSV</strong> in the top bar to load your catalog first.</div>
          </div>
        )}

        {/* ── CODE SEARCH MODE ── */}
        {mode==="code"&&!loading&&products.length>0&&(
          <div style={{flex:1,overflowY:"auto",padding:"20px"}}>
            <div style={{marginBottom:20}}>
              <label style={{fontSize:13,fontWeight:600,color:"#475569",display:"block",marginBottom:8}}>Enter product code exactly</label>
              <input value={codeQ} onChange={e=>setCodeQ(e.target.value)} placeholder="e.g. 40040150"
                style={{...inp,width:"100%",fontSize:15,fontWeight:600,letterSpacing:"0.5px"}} autoFocus/>
            </div>
            {codeQ&&!codeResult&&(
              <div style={{textAlign:"center",padding:24,color:"#94a3b8"}}>
                <div style={{fontSize:24}}>🔍</div>
                <div style={{marginTop:8,fontSize:13}}>No product found with code "{codeQ}"</div>
                <div style={{fontSize:12,marginTop:4}}>Check the code or switch to Browse mode</div>
              </div>
            )}
            {codeResult&&(
              <div style={{border:"2px solid "+(isInBasket(codeResult.id)?"#059669":"#e2e8f0"),borderRadius:14,padding:0,overflow:"hidden"}}>
                <div style={{display:"flex",gap:16,padding:"16px 20px",alignItems:"flex-start"}}>
                  {codeResult.photoUrl?(
                    <img src={codeResult.photoUrl} alt="" style={{width:80,height:80,objectFit:"contain",borderRadius:10,background:"#f8fafc",border:"1px solid #e2e8f0",flexShrink:0}}
                      onError={e=>e.target.style.display="none"}/>
                  ):(
                    <div style={{width:80,height:80,background:"#f1f5f9",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,flexShrink:0}}>📦</div>
                  )}
                  <div style={{flex:1}}>
                    <div style={{fontSize:11,fontWeight:700,color:BRAND_COLORS[codeResult.brand]||"#64748b",fontFamily:"monospace",letterSpacing:"0.5px",marginBottom:4}}>{codeResult.code}</div>
                    <div style={{fontWeight:700,fontSize:15,color:"#0f172a",lineHeight:1.3,marginBottom:4}}>{codeResult.specs}</div>
                    <div style={{fontSize:12,color:"#64748b"}}>{codeResult.brand} · {codeResult.family} · {codeResult.unit}</div>
                    <div style={{fontSize:14,fontWeight:700,color:"#0f172a",marginTop:6}}>{fmtINR(codeResult.listPrice)} <span style={{fontSize:11,color:"#64748b",fontWeight:400}}>+ GST {codeResult.gst}%</span></div>
                  </div>
                </div>
                <div style={{padding:"0 20px 16px",display:"flex",justifyContent:"flex-end"}}>
                  {isInBasket(codeResult.id)?(
                    <button onClick={()=>removeFromBasket(codeResult.id)} style={{...sBtn,color:"#ef4444",borderColor:"#fecaca"}}>✕ Remove from selection</button>
                  ):(
                    <button onClick={()=>{ addToBasket(codeResult); setCodeQ(""); setCodeResult(null); }}
                      style={greenBtn}>+ Add to selection</button>
                  )}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── BROWSE MODE ── */}
        {mode==="browse"&&!loading&&products.length>0&&(
          <div style={{flex:1,display:"flex",overflow:"hidden"}}>
            {/* Brand column */}
            <div style={{width:160,borderRight:"1px solid #e2e8f0",overflowY:"auto",flexShrink:0,background:"#f8fafc"}}>
              <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",padding:"10px 12px 6px",textTransform:"uppercase",letterSpacing:"0.5px"}}>Brand</div>
              {brands.map(b=>(
                <div key={b} onClick={()=>{ setSelBrand(b); setSelFamily(null); }}
                  style={{padding:"9px 12px",cursor:"pointer",fontSize:13,fontWeight:selBrand===b?700:400,
                    background:selBrand===b?"#fff":"transparent",color:selBrand===b?"#0f172a":"#475569",
                    borderRight:selBrand===b?"3px solid #0ea5e9":"3px solid transparent",
                    display:"flex",alignItems:"center",gap:6}}>
                  <span style={{width:8,height:8,borderRadius:"50%",background:BRAND_COLORS[b]||"#94a3b8",flexShrink:0,display:"inline-block"}}></span>
                  {b}
                </div>
              ))}
            </div>

            {/* Family column */}
            {selBrand&&(
              <div style={{width:180,borderRight:"1px solid #e2e8f0",overflowY:"auto",flexShrink:0}}>
                <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",padding:"10px 12px 6px",textTransform:"uppercase",letterSpacing:"0.5px"}}>Product Family</div>
                {families.length===0&&<div style={{padding:"12px",fontSize:12,color:"#94a3b8"}}>No families found</div>}
                {families.map(f=>(
                  <div key={f} onClick={()=>setSelFamily(f)}
                    style={{padding:"9px 12px",cursor:"pointer",fontSize:12,fontWeight:selFamily===f?700:400,
                      background:selFamily===f?"#eff6ff":"transparent",color:selFamily===f?"#1d4ed8":"#475569",
                      borderRight:selFamily===f?"3px solid #3b82f6":"3px solid transparent"}}>
                    {f}
                  </div>
                ))}
              </div>
            )}

            {/* Products column */}
            {selBrand&&selFamily&&(
              <div style={{flex:1,overflowY:"auto",padding:"10px 12px"}}>
                <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.5px"}}>
                  {selBrand} · {selFamily} — {familyProducts.length} products
                </div>
                {familyProducts.map(p=>{
                  const inB=isInBasket(p.id);
                  return(
                    <div key={p.id}
                      style={{display:"flex",alignItems:"center",gap:10,padding:"10px 8px",borderRadius:10,marginBottom:6,border:"1px solid "+(inB?"#bbf7d0":"#e2e8f0"),background:inB?"#f0fdf4":"#fff",cursor:"pointer",transition:"all 0.1s"}}
                      onClick={()=>inB?removeFromBasket(p.id):addToBasket(p)}>
                      {p.photoUrl?(
                        <img src={p.photoUrl} alt="" style={{width:44,height:44,objectFit:"contain",borderRadius:8,background:"#f8fafc",border:"1px solid #e2e8f0",flexShrink:0}}
                          onError={e=>e.target.style.display="none"}/>
                      ):(
                        <div style={{width:44,height:44,background:"#f1f5f9",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>📦</div>
                      )}
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:10,color:Q_TEAL,fontFamily:"monospace",fontWeight:700}}>{p.code}</div>
                        <div style={{fontSize:12,fontWeight:600,lineHeight:1.3,color:"#0f172a"}}>{p.specs}</div>
                        <div style={{fontSize:11,color:"#64748b",marginTop:1}}>{p.unit} · {fmtINR(p.listPrice)}</div>
                      </div>
                      <div style={{flexShrink:0}}>
                        {inB?(
                          <div style={{width:26,height:26,borderRadius:"50%",background:"#059669",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:14}}>✓</div>
                        ):(
                          <div style={{width:26,height:26,borderRadius:"50%",border:"2px solid #e2e8f0",display:"flex",alignItems:"center",justifyContent:"center",color:"#94a3b8",fontSize:16}}>+</div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
            {selBrand&&!selFamily&&(
              <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"#94a3b8",fontSize:14}}>
                ← Select a product family
              </div>
            )}
            {!selBrand&&(
              <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"#94a3b8",fontSize:14}}>
                ← Select a brand to start
              </div>
            )}
          </div>
        )}

        {/* Footer */}
        <div style={{padding:"12px 20px",borderTop:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,background:"#f8fafc"}}>
          <div style={{fontSize:13,color:"#475569"}}>
            {basket.length>0?`${basket.length} product${basket.length!==1?"s":""} in selection`:"Select products above"}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onClose} style={sBtn}>Cancel</button>
            <button onClick={()=>setStep(2)} disabled={basket.length===0}
              style={{...pBtn,opacity:basket.length===0?0.5:1}}>
              Review {basket.length>0?basket.length:""} selected →
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── QUOTATION BUILDER (simplified — SmartProductSelector handles selection) ─
function QuotationBuilder({site,products,loadingProducts,onSave,onClose,createdBy}){
  const [items,setItems]=useState([]);
  const [showSelector,setShowSelector]=useState(false);
  const [quoteNum]=useState(quoteNo());
  const [quoteDate]=useState(today());
  const [validDays,setValidDays]=useState(15);
  const [terms,setTerms]=useState(`Prices are Ex Works Panipat warehouse.

RETURNS & CANCELLATIONS — Goods once delivered and accepted cannot be returned unless found to be defective or incorrectly supplied. Any discrepancy must be reported within 48 hours of delivery. Custom-ordered or imported items are non-returnable and non-cancellable once placed with the supplier.
WARRANTY — All products are covered under the respective manufacturer's warranty. Energy World will provide reasonable assistance in connecting the customer with the brand's service team but does not assume any warranty obligation on behalf of the manufacturer.
INSTALLATION — Unless explicitly included in this quotation, installation is not part of the scope of supply. Energy World recommends installation by certified plumbers or brand-authorized technicians. Warranty may be void if products are installed by unqualified personnel.
FORCE MAJEURE — Energy World shall not be held liable for any delay, non-performance, or revision in pricing arising out of events beyond our reasonable control including geopolitical developments, war, government actions, supply chain disruptions, raw material shortages, freight escalations, or currency fluctuations.
ORDER CONFIRMATION — This quotation does not constitute a supply commitment. Orders are confirmed only upon receipt of a signed Purchase Order along with the stipulated advance payment. Verbal commitments are not binding.
DISPUTE RESOLUTION — Any disputes arising from this quotation or related transactions shall be subject to the jurisdiction of courts in Panipat. Parties shall first attempt to resolve disputes amicably within 30 days before pursuing legal recourse.
By placing an order, the client confirms acceptance of these terms.`);
  const [notes,setNotes]=useState("");
  const [showPrint,setShowPrint]=useState(false);
  const [sending,setSending]=useState(false);
  const [sent,setSent]=useState(false);
  const [sendStatus,setSendStatus]=useState("");

  function removeItem(id){ setItems(prev=>prev.filter(i=>i.id!==id)); }
  function updateItem(id,field,value){ setItems(prev=>prev.map(i=>i.id===id?{...i,[field]:value}:i)); }

  const totals=useMemo(()=>{
    let subTotal=0,totalGST=0,totalAmt=0;
    items.forEach(item=>{
      const hasDisc=(item.discount||0)>0;
      const netPrice=item.netPrice||(hasDisc?item.listPrice*(1-(item.discount||0)/100):item.listPrice);
      const base=netPrice*item.qty;
      const gstAmt=base*(item.gst/100);
      subTotal+=base; totalGST+=gstAmt; totalAmt+=base+gstAmt;
    });
    return {subTotal,totalGST,totalAmt};
  },[items]);

  async function handleSaveAndSend(){
    setSending(true);
    const q={id:makeId(),quoteNum,quoteDate,validDays,items,terms,notes,...totals,createdBy:createdBy||"",createdAt:today()};
    onSave(q);
    try{
      // Pre-load all product images as base64 before generating PDF
      const imgUrls = [...new Set(items.map(i=>i.photoUrl).filter(u=>u&&u.startsWith("http")))];
      setSendStatus(imgUrls.length > 0 ? `Loading images (0/${imgUrls.length})…` : "Generating PDF…");
      const imgCache = await preloadImages(items, (done,total)=>{
        setSendStatus(`Loading images (${done}/${total})…`);
      });
      const loaded = Object.keys(imgCache).length;
      setSendStatus(`Generating PDF… (${loaded}/${imgUrls.length} images loaded)`);
      // Generate PDF with image cache
      const doc = generateQuotePDF(site, items, quoteNum, quoteDate, validDays, terms, createdBy||COMPANY.name, imgCache);
      const filename = `${quoteNum}_${site.ownerName.replace(/\s+/g,"-")}.pdf`;
      const caption  = buildTelegramCaption(site, quoteNum, items, totals, createdBy||"Team");
      setSendStatus("Sending to Telegram…");
      await sendTelegramPDF(doc, filename, caption);
      setSendStatus("Downloading PDF…");
      doc.save(filename);
      setSent(true);
      setSendStatus("");
    }catch(e){
      console.error("Send error:", e);
      setSent(true);
      setSendStatus("");
    }
    setSending(false);
  }

  if(showPrint) return <QuotationPrint site={site} items={items} quoteNum={quoteNum} quoteDate={quoteDate} validDays={validDays} terms={terms} notes={notes} totals={totals} createdBy={createdBy} onBack={()=>setShowPrint(false)} onSaveAndClose={async()=>{ await handleSaveAndSend(); onClose(); }}/>;

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:150,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"12px",overflowY:"auto"}}>
      <div style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:960,minHeight:"95vh",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"16px 20px",borderBottom:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,background:"#0f172a",borderRadius:"16px 16px 0 0"}}>
          <div>
            <div style={{fontWeight:700,fontSize:16,color:"#fff"}}>New Quotation — {site.ownerName}</div>
            <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>{quoteNum} · {site.city} · {site.projectType}</div>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"1px solid #334155",color:"#94a3b8",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13}}>✕ Close</button>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"20px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontSize:14,fontWeight:600}}>Line items <span style={{color:"#94a3b8",fontWeight:400}}>({items.length})</span></div>
            <button onClick={()=>setShowSelector(true)} style={greenBtn}>+ Add / change products</button>
          </div>

          {items.length===0?(
            <div style={{textAlign:"center",padding:"48px 0",color:"#94a3b8",border:"2px dashed #e2e8f0",borderRadius:12,cursor:"pointer"}} onClick={()=>setShowSelector(true)}>
              <div style={{fontSize:36,marginBottom:10}}>🛒</div>
              <div style={{fontSize:15,fontWeight:600}}>Click to select products</div>
              <div style={{fontSize:12,marginTop:4}}>Browse by brand → family → product, or search by code</div>
            </div>
          ):(
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:900}}>
                <thead>
                  <tr style={{background:"#0b7b8a"}}>
                    {["","Sr.","Product","Unit","Qty","List Price","Disc %","Disc. Price","Total Amt",""].map((h,i)=>(
                      <th key={i} style={{
                        padding:"9px 7px",
                        textAlign:i>=5?"right":i===1?"center":"left",
                        fontWeight:700,color:"#fff",
                        borderBottom:"2px solid #09646f",
                        fontSize:11,whiteSpace:"nowrap"
                      }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {items.map((item,idx)=>{
                    const hasDisc=(item.discount||0)>0;
                    const discPrice=item.listPrice*(1-(item.discount||0)/100);
                    const netPrice=item.netPrice||(hasDisc?discPrice:item.listPrice);
                    const lineAmt=netPrice*item.qty;
                    const gstAmt=lineAmt*(item.gst/100);
                    return(
                      <tr key={item.id} style={{borderBottom:"1px solid #e2e8f0",background:idx%2===0?"#fff":"#f8fffe"}}>
                        {/* Product pic */}
                        <td style={{padding:"6px",verticalAlign:"middle",textAlign:"center"}}>
                          {item.photoUrl?(
                            <img src={item.photoUrl} alt="" style={{width:40,height:40,objectFit:"contain",borderRadius:6,border:"1px solid #e2e8f0",background:"#f8fafc"}}
                              onError={e=>e.target.style.display="none"}/>
                          ):(
                            <div style={{width:40,height:40,background:"#f1f5f9",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>📦</div>
                          )}
                        </td>
                        {/* Sr No */}
                        <td style={{padding:"6px",color:"#94a3b8",verticalAlign:"middle",textAlign:"center",fontWeight:700}}>{idx+1}</td>
                        {/* Product name + brand + note */}
                        <td style={{padding:"6px 8px",verticalAlign:"middle",maxWidth:220}}>
                          <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",marginBottom:2}}>
                            <span style={{fontSize:10,fontWeight:700,color:"#fff",background:BRAND_COLORS[item.brand]||"#64748b",padding:"1px 6px",borderRadius:4,whiteSpace:"nowrap"}}>{item.brand}</span>
                            <span style={{fontWeight:600,fontSize:12,lineHeight:1.3}}>{item.specs}</span>
                          </div>
                          <div style={{fontSize:10,color:"#94a3b8",marginBottom:3}}>{item.code}</div>
                          <input value={item.note||""} onChange={e=>updateItem(item.id,"note",e.target.value)} placeholder="Note (optional)…"
                            style={{...inp,fontSize:11,padding:"2px 6px",width:"100%",color:"#64748b"}}/>
                        </td>
                        {/* Unit */}
                        <td style={{padding:"6px",color:"#64748b",verticalAlign:"middle",textAlign:"center"}}>{item.unit}</td>
                        {/* Qty */}
                        <td style={{padding:"6px",verticalAlign:"middle",textAlign:"center"}}>
                          <input type="number" min="1" value={item.qty} onChange={e=>updateItem(item.id,"qty",parseFloat(e.target.value)||1)}
                            style={{...inp,width:52,padding:"3px 5px",fontSize:12,textAlign:"center",fontWeight:700}}/>
                        </td>
                        {/* List Price — editable, shown only when discount exists; greyed for no-discount */}
                        <td style={{padding:"6px",verticalAlign:"middle",textAlign:"right"}}>
                          {hasDisc?(
                            <input type="number" value={item.listPrice} onChange={e=>updateItem(item.id,"listPrice",parseFloat(e.target.value)||0)}
                              style={{...inp,width:80,padding:"3px 5px",fontSize:12,textAlign:"right",color:"#94a3b8"}}/>
                          ):(
                            <span style={{color:"#d1d5db",fontSize:12}}>—</span>
                          )}
                        </td>
                        {/* Discount % */}
                        <td style={{padding:"6px",verticalAlign:"middle",textAlign:"right"}}>
                          <input type="number" min="0" max="100" value={item.discount||""} placeholder="0"
                            onChange={e=>{
                              const d=parseFloat(e.target.value)||0;
                              setItems(prev=>prev.map(it=>it.id===item.id?{...it,discount:d,netPrice:d>0?undefined:it.netPrice}:it));
                            }}
                            style={{...inp,width:52,padding:"3px 5px",fontSize:12,textAlign:"center",
                              color:hasDisc?"#059669":"#94a3b8",fontWeight:hasDisc?700:400,
                              borderColor:hasDisc?"#6ee7b7":"#e2e8f0"}}/>
                        </td>
                        {/* Discounted Price — computed if discount set, editable if no discount */}
                        <td style={{padding:"6px",verticalAlign:"middle",textAlign:"right"}}>
                          {hasDisc?(
                            <div style={{fontWeight:700,fontSize:13,color:"#059669"}}>{fmtINR(discPrice)}</div>
                          ):(
                            <div>
                              <input type="number" value={item.netPrice||item.listPrice}
                                onChange={e=>updateItem(item.id,"netPrice",parseFloat(e.target.value)||0)}
                                style={{...inp,width:80,padding:"3px 5px",fontSize:12,textAlign:"right",fontWeight:700,
                                  borderColor:"#bfdbfe",color:"#1d4ed8"}}/>
                              <div style={{fontSize:9,color:"#94a3b8",marginTop:1}}>net price</div>
                            </div>
                          )}
                        </td>
                        {/* Total Amt */}
                        <td style={{padding:"6px",verticalAlign:"middle",textAlign:"right"}}>
                          <div style={{fontWeight:800,fontSize:13,color:"#0f172a"}}>{fmtINR(lineAmt)}</div>
                          <div style={{fontSize:10,color:"#94a3b8"}}>+GST {fmtINR(gstAmt)}</div>
                        </td>
                        {/* Remove */}
                        <td style={{padding:"6px",verticalAlign:"middle"}}>
                          <button onClick={()=>removeItem(item.id)} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
                <tfoot>
                  <tr style={{background:"#f8fafc",borderTop:"2px solid #e2e8f0"}}>
                    <td colSpan={8} style={{padding:"10px 8px",textAlign:"right",fontWeight:600,fontSize:13,color:"#475569"}}>Sub-total (excl. GST)</td>
                    <td style={{padding:"10px 8px",textAlign:"right",fontWeight:700,fontSize:13}}>{fmtINR(totals.subTotal)}</td><td/>
                  </tr>
                  <tr style={{background:"#f8fafc"}}>
                    <td colSpan={8} style={{padding:"5px 8px",textAlign:"right",color:"#64748b",fontSize:12}}>Total GST</td>
                    <td style={{padding:"5px 8px",textAlign:"right",color:"#64748b",fontSize:12}}>{fmtINR(totals.totalGST)}</td><td/>
                  </tr>
                  <tr style={{background:"#0f172a"}}>
                    <td colSpan={8} style={{padding:"12px 8px",textAlign:"right",color:"#fff",fontWeight:700,fontSize:14}}>Grand Total (incl. GST)</td>
                    <td style={{padding:"12px 8px",textAlign:"right",color:"#38bdf8",fontWeight:800,fontSize:16}}>{fmtINR(totals.totalAmt)}</td><td/>
                  </tr>
                </tfoot>
              </table>
            </div>
          )}

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginTop:20}}>
            <div>
              <label style={{fontSize:12,color:"#64748b",display:"block",marginBottom:6,fontWeight:600}}>Terms & Conditions</label>
              <textarea value={terms} onChange={e=>setTerms(e.target.value)} rows={5} style={{...inp,width:"100%",resize:"vertical",fontSize:12,lineHeight:1.6}}/>
            </div>
            <div>
              <div style={{marginBottom:12}}>
                <label style={{fontSize:12,color:"#64748b",display:"block",marginBottom:4}}>Valid for (days)</label>
                <input type="number" value={validDays} onChange={e=>setValidDays(Number(e.target.value))} style={{...inp,width:"100%"}}/>
              </div>
              <label style={{fontSize:12,color:"#64748b",display:"block",marginBottom:6,fontWeight:600}}>Internal notes (not printed)</label>
              <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={3} style={{...inp,width:"100%",resize:"vertical",fontSize:12}}/>
            </div>
          </div>

          {/* Dispatch info */}
          <div style={{marginTop:16,background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"12px 16px",fontSize:12,color:"#166534"}}>
            <strong>On submission:</strong> PDF is auto-generated → sent as document to <strong>EW Quotations</strong> Telegram group → downloaded to your device. Email: <strong>{NOTIFY_EMAIL}</strong>
          </div>
          {sent&&<div style={{marginTop:10,background:"#d1fae5",border:"1px solid #6ee7b7",borderRadius:10,padding:"10px 16px",fontSize:13,color:"#065f46",fontWeight:600}}>✅ PDF sent to Telegram group + downloaded to your device!</div>}
        </div>

        <div style={{padding:"14px 20px",borderTop:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <div style={{fontSize:13,color:"#64748b"}}>{items.length} items · <strong>{fmtINR(totals.totalAmt)}</strong></div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onClose} style={sBtn}>Discard</button>
            <button onClick={()=>setShowPrint(true)} disabled={items.length===0} style={{...sBtn,opacity:items.length===0?0.5:1}}>👁 Preview PDF</button>
            <button onClick={handleSaveAndSend} disabled={items.length===0||sending}
              style={{...greenBtn,opacity:(items.length===0||sending)?0.6:1,display:"flex",alignItems:"center",gap:6}}>
              {sending?(sendStatus||"⏳ Processing…"):"✅ Save & Send"}
            </button>
          </div>
        </div>
      </div>
      {showSelector&&<SmartProductSelector products={products} loading={loadingProducts} currentBasket={items.map(i=>({product:i,qty:i.qty}))} onFinish={newItems=>{ setItems(newItems); setShowSelector(false); }} onClose={()=>setShowSelector(false)}/>}
    </div>
  );
}

// ─── QUOTATION PRINT VIEW (InAir-style) ──────────────────────────────────────
const Q_TEAL = "#0b7b8a";
const Q_TEAL_LIGHT = "#e6f5f7";
const Q_TEAL_MID = "#0d9aac";
const Q_DARK = "#1a1a2e";
const Q_GRAY = "#6b7280";
const Q_LIGHT = "#f7fafa";

function SectionHeading({title, subtitle}){
  return(
    <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:14,marginTop:28}}>
      <div style={{width:4,minHeight:36,background:Q_TEAL,borderRadius:2,flexShrink:0,marginTop:2}}/>
      <div>
        <div style={{fontSize:16,fontWeight:700,color:Q_DARK,letterSpacing:"-0.2px"}}>{title}</div>
        {subtitle&&<div style={{fontSize:11,color:Q_GRAY,marginTop:2}}>{subtitle}</div>}
      </div>
    </div>
  );
}

function QuotationPrint({site,items,quoteNum,quoteDate,validDays,terms,notes,totals,onBack,onSaveAndClose}){
  const validUntil=new Date(new Date(quoteDate).getTime()+validDays*86400000).toISOString().slice(0,10);
  const gstGroups={};
  items.forEach(item=>{
    const base=item.listPrice*(1-item.discount/100)*item.qty;
    const k=item.gst;
    if(!gstGroups[k]) gstGroups[k]={cgst:0,sgst:0};
    gstGroups[k].cgst+=base*(k/2)/100;
    gstGroups[k].sgst+=base*(k/2)/100;
  });

  // Group items by brand for section display
  const brands=[...new Set(items.map(i=>i.brand))];

  const TERMS_LIST = [
    {label:"PAYMENT",     text:"50% advance along with purchase order. Balance before dispatch."},
    {label:"DELIVERY",    text:"Products dispatched within 7–10 working days of order confirmation."},
    {label:"GST",         text:"GST extra on all products, as per Government of India applicable rates."},
    {label:"VALIDITY",    text:`This quotation is valid for ${validDays} days from date of issue (until ${validUntil}).`},
    {label:"WARRANTY",    text:"As per respective manufacturer warranty terms for each brand."},
    {label:"FREIGHT",     text:"Freight & insurance extra, at actuals, unless mentioned otherwise."},
  ];
  // Merge custom terms into display
  const customTermLines = (terms||"").split("\n").map(l=>l.trim()).filter(Boolean);

  return(
    <div style={{position:"fixed",inset:0,background:"#d1d5db",zIndex:300,overflowY:"auto",fontFamily:"system-ui,-apple-system,sans-serif"}}>
      {/* Toolbar */}
      <div className="no-print" style={{background:"#0f172a",padding:"10px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:10}}>
        <div style={{color:"#fff",fontWeight:600,fontSize:14}}>Preview — {quoteNum}</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onBack} style={sBtn}>← Edit</button>
          <button onClick={()=>window.print()} style={{...pBtn,background:Q_TEAL}}>🖨 Print / Save PDF</button>
          <button onClick={onSaveAndClose} style={greenBtn}>💾 Save & Close</button>
        </div>
      </div>

      {/* ── A4 PAPER ── */}
      <div id="quotation-print" style={{background:"#fff",maxWidth:800,margin:"16px auto",boxShadow:"0 8px 32px rgba(0,0,0,0.18)",fontFamily:"system-ui,-apple-system,sans-serif"}}>

        {/* ── COVER HEADER (dark teal) ── */}
        <div style={{background:`linear-gradient(135deg, ${Q_DARK} 0%, #0d3d47 60%, ${Q_TEAL} 100%)`,padding:"36px 40px 28px",color:"#fff"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:28}}>
            {/* Logo / brand */}
            <div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                <div style={{width:40,height:40,background:Q_TEAL_MID,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:900}}>⚡</div>
                <div>
                  <div style={{fontSize:20,fontWeight:800,letterSpacing:"-0.3px"}}>{COMPANY.name}</div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.65)",letterSpacing:"0.8px",textTransform:"uppercase"}}>{COMPANY.tagline}</div>
                </div>
              </div>
            </div>
            {/* Quote number badge */}
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:4}}>Quotation</div>
              <div style={{fontSize:22,fontWeight:800,color:Q_TEAL_MID,letterSpacing:"-0.5px"}}>{quoteNum}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.6)",marginTop:4}}>{quoteDate}</div>
            </div>
          </div>

          {/* Three info boxes */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
            {[
              {label:"PREPARED FOR", main:site.ownerName, sub:site.phone},
              {label:"LOCATION",     main:site.city,       sub:site.address},
              {label:"PREPARED BY",  main:"Energy World",  sub:"Authorised Distributor"},
            ].map(b=>(
              <div key={b.label} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:8,padding:"12px 14px"}}>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.5)",letterSpacing:"1.2px",textTransform:"uppercase",marginBottom:5}}>{b.label}</div>
                <div style={{fontSize:14,fontWeight:700,color:"#fff"}}>{b.main}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.6)",marginTop:2}}>{b.sub}</div>
              </div>
            ))}
          </div>
        </div>

        {/* ── BODY ── */}
        <div style={{padding:"28px 40px 40px"}}>

          {/* Project tags */}
          <div style={{display:"flex",gap:8,marginBottom:4}}>
            {[site.projectType, STAGES.find(s=>s.id===site.stage)?.label, "Supply of Materials"].map(t=>(
              <span key={t} style={{fontSize:10,fontWeight:600,color:Q_TEAL,background:Q_TEAL_LIGHT,padding:"3px 10px",borderRadius:12,letterSpacing:"0.2px"}}>{t}</span>
            ))}
          </div>

          {/* ── ITEMS TABLE ── */}
          <SectionHeading title="Products & Materials" subtitle="Unit prices from current price list. GST extra as applicable."/>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11.5,marginBottom:8}}>
            <thead>
              <tr style={{background:Q_TEAL,color:"#fff"}}>
                {["#","","Item","Units","Qty","Project Price (₹)","Amount (₹)"].map((h,i)=>(

            </thead>
            <tbody>

                  <tr key={item.id} style={{borderBottom:"1px solid #e5e7eb",background:idx%2===0?"#fff":"#f9fffe"}}>
                    <td style={{padding:"11px 10px",color:"#9ca3af",fontSize:11,verticalAlign:"top",fontWeight:500}}>{idx+1}</td>
                    {/* thumbnail placeholder */}
                    <td style={{padding:"11px 6px",verticalAlign:"top"}}>
                      <div style={{width:28,height:28,background:Q_TEAL_LIGHT,borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>
                        {(BRAND_COLORS[item.brand]?"📦":"📦")}
                      </div>
                    </td>
                    <td style={{padding:"11px 10px",verticalAlign:"top",maxWidth:280}}>
                      <div style={{fontSize:10,fontWeight:700,color:Q_TEAL,fontFamily:"monospace",letterSpacing:"0.5px",marginBottom:2}}>{item.code||item.brand.toUpperCase().replace(/\s/g,"-")}</div>
