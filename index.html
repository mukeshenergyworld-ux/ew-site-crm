<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;-webkit-text-size-adjust:100%}
@media print {
  .no-print{display:none!important}
  body{background:#fff!important;margin:0;padding:0}
  #quotation-print{box-shadow:none!important;margin:0!important;max-width:100%!important}
  @page{margin:0;size:A4}
}
.print-only{display:none}

/* ── MOBILE RESPONSIVE FIXES ──────────────────────────────── */
@media(max-width:600px){
  /* Nav bar — stack on small screens */
  nav{flex-wrap:wrap!important;height:auto!important;padding:6px 10px!important;gap:4px!important}
  nav span{font-size:13px!important}
  /* Dashboard stat cards — 2 col */
  .stat-grid{grid-template-columns:1fr 1fr!important}
  /* Site cards full width */
  .site-card{min-width:unset!important;width:100%!important}
  /* Modal full screen */
  .modal-inner{max-width:100%!important;max-height:100vh!important;border-radius:0!important;padding:14px!important}
  /* Contact fields — stack to 1 col on mobile */
  .contact-grid{grid-template-columns:1fr!important}
  /* Quote line items — wrap */
  .quote-row{flex-wrap:wrap!important}
  /* 3-col grids → 1 col */
  .grid-3{grid-template-columns:1fr!important}
  /* Overflow fix */
  body,#root{overflow-x:hidden}
  /* Font size adjustments */
  h2{font-size:16px!important}
  h3{font-size:14px!important}
  /* Buttons full width on mobile forms */
  .btn-full-mobile{width:100%!important;margin-top:6px!important}
  /* Table horizontal scroll */
  .table-scroll{overflow-x:auto!important;-webkit-overflow-scrolling:touch}
  /* Smart product selector columns */
  .sps-cols{flex-direction:column!important}
  .sps-col{min-width:unset!important;width:100%!important;max-height:160px!important}
}
@media(max-width:400px){
  .nav-btn{padding:4px 6px!important;font-size:11px!important}
  .stat-val{font-size:22px!important}
}
/* ─── MOBILE/TABLET TOUCH OPTIMIZATIONS ─── */
button, select, input { -webkit-tap-highlight-color: rgba(0,0,0,0.1); }
/* Minimum touch target 44px */
nav button { min-height: 36px; }
/* Prevent zoom on input focus on iOS */
input, select, textarea { font-size: 16px!important; }
@media(max-width:640px){
  input, select, textarea { font-size: 16px!important; }
  button { min-height: 40px; }
  /* Larger touch targets for action buttons */
  .pBtn { padding: 10px 18px!important; min-height: 44px!important; }
  select { padding: 10px 12px!important; }
}
/* Smooth scrolling */
* { -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
/* Prevent text selection on tap */
nav, nav button { user-select: none; -webkit-user-select: none; }

// ─── PWA Install prompt ───────────────────────────────────────────────────
window._deferredInstall = null;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  window._deferredInstall = e;
  // Show install banner after 2 seconds if not dismissed recently
  const dismissed = localStorage.getItem("ew_install_dismissed");
  const oneDayAgo = Date.now() - 24*60*60*1000;
  if (!dismissed || Number(dismissed) < oneDayAgo) {
    setTimeout(() => {
      if (typeof showInstallBanner === "function") showInstallBanner();
    }, 2000);
  }
});
window.addEventListener("appinstalled", () => {
  window._deferredInstall = null;
  const b = document.getElementById("ew-install-banner");
  if (b) b.remove();
});
// Show on page load for iOS (no beforeinstallprompt on Safari)
document.addEventListener("DOMContentLoaded", () => {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
  if (isIOS && !isStandalone) {
    const dismissed = localStorage.getItem("ew_install_dismissed");
    const oneDayAgo = Date.now() - 24*60*60*1000;
    if (!dismissed || Number(dismissed) < oneDayAgo) {
      setTimeout(() => {
        if (typeof showInstallBanner === "function") showInstallBanner();
      }, 3000);
    }
  }
});
</script>

<script>
// ─── Service Worker: force update on every load ──────────────────────────────
if ('serviceWorker' in navigator) {
  // Register an inline SW via blob URL that ALWAYS fetches from network (no cache)
  const swCode = `
self.addEventListener('install', e => { self.skipWaiting(); });
self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k))))
    .then(() => self.clients.claim())
  );
});
self.addEventListener('fetch', e => {
  if (e.request.mode === 'navigate') {
    e.respondWith(fetch(e.request, {cache: 'no-store'}).catch(() => caches.match(e.request)));
  }
});
`;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, {scope: '/ew-site-crm/'})
    .then(reg => {
      reg.update(); // Force check for update immediately
    }).catch(() => {});

  // Also unregister any old SWs and clear caches
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(reg => {
      if (reg.scope && !reg.scope.includes('blob:')) reg.unregister();
    });
  });
  caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
}
</script>
