                    </td>
                    <td style={{padding:"11px 10px",color:Q_GRAY,verticalAlign:"top",textAlign:"right",whiteSpace:"nowrap"}}>{item.unit}</td>
                    <td style={{padding:"11px 10px",verticalAlign:"top",textAlign:"right",fontWeight:600}}>{item.qty}</td>
                    <td style={{padding:"11px 10px",textAlign:"right",verticalAlign:"top"}}>
                      {item.discount>0&&<div style={{fontSize:10,color:"#9ca3af",textDecoration:"line-through",marginBottom:1}}>{fmtINR(item.listPrice)}</div>}
                      <div style={{fontWeight:600,color:Q_DARK}}>{fmtINR(discPrice)}</div>
                    </td>
                    <td style={{padding:"11px 10px",textAlign:"right",verticalAlign:"top",fontWeight:700,color:Q_DARK,fontSize:13}}>{fmtINR(lineTotal)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>

          {/* Sub-total line */}
          <div style={{textAlign:"right",padding:"8px 10px",fontSize:12,color:Q_GRAY,borderBottom:"1px solid #e5e7eb",marginBottom:20}}>
            Sub-Total — Products (excl. GST)&nbsp;&nbsp;<strong style={{color:Q_DARK}}>{fmtINR(totals.subTotal)}</strong>
          </div>

          {/* ── TOTALS + GST SIDE BY SIDE ── */}
          <div style={{display:"flex",gap:20,marginBottom:28,alignItems:"flex-start"}}>
            {/* GST summary */}
            <div style={{flex:1}}>
              <div style={{fontSize:11,fontWeight:700,color:Q_GRAY,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:8}}>GST Summary</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,border:"1px solid #e5e7eb",borderRadius:6,overflow:"hidden"}}>
                <thead>
                  <tr style={{background:"#f3fafb"}}>
                    {["GST Rate","Taxable Amt","CGST","SGST","Total GST"].map(h=>(
                      <th key={h} style={{padding:"6px 10px",textAlign:"right",fontWeight:600,color:Q_GRAY,fontSize:10.5}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {Object.entries(gstGroups).map(([rate,{cgst,sgst}])=>{
                    const taxable=cgst*2/(Number(rate)/100);
                    return(
                      <tr key={rate} style={{borderTop:"1px solid #e5e7eb"}}>
                        <td style={{padding:"6px 10px",textAlign:"right",fontWeight:600,color:Q_TEAL}}>{rate}%</td>
                        <td style={{padding:"6px 10px",textAlign:"right"}}>{fmtINR(taxable)}</td>
                        <td style={{padding:"6px 10px",textAlign:"right",color:Q_GRAY}}>{fmtINR(cgst)}</td>
                        <td style={{padding:"6px 10px",textAlign:"right",color:Q_GRAY}}>{fmtINR(sgst)}</td>
                        <td style={{padding:"6px 10px",textAlign:"right",fontWeight:700}}>{fmtINR(cgst+sgst)}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            {/* Grand total box */}
            <div style={{minWidth:248}}>
              <div style={{border:"1px solid #e5e7eb",borderRadius:8,overflow:"hidden"}}>
                {[
                  {l:"Sub-Total (excl. GST)", v:fmtINR(totals.subTotal), bold:false},
                  {l:`GST @ 18%`,             v:fmtINR(totals.totalGST),   bold:false},
                ].map(r=>(
                  <div key={r.l} style={{display:"flex",justifyContent:"space-between",padding:"8px 14px",borderBottom:"1px solid #e5e7eb",fontSize:12}}>
                    <span style={{color:Q_GRAY}}>{r.l}</span>
                    <span style={{fontWeight:r.bold?700:500}}>{r.v}</span>
                  </div>
                ))}
                <div style={{background:Q_TEAL,padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{color:"#fff",fontWeight:700,fontSize:13,letterSpacing:"0.2px"}}>Total Payable (incl. GST)</span>
                  <span style={{color:"#fff",fontWeight:800,fontSize:17,letterSpacing:"-0.3px"}}>{fmtINR(totals.totalAmt)}</span>
                </div>
              </div>
              <div style={{fontSize:10,color:"#9ca3af",marginTop:6,textAlign:"center",fontStyle:"italic"}}>Quantities may vary as per final design.</div>
            </div>
          </div>

          {/* ── TERMS & CONDITIONS ── */}
          <SectionHeading title="Terms & Conditions"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 20px",marginBottom:20}}>
            {TERMS_LIST.map(t=>(
              <div key={t.label} style={{paddingBottom:10,borderBottom:"1px solid #f1f5f9"}}>
                <div style={{fontSize:10,fontWeight:700,color:Q_TEAL,letterSpacing:"0.8px",textTransform:"uppercase",marginBottom:3}}>{t.label}</div>
                <div style={{fontSize:11,color:"#4b5563",lineHeight:1.6}}>{t.text}</div>
              </div>
            ))}
            {customTermLines.map((line,i)=>(
              <div key={"c"+i} style={{paddingBottom:10,borderBottom:"1px solid #f1f5f9"}}>
                <div style={{fontSize:11,color:"#4b5563",lineHeight:1.6}}>• {line}</div>
              </div>
            ))}
          </div>

          {/* ── FOOTER ── */}
          <div style={{marginTop:32,borderTop:"2px solid "+Q_TEAL,paddingTop:20,display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:Q_DARK,marginBottom:4}}>{COMPANY.name}</div>
              <div style={{fontSize:11,color:Q_GRAY,lineHeight:1.8}}>
                {COMPANY.address}<br/>
                Mob: {COMPANY.phone} · {COMPANY.email}
              </div>
              {COMPANY.gst&&COMPANY.gst.indexOf("X")<0&&<div style={{fontSize:11,color:Q_GRAY,marginTop:2}}>GSTIN: {COMPANY.gst}</div>}
              <div style={{fontSize:10,color:"#9ca3af",marginTop:8}}>This is a computer-generated quotation.</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{height:44,borderBottom:"1.5px solid "+Q_DARK,width:160,marginBottom:5}}/>
              <div style={{fontSize:11,color:Q_GRAY}}>Authorised Signatory</div>
              <div style={{fontSize:12,fontWeight:700,color:Q_DARK,marginTop:2}}>{COMPANY.name}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── QUOTATION LIST ──────────────────────────────────────────────────────────
function QuotationsList({site,products,loadingProducts,onUpdateSite}){
  const [showBuilder,setShowBuilder]=useState(false);
  const [viewingQuote,setViewingQuote]=useState(null);
  const quotations=site.quotations||[];

  function saveQuote(q){
    const updated=[...quotations,q];
    onUpdateSite({quotations:updated});
  }
  function deleteQuote(id){
    if(window.confirm("Delete this quotation?")) onUpdateSite({quotations:quotations.filter(q=>q.id!==id)});
  }

  if(viewingQuote){
    const q=viewingQuote;
    return <QuotationPrint site={site} items={q.items} quoteNum={q.quoteNum} quoteDate={q.quoteDate} validDays={q.validDays} terms={q.terms} notes={q.notes} totals={q.totals||{subTotal:0,totalGST:0,totalAmt:0}} onBack={()=>setViewingQuote(null)} onSaveAndClose={()=>setViewingQuote(null)}/>;
  }

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:14}}>Quotations <span style={{color:"#94a3b8",fontWeight:400}}>({quotations.length})</span></div>
        <button onClick={()=>setShowBuilder(true)} style={greenBtn}>+ New quotation</button>
      </div>
      {quotations.length===0&&(
        <div style={{textAlign:"center",padding:"40px 0",color:"#94a3b8",border:"2px dashed #e2e8f0",borderRadius:12}}>
          <div style={{fontSize:28,marginBottom:8}}>📄</div>
          <div style={{fontSize:14}}>No quotations yet</div>
          <div style={{fontSize:12,marginTop:4}}>Create one from the product catalog</div>
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {quotations.map(q=>(
          <div key={q.id} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <div>
              <div style={{fontWeight:700,fontSize:14,color:"#0f172a"}}>{q.quoteNum}</div>
              <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{q.quoteDate} · {q.items?.length||0} items · {fmtINR(q.totalAmt||q.totals?.totalAmt)}</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setViewingQuote(q)} style={sBtn}>👁 View / Print</button>
              <button onClick={()=>deleteQuote(q.id)} style={{...sBtn,color:"#ef4444",borderColor:"#fecaca"}}>Delete</button>
            </div>
          </div>
        ))}
      </div>
      {showBuilder&&<QuotationBuilder site={site} products={products} loadingProducts={loadingProducts} onSave={saveQuote} onClose={()=>setShowBuilder(false)} createdBy={site.assignedTo}/>}
    </div>
  );
}

// ─── PITCH EDIT ──────────────────────────────────────────────────────────────
function PitchEditInline({currentStatus,currentNote,onSave,onCancel}){
  const [status,setStatus]=useState(currentStatus);
  const [note,setNote]=useState(currentNote);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:6,minWidth:200}}>
      <div style={{display:"flex",gap:4}}>
        {["pending","pitched","won","lost"].map(s=>(
          <button key={s} onClick={()=>setStatus(s)}
            style={{flex:1,padding:"5px 0",borderRadius:6,border:"1px solid "+(status===s?statusColors[s]:"#e2e8f0"),background:status===s?statusBg[s]:"#fff",color:status===s?statusColors[s]:"#94a3b8",cursor:"pointer",fontSize:11,fontWeight:600,textTransform:"capitalize"}}>{s}</button>
        ))}
      </div>
      <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Add note…" style={{...inp,fontSize:12,padding:"5px 8px"}}/>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>onSave(status,note)} style={{...pBtn,fontSize:11,padding:"5px 10px"}}>Save</button>
        <button onClick={onCancel} style={{...sBtn,fontSize:11,padding:"5px 10px"}}>Cancel</button>
      </div>
    </div>
  );
}

// ─── PITCH GRID ──────────────────────────────────────────────────────────────
function PitchGrid({site,canEdit,onUpdatePitch}){
  const si=STAGE_IDX[site.stage];
  const [expandedStage,setExpandedStage]=useState(site.stage);
  const [editPitch,setEditPitch]=useState(null);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {STAGES.map((st,i)=>{
        const products=STAGE_PRODUCTS[st.id]||[];
        if(products.length===0) return null;
        const isCurrent=st.id===site.stage,isPast=i<si,isFuture=i>si;
        const isExpanded=expandedStage===st.id;
        const pitchesHere=products.map(p=>({...p,pitch:site.pitches?.[p.id]}));
        const wonHere=pitchesHere.filter(p=>p.pitch?.status==="won").length;
        const pendHere=pitchesHere.filter(p=>!p.pitch||p.pitch.status==="pending").length;
        return(
          <div key={st.id} style={{background:"#fff",border:"1px solid "+(isCurrent?"#bfdbfe":"#e2e8f0"),borderRadius:12,overflow:"hidden",opacity:isFuture?0.6:1}}>
            <div onClick={()=>setExpandedStage(isExpanded?null:st.id)}
              style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",cursor:"pointer",background:isCurrent?"#eff6ff":isPast?"#f8fafc":"#fff"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:13,fontWeight:700}}>{st.label}</span>
                {isCurrent&&<span style={{fontSize:10,background:"#3b82f6",color:"#fff",padding:"2px 7px",borderRadius:8,fontWeight:700}}>CURRENT</span>}
                {isFuture&&<span style={{fontSize:10,color:"#94a3b8"}}>upcoming</span>}
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {wonHere>0&&<span style={{fontSize:11,color:"#065f46",background:"#d1fae5",padding:"2px 7px",borderRadius:8,fontWeight:600}}>✓ {wonHere}</span>}
                {pendHere>0&&!isFuture&&<span style={{fontSize:11,color:"#92400e",background:"#fef3c7",padding:"2px 7px",borderRadius:8,fontWeight:600}}>⚠ {pendHere}</span>}
                <span style={{color:"#94a3b8",fontSize:14}}>{isExpanded?"▲":"▼"}</span>
              </div>
            </div>
            {isExpanded&&(
              <div style={{padding:"8px 16px 14px"}}>
                {products.map(p=>{
                  const pitch=site.pitches?.[p.id];
                  const status=pitch?.status||"pending";
                  const isEditing=editPitch?.productId===p.id;
                  return(
                    <div key={p.id} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"10px 0",borderBottom:"1px solid #f1f5f9"}}>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                          <span style={{fontSize:11,fontWeight:700,color:"#fff",background:BRAND_COLORS[p.brand]||"#64748b",padding:"2px 7px",borderRadius:8}}>{p.brand}</span>
                          <span style={{fontSize:13,fontWeight:500}}>{p.name}</span>
                        </div>
                        {pitch?.note&&<div style={{fontSize:12,color:"#64748b",marginTop:2}}>📝 {pitch.note}</div>}
                        {pitch?.updatedAt&&<div style={{fontSize:11,color:"#94a3b8"}}>Updated {pitch.updatedAt}</div>}
                      </div>
                      {isEditing?(
                        <PitchEditInline currentStatus={status} currentNote={pitch?.note||""} onSave={(s,n)=>{onUpdatePitch(p.id,s,n);setEditPitch(null);}} onCancel={()=>setEditPitch(null)}/>
                      ):(
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <StatusBadge status={status}/>
                          {canEdit&&!isFuture&&<button onClick={()=>setEditPitch({productId:p.id})} style={{...sBtn,fontSize:11,padding:"4px 8px"}}>Update</button>}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── SITE DETAIL ─────────────────────────────────────────────────────────────
// ─── VISIT LOG COMPONENT ──────────────────────────────────────────────────────
const VISIT_TYPES = ["Site Visit","Plumber Meeting","Architect Meeting","PMC Meeting","Builder Meeting","Follow-up Call","WhatsApp","Meeting at Office","Demo / Presentation","Quotation Discussion","Order Follow-up","Other"];
const STAGE_OUTCOMES = ["No change","Stage advanced","Stage regressed","Order received","Lost to competitor","On hold","Client not available"];

function VisitLog({site,canEdit,currentUser,onUpdateSite}){
  const visits=(site.visits||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const blank={date:today(),type:VISIT_TYPES[0],visitedBy:currentUser.id,stage:site.stage,outcome:STAGE_OUTCOMES[0],notes:"",nextFollowUp:"",
    personMet:"",personRole:"",personPhone:"",
    gpsLat:"",gpsLng:"",gpsAddress:"",gpsLoading:false};
  const [form,setForm]=useState(blank);
  function setF(k,v){setForm(f=>({...f,[k]:v}));}

  // GPS capture
  function captureGPS(){
    if(!navigator.geolocation){ alert("GPS not available on this device"); return; }
    setF("gpsLoading",true);
    navigator.geolocation.getCurrentPosition(
      async (pos)=>{
        const lat=pos.coords.latitude.toFixed(6);
        const lng=pos.coords.longitude.toFixed(6);
        // Reverse geocode using free API
        let address=`${lat}, ${lng}`;
        try{
          const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
          const d=await r.json();
          if(d.display_name) address=d.display_name.split(",").slice(0,4).join(", ");
        }catch(e){}
        setForm(f=>({...f,gpsLat:lat,gpsLng:lng,gpsAddress:address,gpsLoading:false}));
      },
      (err)=>{ setF("gpsLoading",false); alert("GPS error: "+err.message); },
      {enableHighAccuracy:true,timeout:15000}
    );
  }

  function openAdd(){ setForm(blank); setEditId(null); setShowForm(true); }
  function openEdit(v){ setForm({...v}); setEditId(v.id); setShowForm(true); }

  function saveVisit(){
    if(!form.notes.trim()) return alert("Please add visit notes");
    const newVisits=[...(site.visits||[])];
    if(editId){
      const idx=newVisits.findIndex(v=>v.id===editId);
      if(idx>-1) newVisits[idx]={...form,id:editId};
    } else {
      newVisits.push({...form,id:makeId(),createdBy:currentUser.id,createdAt:today()});
    }
    // If stage changed in visit, update site stage too
    if(form.outcome==="Stage advanced"||form.outcome==="Stage regressed"){
      const i=STAGE_IDX[site.stage];
      const newStage=form.outcome==="Stage advanced"?STAGES[Math.min(i+1,STAGES.length-1)].id:STAGES[Math.max(i-1,0)].id;
      onUpdateSite({visits:newVisits,stage:newStage});
    } else {
      onUpdateSite({visits:newVisits});
    }
    setShowForm(false);
  }

  function deleteVisit(id){
    if(!window.confirm("Delete this visit record?")) return;
    onUpdateSite({visits:(site.visits||[]).filter(v=>v.id!==id)});
  }

  const typeColors={"Site Visit":"#0d9488","Follow-up Call":"#6366f1","WhatsApp":"#16a34a","Meeting at Office":"#0891b2","Demo / Presentation":"#f59e0b","Quotation Discussion":"#8b5cf6","Order Follow-up":"#f97316","Other":"#64748b"};
  const outcomeColors={"No change":"#64748b","Stage advanced":"#16a34a","Stage regressed":"#dc2626","Order received":"#0d9488","Lost to competitor":"#dc2626","On hold":"#f59e0b","Client not available":"#94a3b8"};

  const inpS={border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 10px",fontSize:13,width:"100%",boxSizing:"border-box"};

  return(
    <div>
      {/* Summary strip */}
      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"8px 14px",fontSize:12,fontWeight:700,color:"#166534"}}>
          📋 {visits.length} Visit{visits.length!==1?"s":""}
        </div>
        {visits[0]&&<div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:10,padding:"8px 14px",fontSize:12,color:"#475569"}}>
          🕐 Last visit: <b>{visits[0].date}</b> · {visits[0].type}
        </div>}
        {site.nextFollowUp&&<div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,padding:"8px 14px",fontSize:12,color:"#92400e",fontWeight:700}}>
          📅 Follow-up: {site.nextFollowUp}
        </div>}
        {canEdit&&<button onClick={openAdd} style={{marginLeft:"auto",background:"#0d9488",color:"#fff",border:"none",borderRadius:10,padding:"8px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
          + Add Visit
        </button>}
      </div>

      {/* Add/Edit form */}
      {showForm&&(
        <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:12,color:"#1e293b"}}>{editId?"✏️ Edit Visit":"📝 Log New Visit"}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><label style={{fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>DATE</label>
              <input type="date" value={form.date} onChange={e=>setF("date",e.target.value)} style={inpS}/></div>
            <div><label style={{fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>VISIT TYPE</label>
              <select value={form.type} onChange={e=>setF("type",e.target.value)} style={inpS}>
                {VISIT_TYPES.map(t=><option key={t}>{t}</option>)}
              </select></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><label style={{fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>VISITED BY</label>
              <select value={form.visitedBy} onChange={e=>setF("visitedBy",e.target.value)} style={inpS}>
                {USERS.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
              </select></div>
            <div><label style={{fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>SITE STAGE AT VISIT</label>
              <select value={form.stage} onChange={e=>setF("stage",e.target.value)} style={inpS}>
                {STAGES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
              </select></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><label style={{fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>OUTCOME</label>
              <select value={form.outcome} onChange={e=>setF("outcome",e.target.value)} style={inpS}>
                {STAGE_OUTCOMES.map(o=><option key={o}>{o}</option>)}
              </select></div>
            <div><label style={{fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>NEXT FOLLOW-UP DATE</label>
              <input type="date" value={form.nextFollowUp||""} onChange={e=>setF("nextFollowUp",e.target.value)} style={inpS}/></div>
          </div>
          <div style={{marginBottom:10}}><label style={{fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>VISIT NOTES *</label>
            <textarea value={form.notes} onChange={e=>setF("notes",e.target.value)} rows={3}
              placeholder="What was discussed? Any decisions made? Client feedback? Products pitched? Next steps?"
              style={{...inpS,resize:"vertical"}}/>
          </div>

          {/* Person Met */}
          <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:12,marginBottom:10}}>
            <div style={{fontSize:12,fontWeight:700,color:"#166534",marginBottom:8}}>🤝 Person Met <span style={{color:"#94a3b8",fontWeight:400}}>(optional)</span></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              <div><label style={{fontSize:10,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>NAME</label>
                <input value={form.personMet} onChange={e=>setF("personMet",e.target.value)} placeholder="e.g. Manoj Kumar" style={inpS}/></div>
              <div><label style={{fontSize:10,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>ROLE</label>
                <select value={form.personRole} onChange={e=>setF("personRole",e.target.value)} style={inpS}>
                  <option value="">Select</option>
                  {["Plumber","Architect","Builder","PMC","Site Owner","Contractor","Other"].map(r=><option key={r}>{r}</option>)}
                </select></div>

                  <span style={{background:outcomeColor+"15",color:outcomeColor,fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20,border:`1px solid ${outcomeColor}40`}}>

                {v.personMet&&(
                  <div style={{marginTop:6,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                    <span style={{fontSize:11,background:"#f0fdf4",border:"1px solid #bbf7d0",color:"#166534",padding:"2px 8px",borderRadius:20,fontWeight:600}}>
                      🤝 {v.personMet}{v.personRole?" · "+v.personRole:""}{v.personPhone?" · "+v.personPhone:""}
                    </span>
                  </div>
                )}
                {/* GPS */}
                {v.gpsAddress&&(

                  </div>
                )}

            </div>
          );
        })}
      </div>
    </div>
  );
}

function SiteDetail({site,isAdmin,currentUser,getPendingProducts,onBack,onUpdateSite,onUpdatePitch,onDelete,onEdit,products,loadingProducts}){
  const [activeTab,setActiveTab]=useState("pitches");
  const pending=getPendingProducts(site);
  const assignee=USERS.find(u=>u.id===site.assignedTo);
  const canEdit=isAdmin||site.assignedTo===currentUser.id;
  const qCount=(site.quotations||[]).length;
  function advanceStage(){ const i=STAGE_IDX[site.stage]; if(i<STAGES.length-1) onUpdateSite({stage:STAGES[i+1].id}); }
  function regressStage(){ const i=STAGE_IDX[site.stage]; if(i>0) onUpdateSite({stage:STAGES[i-1].id}); }
  return(
    <div>
      <button onClick={onBack} style={lBtn}>← Back to sites</button>
      <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:14,padding:"20px 20px 16px",marginTop:12,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
          <div>
            <h2 style={{margin:0,fontSize:22,fontWeight:800}}>{site.ownerName}</h2>
            <div style={{fontSize:13,color:"#64748b",marginTop:4}}>{site.address} · {site.city}</div>
            <div style={{fontSize:13,color:"#64748b",marginTop:2}}>📞 {site.phone} · {site.projectType} · via {site.source}</div>
            {assignee&&<div style={{fontSize:12,color:"#94a3b8",marginTop:4}}>Assigned to: {assignee.name}</div>}
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
            <StagePill stage={site.stage}/>
            {canEdit&&(
              <div style={{display:"flex",gap:6}}>
                <button onClick={regressStage} disabled={STAGE_IDX[site.stage]===0} style={sBtn}>← Stage</button>
                <button onClick={advanceStage} disabled={STAGE_IDX[site.stage]===STAGES.length-1} style={pBtn}>Stage →</button>
              </div>
            )}
          </div>
        </div>
        {site.notes&&<div style={{marginTop:12,padding:"10px 12px",background:"#f8fafc",borderRadius:8,fontSize:13,color:"#475569"}}>{site.notes}</div>}
        {canEdit&&(
          <div style={{marginTop:12,display:"flex",gap:8}}>
            <button onClick={onEdit} style={sBtn}>✏ Edit</button>
            {isAdmin&&<button onClick={onDelete} style={{...sBtn,color:"#ef4444",borderColor:"#fecaca"}}>Delete</button>}
          </div>
        )}
      </div>
      <StageTimeline currentStage={site.stage}/>
      {pending.length>0&&(
        <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:12,padding:"14px 16px",marginBottom:16}}>
          <div style={{fontWeight:700,color:"#92400e",marginBottom:8}}>⚠ {pending.length} product{pending.length>1?"s":""} not yet pitched</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {pending.map(p=><span key={p.id} style={{fontSize:12,background:"#fef3c7",color:"#92400e",padding:"4px 10px",borderRadius:20,fontWeight:600,border:"1px solid #fcd34d"}}>{p.brand}: {p.name}</span>)}
          </div>
        </div>
      )}
      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:16,background:"#fff",borderRadius:10,padding:4,border:"1px solid #e2e8f0"}}>
        {[["pitches","Product Pitches"],["quotations",`Quotations${qCount?" ("+qCount+")":""}`],["history",`Visits${(site.visits||[]).length?" ("+(site.visits||[]).length+")":""}`]].map(([t,label])=>(
          <button key={t} onClick={()=>setActiveTab(t)}
            style={{flex:1,padding:"8px 0",borderRadius:8,border:"none",cursor:"pointer",background:activeTab===t?"#0f172a":"transparent",color:activeTab===t?"#fff":"#64748b",fontSize:13,fontWeight:600}}>
            {label}
          </button>
        ))}
      </div>
      {activeTab==="pitches"&&<PitchGrid site={site} canEdit={canEdit} onUpdatePitch={onUpdatePitch}/>}
      {activeTab==="quotations"&&<QuotationsList site={site} products={products} loadingProducts={loadingProducts} onUpdateSite={onUpdateSite}/>}
      {activeTab==="history"&&(
        <VisitLog site={site} canEdit={canEdit} currentUser={currentUser} onUpdateSite={onUpdateSite}/>
      )}
    </div>
  );
}

const DAILY_ACTIVITIES = [
  "Site Visit","Plumber Meeting","Architect Meeting","PMC Meeting","Builder Meeting",

function DailyReportModal({currentUser,sites,date,existing,onSave,onClose}){
  const [entries,setEntries]=useState(existing?.entries||[{activity:"",site:"",area:"",person:"",personRole:"",notes:""}]);
  const [summary,setSummary]=useState(existing?.summary||"");

  function addEntry(){ setEntries(e=>[...e,{activity:"",site:"",area:"",person:"",personRole:"",notes:""}]); }
  function removeEntry(i){ setEntries(e=>e.filter((_,idx)=>idx!==i)); }
  function setEntry(i,k,v){ setEntries(e=>e.map((r,idx)=>idx===i?{...r,[k]:v}:r)); }

  const inpS={border:"1px solid #e2e8f0",borderRadius:7,padding:"6px 9px",fontSize:13,width:"100%",boxSizing:"border-box",background:"#fff"};
  const selS={...inpS,appearance:"none"};

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#fff",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:540,maxHeight:"92vh",overflowY:"auto",padding:20}}>

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <div style={{fontWeight:800,fontSize:16,color:"#1e293b"}}>📝 Daily Report</div>
            <div style={{fontSize:12,color:"#64748b"}}>{currentUser.name} · {date}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94a3b8"}}>×</button>
        </div>

        {/* Entries */}
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:14}}>
          {entries.map((entry,i)=>(
            <div key={i} style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:10,padding:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:12,fontWeight:700,color:"#475569"}}>Activity {i+1}</div>
                {entries.length>1&&<button onClick={()=>removeEntry(i)} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:16,padding:0}}>✕</button>}
              </div>

              {/* Row 1: Activity type */}
              <div style={{marginBottom:7}}>
                <label style={{fontSize:10,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>ACTIVITY TYPE</label>
                <select value={entry.activity} onChange={e=>setEntry(i,"activity",e.target.value)} style={selS}>
                  <option value="">Select activity…</option>
                  {DAILY_ACTIVITIES.map(a=><option key={a}>{a}</option>)}
                </select>
              </div>

              {/* Row 2: Site + Area */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:7}}>
                <div>
                  <label style={{fontSize:10,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>SITE (if applicable)</label>
                  <select value={entry.site} onChange={e=>setEntry(i,"site",e.target.value)} style={selS}>
                    <option value="">No specific site</option>
                    <option value="__new__">+ New site (add separately)</option>
                    {sites.map(s=><option key={s.id} value={s.id}>{s.ownerName}, {s.city}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{fontSize:10,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>AREA / CITY</label>
                  <select value={entry.area} onChange={e=>setEntry(i,"area",e.target.value)} style={selS}>
                    <option value="">Select area…</option>
                    {DAILY_AREAS.map(a=><option key={a}>{a}</option>)}
                  </select>
                </div>
              </div>

              {/* Row 3: Person met */}
              <div style={{display:"grid",gridTemplateColumns:"1.5fr 1fr",gap:7,marginBottom:7}}>
                <div>
                  <label style={{fontSize:10,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>PERSON MET</label>
                  <input value={entry.person} onChange={e=>setEntry(i,"person",e.target.value)} placeholder="Name" style={inpS}/>
                </div>
                <div>
                  <label style={{fontSize:10,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>ROLE</label>
                  <select value={entry.personRole} onChange={e=>setEntry(i,"personRole",e.target.value)} style={selS}>
                    <option value="">Select…</option>
                    {["Plumber","Architect","Builder","PMC","Site Owner","Other"].map(r=><option key={r}>{r}</option>)}
                  </select>
                </div>
              </div>

              {/* Notes */}
              <div>
                <label style={{fontSize:10,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>NOTES / OUTCOME</label>
                <textarea value={entry.notes} onChange={e=>setEntry(i,"notes",e.target.value)}
                  rows={2} placeholder="What happened? Any follow-up needed?"
                  style={{...inpS,resize:"vertical"}}/>
              </div>

              {entry.site==="__new__"&&(
                <div style={{marginTop:8,background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"8px 10px",fontSize:12,color:"#1d4ed8"}}>
                  ℹ️ Please close this modal and add the new site first using <b>"Add New Site"</b>, then come back to log this activity.
                </div>
              )}
            </div>
          ))}
        </div>

        <button onClick={addEntry}
          style={{width:"100%",background:"#f1f5f9",border:"1px dashed #94a3b8",borderRadius:8,padding:"8px",fontSize:13,color:"#475569",cursor:"pointer",marginBottom:12,fontWeight:600}}>
          + Add Another Activity
        </button>

        {/* Day Summary */}
        <div style={{marginBottom:14}}>
          <label style={{fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:4}}>DAY SUMMARY (optional)</label>
          <textarea value={summary} onChange={e=>setSummary(e.target.value)} rows={2}
            placeholder="Overall summary of today's work, key insights, blockers…"
            style={{...inpS,resize:"vertical"}}/>
        </div>

        {/* Footer buttons */}
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:"10px",borderRadius:8,border:"1px solid #e2e8f0",background:"#f8fafc",cursor:"pointer",fontSize:13,fontWeight:600}}>Cancel</button>
          <button onClick={()=>{
            const valid=entries.filter(e=>e.activity||e.notes);
            if(!valid.length) return alert("Please add at least one activity");
            onSave({entries:valid,summary,submittedAt:new Date().toISOString(),submittedBy:currentUser.id});
          }} style={{flex:2,padding:"10px",borderRadius:8,border:"none",background:"#0d9488",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}>
            ✅ Submit Daily Report
          </button>
        </div>
      </div>
    </div>
  );
}

  sites.forEach(s=>{ if(stageCount[s.stage]!==undefined) stageCount[s.stage]++; });
  const won=sites.reduce((a,s)=>a+Object.values(s.pitches||{}).filter(p=>p.status==="won").length,0);
  const lost=sites.reduce((a,s)=>a+Object.values(s.pitches||{}).filter(p=>p.status==="lost").length,0);
  const pitched=sites.reduce((a,s)=>a+Object.values(s.pitches||{}).filter(p=>p.status==="pitched").length,0);
  const totalQuotes=(sites.reduce((a,s)=>a+(s.quotations||[]).length,0));
  const totalQuoteVal=sites.reduce((a,s)=>a+(s.quotations||[]).reduce((b,q)=>b+(q.totalAmt||q.totals?.totalAmt||0),0),0);

  // Daily reports storage per user

                      <div style={{fontWeight:600,fontSize:14}}>{site.ownerName}</div>
                      <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{site.city} · {site.projectType} · {STAGES.find(s=>s.id===site.stage)?.label}</div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>

                      {qCount>0&&<span style={{fontSize:10,color:"#8b5cf6"}}>📄 {qCount} quote{qCount>1?"s":""}</span>}
                    </div>
                  </div>

            </div>
            <div style={{padding:"10px 20px",borderTop:"1px solid #e2e8f0",fontSize:12,color:"#94a3b8",textAlign:"center"}}>
              {sites.length} sites available
            </div>
          </div>
        </div>
      )}

      {/* QUOTATION BUILDER launched from dashboard */}
      {pickedSite&&(
        <QuotationBuilder
          site={pickedSite}
          products={products}
          loadingProducts={loadingProducts}
          createdBy={currentUser.name}
          onSave={q=>{ onSaveQuote(pickedSite.id,q); setPickedSite(null); setShowSitePicker(false); }}
          onClose={()=>{ setPickedSite(null); setShowSitePicker(false); }}
        />
      )}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:24}}>
        {[{label:"Total sites",value:sites.length,color:"#0ea5e9"},{label:"Pitch alerts",value:alertSites.length,color:"#f59e0b"},{label:"Products won",value:won,color:"#10b981"},{label:"Follow-ups",value:pitched,color:"#6366f1"},{label:"Quotations",value:totalQuotes,color:"#8b5cf6"},{label:"Quote value",value:fmtINR(totalQuoteVal),color:"#059669",small:true}].map(k=>(
          <div key={k.label} style={{background:"#fff",borderRadius:12,padding:"14px",border:"1px solid #e2e8f0"}}>
            <div style={{fontSize:k.small?16:26,fontWeight:700,color:k.color,lineHeight:1}}>{k.value}</div>
            <div style={{fontSize:12,color:"#64748b",marginTop:4}}>{k.label}</div>
          </div>
        ))}
      </div>
      {/* ── Birthday & Anniversary Reminders ── */}
      {(()=>{
        const now=new Date(); const m=now.getMonth()+1; const d=now.getDate();
        const upcoming=[];
        contacts.forEach(c=>{
          [["birthday","🎂","Birthday"],["anniversary","💍","Anniversary"]].forEach(([field,emoji,label])=>{
            if(!c[field]) return;
            const parts=c[field].split("-");
            if(parts.length<3) return;
            const evtM=parseInt(parts[1]),evtD=parseInt(parts[2]);
            // Show if within this month or next 7 days
            const daysAway=((evtM-m)*30+(evtD-d));
            const isThisMonth=evtM===m;
            const isNextWeek=daysAway>=0&&daysAway<=7;
            if(isThisMonth||isNextWeek){
              const isToday=evtM===m&&evtD===d;
              const isTomorrow=evtM===m&&evtD===d+1;
              upcoming.push({contact:c,emoji,label,day:evtD,month:evtM,isToday,isTomorrow,daysAway:daysAway<0?daysAway+30:daysAway});
            }
          });
        });
        upcoming.sort((a,b)=>a.daysAway-b.daysAway);
        if(!upcoming.length) return null;
        return(
          <div style={{marginBottom:20,background:"#fff8f0",border:"1px solid #fed7aa",borderRadius:14,padding:14}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:10,color:"#c2410c"}}>🎊 Occasions this month ({upcoming.length})</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {upcoming.map((u,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:u.isToday?"#fff7ed":"#fff",border:"1px solid "+(u.isToday?"#fb923c":"#fed7aa"),borderRadius:10,padding:"8px 12px"}}>
                  <div style={{display:"flex",gap:10,alignItems:"center"}}>
                    <span style={{fontSize:22}}>{u.emoji}</span>
                    <div>
                      <div style={{fontWeight:700,fontSize:13}}>{u.contact.name}</div>
                      <div style={{fontSize:11,color:"#64748b"}}>{u.contact.role||""}{u.contact.city?" · "+u.contact.city:""} · {u.label}</div>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    {u.isToday?<span style={{background:"#ef4444",color:"#fff",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20}}>TODAY! 🎉</span>
                    :u.isTomorrow?<span style={{background:"#f97316",color:"#fff",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20}}>Tomorrow</span>
                    :<span style={{fontSize:12,color:"#92400e",fontWeight:600}}>{u.day}/{u.month}</span>}
                    {u.contact.phone&&<div style={{fontSize:11,color:"#0891b2",marginTop:3}}>📞 {u.contact.phone}</div>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {alertSites.length>0&&(
        <div style={{marginBottom:24}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <h3 style={{margin:0,fontSize:15,fontWeight:700}}><span style={{color:"#f59e0b"}}>⚠</span> Pitch alerts</h3>
            <button onClick={onGoSites} style={lBtn}>View all →</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {alertSites.slice(0,5).map(site=>{
              const pending=getPendingProducts(site);
              return(
                <div key={site.id} onClick={()=>onOpenSite(site.id)} style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,padding:"12px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:14}}>{site.ownerName}</div>
                    <div style={{fontSize:12,color:"#92400e",marginTop:2}}>{site.city} · {STAGES.find(s=>s.id===site.stage)?.label} · {pending.length} to pitch</div>
                  </div>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"flex-end",maxWidth:200}}>
                    {pending.slice(0,3).map(p=><span key={p.id} style={{fontSize:10,background:"#fef3c7",color:"#92400e",padding:"2px 7px",borderRadius:10,fontWeight:600}}>{p.brand}</span>)}
                    {pending.length>3&&<span style={{fontSize:10,color:"#92400e"}}>+{pending.length-3}</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      <h3 style={{margin:"0 0 10px",fontSize:15,fontWeight:700}}>Pipeline by stage</h3>
      {STAGES.map(st=>{
        const count=stageCount[st.id];
        const pct=sites.length?(count/sites.length)*100:0;
        return(
          <div key={st.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
            <div style={{width:120,fontSize:12,color:"#475569",textAlign:"right"}}>{st.label}</div>
            <div style={{flex:1,background:"#e2e8f0",borderRadius:4,height:18,overflow:"hidden"}}>
              <div style={{width:pct+"%",background:"#0ea5e9",height:"100%",borderRadius:4,minWidth:count?30:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                {count>0&&<span style={{fontSize:11,color:"#fff",fontWeight:600}}>{count}</span>}
              </div>
            </div>
          </div>
        );
      })}

      {/* ── Monthly Report Calendar ── */}
      {(()=>{
        const now=new Date();
        const yr=now.getFullYear(), mo=now.getMonth();
        const daysInMonth=new Date(yr,mo+1,0).getDate();
        const firstDay=new Date(yr,mo,1).getDay();
        const todayD=now.getDate();
        const monthName=now.toLocaleString("en-IN",{month:"long",year:"numeric"});
        const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
        const cells=[]; for(let i=0;i<firstDay;i++) cells.push(null); for(let d=1;d<=daysInMonth;d++) cells.push(d);
        const submitted=Object.keys(dailyReports).filter(k=>k.startsWith(`${yr}-${String(mo+1).padStart(2,"0")}`)).length;
        const workingDays=Array.from({length:todayD},(_,i)=>new Date(yr,mo,i+1).getDay()!==0).filter(Boolean).length;
        return(
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:14,padding:14,marginBottom:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:6}}>
              <div style={{fontWeight:700,fontSize:14,color:"#1e293b"}}>📅 {monthName} — Daily Reports</div>
              <div style={{display:"flex",gap:8,fontSize:11}}>
                <span><span style={{display:"inline-block",width:9,height:9,borderRadius:2,background:"#16a34a",marginRight:3}}/>Done</span>
                <span><span style={{display:"inline-block",width:9,height:9,borderRadius:2,background:"#ef4444",marginRight:3}}/>Pending</span>
                <span><span style={{display:"inline-block",width:9,height:9,borderRadius:2,background:"#f1f5f9",border:"1px solid #e2e8f0",marginRight:3}}/>Sunday</span>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:3}}>
              {dayNames.map(d=><div key={d} style={{textAlign:"center",fontSize:10,color:d==="Sun"?"#ef4444":"#94a3b8",fontWeight:600}}>{d}</div>)}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
              {cells.map((d,i)=>{
                if(!d) return <div key={"e"+i}/>;
                const ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
                const isSun=new Date(yr,mo,d).getDay()===0;
                const isFuture=d>todayD; const isToday=d===todayD;
                const hasDR=!!dailyReports[ds];
                let bg,col,brd;
                if(isSun){bg="#f8fafc";col="#94a3b8";brd="1px solid #f1f5f9";}
                else if(isFuture){bg="#f8fafc";col="#cbd5e1";brd="1px dashed #e2e8f0";}
                else if(hasDR){bg="#dcfce7";col="#15803d";brd="1px solid #86efac";}
                else{bg="#fee2e2";col="#dc2626";brd="1px solid #fca5a5";}
                if(isToday) brd="2px solid #0d9488";
                return(
                  <div key={d} onClick={()=>{if(!isSun&&!isFuture) setShowDailyReport(true);}}
                    style={{aspectRatio:"1",display:"flex",alignItems:"center",justifyContent:"center",borderRadius:6,background:bg,border:brd,color:col,fontWeight:isToday?900:600,fontSize:11,cursor:(!isSun&&!isFuture)?"pointer":"default",position:"relative"}}>
                    {d}{hasDR&&!isSun&&<span style={{position:"absolute",bottom:0,right:1,fontSize:7}}>✓</span>}
                  </div>
                );
              })}
            </div>
            <div style={{marginTop:6,fontSize:11,color:"#64748b",textAlign:"center"}}>✅ {submitted}/{workingDays} working days submitted this month</div>
          </div>
        );
      })()}

      {showDailyReport&&<DailyReportModal currentUser={currentUser} sites={sites} date={today()}
        existing={dailyReports[today()]}
        onSave={data=>{ setDailyReports(prev=>({...prev,[today()]:data})); setShowDailyReport(false); }}
        onClose={()=>setShowDailyReport(false)}/>}

      {/* ── Monthly Reports Panel ── */}
      {isAdmin&&(
        <div style={{marginTop:24}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <h3 style={{margin:0,fontSize:15,fontWeight:700}}>📊 Monthly Reports → Telegram</h3>
            <button onClick={()=>setShowReports(v=>!v)} style={{background:showReports?"#f1f5f9":"#0d9488",color:showReports?"#475569":"#fff",border:"none",borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
              {showReports?"Hide":"Send Reports"}
            </button>
          </div>
          {showReports&&(
            <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:12,padding:16}}>
              {/* Month selector */}
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                <button onClick={()=>setReportMonthOffset(v=>v-1)} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:16}}>‹</button>
                <div style={{flex:1,textAlign:"center",fontWeight:700,fontSize:14,color:"#1e293b"}}>{getMonthLabel(reportMonthOffset)}</div>
                <button onClick={()=>setReportMonthOffset(v=>Math.min(v+1,0))} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:16}}>›</button>
              </div>

              {/* Report buttons */}
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {[
                  {label:"📅 Today's Daily Report",desc:"All executive visits & activity logged today",fn:()=>sendDailyExecutiveReport(sites),primary:true},
                  {label:"🏗️ Site Stage Report",desc:"All sites grouped by current stage",fn:()=>sendMonthlySiteStageReport(sites,reportMonthOffset)},
                  {label:"👷 Executive New Sites",desc:"New sites added by each executive",fn:()=>sendExecutiveNewSitesReport(sites,reportMonthOffset)},
                  {label:"🏆 Brand Win/Loss",desc:"Products won, lost, in-progress by brand",fn:()=>sendBrandWinLossReport(sites,reportMonthOffset)},
                  {label:"📋 Executive Monthly PDFs",desc:"Full PDF report per executive → Telegram (visits, contacts, KM, brands)",fn:()=>sendMonthlyExecutivePDFs(sites,reportMonthOffset),primary:true},
                  {label:"📦 Send All 3 Monthly Reports",desc:"Site stage + Executive sites + Brand win/loss summary",fn:()=>sendMonthlyDigest(sites,reportMonthOffset)},
                ].map(r=>(
                  <div key={r.label} style={{display:"flex",alignItems:"center",gap:10,background:"#fff",border:`1px solid ${r.primary?"#0d9488":"#e2e8f0"}`,borderRadius:10,padding:"10px 14px"}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:13,color:r.primary?"#0d9488":"#1e293b"}}>{r.label}</div>
                      <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{r.desc}</div>
                    </div>
                    <button
                      onClick={async()=>{
                        setReportStatus("Sending…");
                        try{ await r.fn(); setReportStatus("✅ Sent to Telegram!"); }
                        catch(e){ setReportStatus("❌ Failed: "+e.message); }
                        setTimeout(()=>setReportStatus(""),4000);
                      }}
                      style={{background:r.primary?"#0d9488":"#f1f5f9",color:r.primary?"#fff":"#475569",border:"none",borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                      Send →
                    </button>
                  </div>
                ))}
              </div>

              {reportStatus&&(
                <div style={{marginTop:12,padding:"10px 14px",background:reportStatus.startsWith("✅")?"#f0fdf4":"#fef2f2",border:`1px solid ${reportStatus.startsWith("✅")?"#86efac":"#fca5a5"}`,borderRadius:8,fontSize:13,fontWeight:600,color:reportStatus.startsWith("✅")?"#166534":"#dc2626",textAlign:"center"}}>
                  {reportStatus}
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

            <div key={site.id} onClick={()=>onOpen(site.id)} style={{background:"#fff",border:"1px solid "+(pending.length>0?"#fde68a":"#e2e8f0"),borderRadius:12,padding:"14px 16px",cursor:"pointer",display:"grid",gridTemplateColumns:"1fr auto",gap:"8px 16px",alignItems:"start"}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                  <span style={{fontWeight:700,fontSize:15}}>{site.ownerName}</span>
                  {pending.length>0&&<span style={{fontSize:11,background:"#fef3c7",color:"#92400e",padding:"2px 7px",borderRadius:10,fontWeight:600}}>⚠ {pending.length} to pitch</span>}
                  {wonCount>0&&<span style={{fontSize:11,background:"#d1fae5",color:"#065f46",padding:"2px 7px",borderRadius:10,fontWeight:600}}>✓ {wonCount} won</span>}
                  {qCount>0&&<span style={{fontSize:11,background:"#ede9fe",color:"#5b21b6",padding:"2px 7px",borderRadius:10,fontWeight:600}}>📄 {qCount} quote{qCount>1?"s":""}</span>}

                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:36,height:36,borderRadius:"50%",background:u.role==="admin"?"#1e40af":"#0d9488",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:15}}>
                        {u.name.charAt(0)}
                      </div>
                      <div>
                        <div style={{fontWeight:700,fontSize:14}}>{u.name}</div>
                        <div style={{fontSize:11,color:u.role==="admin"?"#3b82f6":"#64748b"}}>{u.role==="admin"?"Admin":"Sales Executive"}</div>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <div style={{textAlign:"center",background:"#f0fdf4",borderRadius:8,padding:"6px 12px"}}>
                        <div style={{fontSize:18,fontWeight:700,color:"#16a34a"}}>{st.sites}</div>

// ─── CONTACT FIELD (outside SiteFormModal to prevent re-render focus loss) ────
const CITIES_LIST=["Panipat","Sonipat","Karnal","Kurukshetra","Ambala","Rohtak","Hisar","Faridabad","Gurugram","Delhi NCR","Kaithal","Jind","Pehowa","Thanesar"];

function ContactField({roleKey,label,icon,initialData,contacts,allSites,onCommit}){
  // ALL inputs are UNCONTROLLED (refs) — zero re-renders on typing
  const cityRef=React.useRef(null);
  const nameRef=React.useRef(null);
  const phone1Ref=React.useRef(null);
  const phone2Ref=React.useRef(null);
  const bdayRef=React.useRef(null);
  const annivRef=React.useRef(null);

  const [locSugg,setLocSugg]=React.useState([]);
  const [nameSugg,setNameSugg]=React.useState([]);
  const [showExtra,setShowExtra]=React.useState(!!(initialData?.phone2||initialData?.birthday||initialData?.anniversary));
  const locTimer=React.useRef(null);
  const nameTimer=React.useRef(null);

  function roleMatch(c){
    if(!c.role) return true;
    return (roleKey==="plumber"&&c.role==="Plumbing Contractor")||
           (roleKey==="architect"&&c.role==="Architect")||
           (roleKey==="builder"&&c.role==="Builder")||
           (roleKey==="pmc"&&c.role==="PMC");
  }
  function getFiltered(nameQ,city){
    return contacts.filter(c=>{
      const cm=!city||!c.city||c.city===city;
      const nm=!nameQ||c.name.toLowerCase().startsWith(nameQ.toLowerCase());
      return roleMatch(c)&&cm&&nm;
    }).slice(0,6);
  }

  // Commit to parent only on blur — never on keystroke
  function commitToParent(){
    onCommit(roleKey,{
      name:nameRef.current?.value||"",
      phone:phone1Ref.current?.value||"",
      phone2:phone2Ref.current?.value||"",
      city:cityRef.current?.value||"",
      birthday:bdayRef.current?.value||"",
      anniversary:annivRef.current?.value||"",
    });
  }

  function handleCityType(e){
    const val=e.target.value;
    clearTimeout(locTimer.current);
    if(val.length>0){
      locTimer.current=setTimeout(()=>{
        const q=val.toLowerCase();
        const cm=CITIES_LIST.filter(c=>c.toLowerCase().includes(q));
        const cc=[...new Set(contacts.map(c=>c.city).filter(Boolean))].filter(c=>c.toLowerCase().includes(q));
        setLocSugg([...new Set([...cm,...cc])].slice(0,6));
      },250);
    } else { setLocSugg([]); }
  }

  function pickCity(city){
    if(cityRef.current) cityRef.current.value=city;
    setLocSugg([]);
    setNameSugg(getFiltered("",city));
    nameRef.current?.focus();
    commitToParent();
  }

  function handleNameType(e){
    const val=e.target.value;
    clearTimeout(nameTimer.current);
    if(val.length>0){
      nameTimer.current=setTimeout(()=>{
        const city=cityRef.current?.value||"";
        setNameSugg(getFiltered(val,city));
      },300);
    } else { setNameSugg([]); }
  }

  function pickContact(c){
    if(nameRef.current)   nameRef.current.value=c.name||"";
    if(phone1Ref.current) phone1Ref.current.value=c.phone||"";
    if(phone2Ref.current) phone2Ref.current.value=c.phone2||"";
    if(cityRef.current&&c.city) cityRef.current.value=c.city;
    if(bdayRef.current)   bdayRef.current.value=c.birthday||"";
    if(annivRef.current)  annivRef.current.value=c.anniversary||"";
    if(c.phone2||c.birthday||c.anniversary) setShowExtra(true);
    setNameSugg([]);
    commitToParent();
  }

  const matched=contacts.find(c=>c.name===nameRef.current?.value&&nameRef.current?.value);
  const runningSites=matched?allSites.filter(s=>s[roleKey+"Ref"]===matched.id).length:0;

  const inpS={border:"1px solid #e2e8f0",borderRadius:8,padding:"8px 10px",fontSize:13,width:"100%",boxSizing:"border-box",outline:"none"};
  const labelS={fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em"};
  const secS={background:"#f8fafc",borderRadius:10,padding:"12px 14px",border:"1px solid #e8f0fe"};

  return(
    <div style={secS}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontSize:12,fontWeight:700,color:"#475569"}}>{icon} {label} <span style={{color:"#94a3b8",fontWeight:400}}>(optional)</span></div>
        {runningSites>0&&<span style={{fontSize:11,color:"#0891b2",fontWeight:600}}>📊 {runningSites} site{runningSites>1?"s":""}</span>}
      </div>

      {/* Row 1: City + Name */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1.5fr",gap:8,marginBottom:8}}>
        <div style={{position:"relative"}}>
          <label style={labelS}>City</label>
          <input ref={cityRef} defaultValue={initialData?.city||""}
            onChange={handleCityType} onBlur={commitToParent}
            placeholder="Panipat…" style={inpS} autoComplete="off"/>
          {locSugg.length>0&&(
            <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,zIndex:60,boxShadow:"0 4px 16px rgba(0,0,0,0.12)"}}>
              {locSugg.map((city,i)=>(
                <div key={i} onMouseDown={e=>{e.preventDefault();pickCity(city);}}
                  style={{padding:"7px 10px",cursor:"pointer",fontSize:13,borderBottom:"1px solid #f1f5f9"}}>
                  📍 {city}
                </div>
              ))}
              {cityRef.current?.value&&!CITIES_LIST.includes(cityRef.current.value)&&(
                <div onMouseDown={e=>{e.preventDefault();pickCity(cityRef.current.value);}}
                  style={{padding:"7px 10px",cursor:"pointer",fontSize:12,color:"#0891b2",background:"#f0f9ff"}}>
                  + Add "{cityRef.current.value}"
                </div>
              )}
            </div>
          )}
        </div>

        <div style={{position:"relative"}}>
          <label style={labelS}>Name</label>
          <input ref={nameRef} defaultValue={initialData?.name||""}
            onChange={handleNameType} onBlur={commitToParent}
            placeholder={`${label} name`} style={inpS} autoComplete="off"
            onFocus={()=>{if(!nameRef.current?.value) setNameSugg(getFiltered("",cityRef.current?.value||""));}}/>
          {nameSugg.length>0&&(
            <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,zIndex:60,boxShadow:"0 4px 16px rgba(0,0,0,0.12)",maxHeight:200,overflowY:"auto"}}>
              {nameSugg.map(c=>(
                <div key={c.id} onMouseDown={e=>{e.preventDefault();pickContact(c);}}
                  style={{padding:"8px 10px",cursor:"pointer",borderBottom:"1px solid #f1f5f9"}}>
                  <div style={{fontWeight:600,fontSize:13}}>{c.name}</div>
                  <div style={{fontSize:11,color:"#64748b"}}>{[c.city,c.phone].filter(Boolean).join(" · ")}</div>
                  {c.birthday&&<div style={{fontSize:10,color:"#f59e0b"}}>🎂 {c.birthday}</div>}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Row 2: Phone 1 + Phone 2 */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:6}}>
        <div>
          <label style={labelS}>Phone 1</label>
          <input ref={phone1Ref} defaultValue={initialData?.phone||""} onBlur={commitToParent} placeholder="Primary no." style={inpS}/>
        </div>
        <div>
          <label style={labelS}>Phone 2 <span style={{color:"#94a3b8",fontWeight:400}}>(opt.)</span></label>
          <input ref={phone2Ref} defaultValue={initialData?.phone2||""} onBlur={commitToParent} placeholder="Secondary no." style={inpS}/>
        </div>
      </div>

      {/* Birthday / Anniversary */}
      <div>
        <button type="button" onClick={()=>setShowExtra(v=>!v)}
          style={{fontSize:11,color:"#64748b",background:"none",border:"none",cursor:"pointer",padding:"2px 0",marginBottom:4}}>
          {showExtra?"▼":"▶"} Birthday / Anniversary {showExtra?"":"(optional)"}
        </button>
        {showExtra&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div>
              <label style={labelS}>🎂 Birthday</label>
              <input type="date" ref={bdayRef} defaultValue={initialData?.birthday||""} onBlur={commitToParent} style={inpS}/>
            </div>
            <div>
              <label style={labelS}>💍 Anniversary</label>
              <input type="date" ref={annivRef} defaultValue={initialData?.anniversary||""} onBlur={commitToParent} style={inpS}/>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── SITE FORM MODAL ─────────────────────────────────────────────────────────
function SiteFormModal({site,isAdmin,currentUser,contacts,saveContact,allSites,onSave,onClose}){
  const [form,setForm]=useState({
    ownerName:site?.ownerName||"",
    phone:site?.phone||"",
    address:site?.address||"",
    city:site?.city||"",
    locality:site?.locality||"",
    source:site?.source||SOURCES[0],
    projectType:site?.projectType||PROJ_TYPES[0],
    stage:site?.stage||"land",
    assignedTo:site?.assignedTo||currentUser.id,
    notes:site?.notes||"",
  });
  // Contact data stored separately — updated on blur, not on keystroke
  const contactData=React.useRef({
    plumber:{...( site?.plumber||{})},
    architect:{...(site?.architect||{})},
    builder:{...(site?.builder||{})},
    pmc:{...(site?.pmc||{})},
  });

  function onCommitContact(roleKey,data){
    contactData.current[roleKey]=data;
  }

  const [dupWarning,setDupWarning]=useState("");

  function set(k,v){ setForm(f=>({...f,[k]:v})); }

  function checkDup(phone){
    if(!phone||site?.phone===phone){ setDupWarning(""); return; }
    const dup=allSites.find(s=>s.phone===phone);
    if(dup) setDupWarning(`⚠️ Phone already exists: ${dup.ownerName}, ${dup.city}`);
    else setDupWarning("");
  }

  function handleSave(){
    if(!form.ownerName.trim()) return alert("Owner name required");
    if(!form.phone.trim()) return alert("Phone number required");
    if(dupWarning&&!site) return alert("Duplicate phone number — site already exists!");
    const contactRefIds={};
    [["plumber","Plumbing Contractor"],["architect","Architect"],["builder","Builder"],["pmc","PMC"]].forEach(([key,role])=>{
      const cd=contactData.current[key];
      if(cd?.name?.trim()){
        const id=saveContact({name:cd.name.trim(),phone:cd.phone||"",phone2:cd.phone2||"",city:cd.city||"",birthday:cd.birthday||"",anniversary:cd.anniversary||"",role});
        contactRefIds[key+"Ref"]=id;
      }
    });
    onSave({...form,...contactData.current,...contactRefIds});
  }

  const inpS={border:"1px solid #e2e8f0",borderRadius:8,padding:"8px 10px",fontSize:13,width:"100%",boxSizing:"border-box",outline:"none"};
  const labelS={fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em"};
  const secS={background:"#f8fafc",borderRadius:10,padding:"12px 14px",border:"1px solid #e8f0fe"};


  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:12}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#fff",borderRadius:16,padding:20,width:"100%",maxWidth:540,maxHeight:"92vh",overflowY:"auto"}}>

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <h3 style={{margin:0,fontSize:17,fontWeight:800,color:"#1e293b"}}>{site?"✏️ Edit Site":"🏗️ Add New Site"}</h3>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94a3b8"}}>×</button>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:14}}>

          {/* Owner Details */}
          <div style={{...secS,borderColor:"#dbeafe"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#1d4ed8",marginBottom:10}}>👤 Site Owner / Client</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

function CSVUploadModal({onLoad,onClose}){
  const [dragging,setDragging]=useState(false);

  const [preview,setPreview]=useState("");
  const [csvText,setCsvText]=useState("");
  const fileRef=useRef(null);

  function readFile(file){
    if(!file) return;
    setFileName(file.name);
    const reader=new FileReader();
    reader.onload=e=>{
      const text=e.target.result;
      setCsvText(text);
      const lines=text.split("\n").slice(0,4).join("\n");
      setPreview(lines);
    };
    reader.readAsText(file);
  }

  function handleDrop(e){
    e.preventDefault(); setDragging(false);
    const file=e.dataTransfer.files[0];
    if(file&&file.name.endsWith(".csv")) readFile(file);
    else alert("Please drop a .csv file");

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
