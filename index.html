// MODULE — DAILY REPORT / SITE VISIT TRACKER
// ════════════════════════════════════════════════════════════════
function DailyReportModule({currentUser,genId,todayStr,fmtDate2}){
  const [visits,setVisits]=React.useState(()=>{try{return JSON.parse(localStorage.getItem("ew_site_visits")||"[]");}catch{return[];}});
  const [showAdd,setShowAdd]=React.useState(false);
  const [filterUser,setFilterUser]=React.useState("all");
  const [filterDate,setFilterDate]=React.useState(todayStr());
  const TEAL="#0d9488";

  React.useEffect(()=>{try{localStorage.setItem("ew_site_visits",JSON.stringify(visits));}catch(e){};},[visits]);

  function addVisit(data){
    setVisits(prev=>[{...data,id:genId("VS"),createdAt:new Date().toISOString(),addedBy:currentUser.name},...prev]);
    setShowAdd(false);
  }

  const filtered=visits.filter(v=>{
    const dateMatch=!filterDate||v.date===filterDate;
    const userMatch=filterUser==="all"||v.addedBy===filterUser;
    return dateMatch&&userMatch;
  });

  const allUsers=[...new Set(visits.map(v=>v.addedBy))];

  // Calculate km / travel summary per user per day
  function getTravelSummary(userName,date){
    const dayVisits=visits.filter(v=>v.addedBy===userName&&v.date===date);
    return{count:dayVisits.length,locations:dayVisits.map(v=>v.location)};
  }

  return(
    <div style={{maxWidth:1100,margin:"0 auto",padding:"20px 16px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{margin:0,fontSize:20,fontWeight:700,color:"#1e293b"}}>📍 Daily Site Visit Report</h2>
        <button onClick={()=>setShowAdd(true)} style={{background:TEAL,color:"#fff",border:"none",padding:"8px 18px",borderRadius:8,cursor:"pointer",fontWeight:600}}>+ Log Site Visit</button>
      </div>
      {/* Filters */}
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:16,alignItems:"center"}}>
        <div>
          <label style={{fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>Date</label>
          <input type="date" value={filterDate} onChange={e=>setFilterDate(e.target.value)} style={{padding:"7px 12px",border:"1px solid #e2e8f0",borderRadius:8,fontSize:13}}/>
        </div>
        <div>
          <label style={{fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:3}}>Executive</label>
          <select value={filterUser} onChange={e=>setFilterUser(e.target.value)} style={{padding:"7px 12px",border:"1px solid #e2e8f0",borderRadius:8,fontSize:13}}>
            <option value="all">All Executives</option>
            {allUsers.map(u=><option key={u} value={u}>{u}</option>)}
          </select>
        </div>
      </div>

      {/* Travel Summary Cards (per user for selected date) */}
      {filterDate&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:10,marginBottom:20}}>
          {(filterUser==="all"?allUsers:[currentUser.name]).map(u=>{
            const{count,locations}=getTravelSummary(u,filterDate);
            return count>0?(
              <div key={u} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:"12px 16px"}}>
                <div style={{fontWeight:700,color:"#1e293b",marginBottom:6}}>👤 {u}</div>
                <div style={{fontSize:12,color:"#64748b",marginBottom:4}}>📍 {count} visit{count!==1?"s":""} today</div>
                <div style={{fontSize:11,color:"#64748b"}}>{locations.join(" → ")}</div>
              </div>
            ):null;
          })}
        </div>
      )}

      {/* Visit List */}
      <div>
        {filtered.length===0&&<div style={{textAlign:"center",padding:40,color:"#94a3b8"}}>No site visits logged for this date/user.<br/>Executives can add visits from site using the button above.</div>}
        {filtered.map(v=>(
          <div key={v.id} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:"14px 16px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <span style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>📍 {v.location}</span>
                  {v.siteName&&<span style={{background:"#d1fae5",color:"#065f46",borderRadius:12,padding:"2px 8px",fontSize:11,fontWeight:600}}>{v.siteName}</span>}
                </div>
                <div style={{fontSize:12,color:"#64748b",marginBottom:2}}>👤 {v.addedBy} · 🕐 {v.time||"—"} · {fmtDate2(v.date)}</div>
                {v.notes&&<div style={{fontSize:12,color:"#475569",marginTop:4,background:"#f8fafc",borderRadius:6,padding:"6px 10px"}}>{v.notes}</div>}
                {v.nextAction&&<div style={{fontSize:12,color:"#f59e0b",marginTop:4}}>→ Next: {v.nextAction}</div>}
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* Add Visit Modal */}
      {showAdd&&<SiteVisitForm onSave={addVisit} onClose={()=>setShowAdd(false)} todayStr={todayStr} currentUser={currentUser}/>}
    </div>
  );
}

function SiteVisitForm({onSave,onClose,todayStr,currentUser}){
  const [form,setForm]=React.useState({date:todayStr(),time:new Date().toTimeString().slice(0,5),location:"",siteName:"",customerName:"",notes:"",nextAction:""});
  const [locating,setLocating]=React.useState(false);
  const TEAL="#0d9488";
  const set=k=>e=>setForm(prev=>({...prev,[k]:e.target.value}));

  function getLocation(){
    setLocating(true);
    if(!navigator.geolocation){alert("GPS not available on this device/browser.");setLocating(false);return;}
    navigator.geolocation.getCurrentPosition(
      pos=>{
        const lat=pos.coords.latitude.toFixed(5), lon=pos.coords.longitude.toFixed(5);
        // Try reverse geocoding via Nominatim
        fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=en`,{headers:{"Accept-Language":"en"}})
          .then(r=>r.json())
          .then(data=>{
            const a=data.address||{};
            const parts=[a.road||a.suburb||"",a.city_district||a.county||a.city||a.town||a.village||"",a.city||a.town||a.state_district||""].filter(Boolean);
            setForm(prev=>({...prev,location:parts.join(", ")||data.display_name||`${lat},${lon}`}));
            setLocating(false);
          })
          .catch(()=>{
            setForm(prev=>({...prev,location:`${lat},${lon}`}));
            setLocating(false);
          });
      },
      err=>{
        const msgs={1:"Location permission denied. Please allow location in browser settings.",2:"Location unavailable. Try again or type manually.",3:"GPS timed out. Move outside and retry."};
        alert(msgs[err.code]||"Could not get location.");
        setLocating(false);
      },
      {enableHighAccuracy:true, timeout:15000, maximumAge:0}
    );
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:12,padding:24,width:"100%",maxWidth:480,maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
          <h3 style={{margin:0}}>📍 Log Site Visit</h3>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div>
            <label style={{fontSize:12,color:"#64748b",fontWeight:600}}>Date *</label>
            <input type="date" value={form.date} onChange={set("date")} style={{width:"100%",padding:"8px",border:"1px solid #e2e8f0",borderRadius:6,marginTop:4,boxSizing:"border-box"}}/>
          </div>
          <div>
            <label style={{fontSize:12,color:"#64748b",fontWeight:600}}>Time</label>
            <input type="time" value={form.time} onChange={set("time")} style={{width:"100%",padding:"8px",border:"1px solid #e2e8f0",borderRadius:6,marginTop:4,boxSizing:"border-box"}}/>
          </div>
          <div style={{gridColumn:"1/-1"}}>
            <label style={{fontSize:12,color:"#64748b",fontWeight:600}}>Location *</label>
            <div style={{display:"flex",gap:6,marginTop:4}}>
              <input value={form.location} onChange={set("location")} placeholder="Site address / area name" style={{flex:1,padding:"8px",border:"1px solid #e2e8f0",borderRadius:6,boxSizing:"border-box"}}/>
              <button onClick={getLocation} disabled={locating} style={{background:TEAL,color:"#fff",border:"none",borderRadius:6,padding:"8px 12px",cursor:locating?"wait":"pointer",fontSize:12,fontWeight:600,whiteSpace:"nowrap"}}>
                {locating?"📡...":"📡 GPS"}
              </button>
            </div>
          </div>
          <div>
            <label style={{fontSize:12,color:"#64748b",fontWeight:600}}>Site/Project Name</label>
            <input value={form.siteName} onChange={set("siteName")} placeholder="e.g. Sharma Bungalow" style={{width:"100%",padding:"8px",border:"1px solid #e2e8f0",borderRadius:6,marginTop:4,boxSizing:"border-box"}}/>
          </div>
          <div>
            <label style={{fontSize:12,color:"#64748b",fontWeight:600}}>Customer Name</label>
            <input value={form.customerName} onChange={set("customerName")} placeholder="Customer / client name" style={{width:"100%",padding:"8px",border:"1px solid #e2e8f0",borderRadius:6,marginTop:4,boxSizing:"border-box"}}/>
          </div>
          <div style={{gridColumn:"1/-1"}}>
            <label style={{fontSize:12,color:"#64748b",fontWeight:600}}>Visit Notes</label>
            <textarea value={form.notes} onChange={set("notes")} rows={2} placeholder="What was discussed / shown..." style={{width:"100%",padding:"8px",border:"1px solid #e2e8f0",borderRadius:6,marginTop:4,boxSizing:"border-box",resize:"vertical"}}/>
          </div>
          <div style={{gridColumn:"1/-1"}}>
            <label style={{fontSize:12,color:"#64748b",fontWeight:600}}>Next Action</label>
            <input value={form.nextAction} onChange={set("nextAction")} placeholder="Follow-up required..." style={{width:"100%",padding:"8px",border:"1px solid #e2e8f0",borderRadius:6,marginTop:4,boxSizing:"border-box"}}/>
          </div>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:16}}>
          <button onClick={onClose} style={{padding:"9px 20px",border:"1px solid #e2e8f0",borderRadius:8,cursor:"pointer"}}>Cancel</button>
          <button onClick={()=>{if(!form.location){alert("Location is required.");return;}onSave(form);}} style={{padding:"9px 22px",background:TEAL,color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700}}>Save Visit</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<CRMApp/>);
</script>

<!-- ═══ PWA INSTALL + SERVICE WORKER ══════════════════════════════════ -->
<script>
// ── Install prompt (Android Chrome / Edge) ──────────────────────────────
let _deferredInstall = null;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  _deferredInstall = e;
  showInstallBanner();
});

function showInstallBanner(){
  if(document.getElementById("ew-install-banner")) return;
  const banner = document.createElement("div");
  banner.id = "ew-install-banner";
  banner.style.cssText = "position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:9999;background:#0d9488;color:#fff;border-radius:14px;padding:12px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 24px rgba(0,0,0,0.25);font-family:system-ui,sans-serif;font-size:14px;max-width:340px;width:calc(100%-32px)";
  banner.innerHTML = `
    <div style="font-size:28px;line-height:1">📲</div>
    <div style="flex:1">
      <div style="font-weight:700;font-size:14px">Install Energy World CRM</div>
      <div style="font-size:12px;opacity:0.85;margin-top:2px">Add to home screen for app experience</div>
    </div>
    <button id="ew-install-btn" style="background:#fff;color:#0d9488;border:none;border-radius:8px;padding:7px 14px;font-weight:700;font-size:13px;cursor:pointer">Install</button>
    <button id="ew-install-close" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer;opacity:0.7;padding:0 4px">×</button>
  `;
  document.body.appendChild(banner);
  document.getElementById("ew-install-btn").onclick = async () => {
    if(!_deferredInstall) return;
    _deferredInstall.prompt();
    const r = await _deferredInstall.userChoice;
    _deferredInstall = null;
    banner.remove();
  };
  document.getElementById("ew-install-close").onclick = () => banner.remove();
  // Auto-hide after 12 seconds
  setTimeout(() => { if(banner.parentNode) banner.remove(); }, 12000);
}

// ── iOS "Add to Home Screen" hint ──────────────────────────────────────
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isInStandaloneMode = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
if(isIOS && !isInStandaloneMode && !sessionStorage.getItem("ew-ios-hint-shown")){
  sessionStorage.setItem("ew-ios-hint-shown", "1");
  setTimeout(() => {
    const hint = document.createElement("div");
    hint.style.cssText = "position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#1e293b;color:#fff;padding:16px 20px 28px;font-family:system-ui,sans-serif;border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,0.3)";
    hint.innerHTML = `
      <div style="text-align:center;margin-bottom:12px">
        <div style="font-size:22px;margin-bottom:6px">📲 Install EW CRM as App</div>
        <div style="font-size:13px;opacity:0.8;line-height:1.5">Tap <span style="background:#334155;padding:2px 8px;border-radius:6px;font-weight:700">Share</span> → then <span style="background:#334155;padding:2px 8px;border-radius:6px;font-weight:700">Add to Home Screen</span></div>
      </div>
      <div style="text-align:center;font-size:28px;margin-bottom:8px">⬆️</div>
      <button onclick="this.parentNode.remove()" style="display:block;width:100%;background:#0d9488;color:#fff;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:700;cursor:pointer">Got it</button>
    `;
    document.body.appendChild(hint);
  }, 3000);
}

// ── Service Worker — only registers when served over http/https (not file://) ─
if("serviceWorker" in navigator && location.protocol !== "blob:" && location.protocol !== "about:"){
  try{
    // SW works only on http/https, not file:// or blob://
    // When hosted on a server, this caches the app for offline use
    const swCode = `
const CACHE="ew-crm-v2";
self.addEventListener("install",e=>{ e.waitUntil(self.skipWaiting()); });
self.addEventListener("activate",e=>{ e.waitUntil(self.clients.claim()); });
self.addEventListener("fetch",e=>{
  if(e.request.method!=="GET") return;
  const u=new URL(e.request.url);
  if(u.hostname.includes("google")||u.hostname.includes("telegram")||u.hostname.includes("cdnjs")) return;
  e.respondWith(
    caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
      if(res.ok){ const c=res.clone(); caches.open(CACHE).then(cache=>cache.put(e.request,c)); }
      return res;
    }).catch(()=>caches.match(e.request)))
  );
});`;
    const blob=new Blob([swCode],{type:"text/javascript"});
    const url=URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).then(()=>{
      console.log("EW CRM: SW registered ✅");
    }).catch(e=>{
      // SW registration failure is non-fatal — app still works
      console.info("EW CRM: SW not available ("+e.message+") — app works without it");
    });
  }catch(e){
    console.info("EW CRM: SW setup skipped");
  }
}
</script>
